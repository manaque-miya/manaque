  <meta charset="UTF-8">

  <title>まなクエ！｜県庁所在地クイズ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --brand-500:#2E6DE5;--brand-600:#1F56C6;--brand-700:#1A449E;
      --hero-blue:#2563EB;--accent-yellow:#F6C744;--accent-yellow-dark:#D4A60E;
      --success:#1AAE71;--success-bg:#E3F7ED;--danger:#E5484D;--danger-bg:#FCE6E6;
      --ink-900:#0F1830;--ink-700:#2B3858;--ink-500:#5B6785;--ink-400:#8693AE;
      --ink-100:#ECEFF5;--white:#FFFFFF;--border:#E4E9F2;--surface:#EAF2FE;
      --r-lg:20px;--r-xl:28px;--r-pill:999px;
      --shadow-sm:0 2px 6px rgba(30,50,110,.06);--shadow-md:0 8px 20px rgba(30,50,110,.08);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;overflow:hidden;}
    body{font-family:"M PLUS Rounded 1c",sans-serif;background:var(--surface);color:var(--ink-700);display:flex;flex-direction:column;}
    .mq-header{flex-shrink:0;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);z-index:40;}
    .mq-header__inner{max-width:none;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;}
    .mq-logo{display:inline-flex;align-items:center;gap:8px;text-decoration:none;}
    .mq-logo__icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#2E6DE5,#1A449E);display:grid;place-items:center;}
    .mq-logo__text{font-size:20px;font-weight:900;color:var(--ink-900);}
    .mq-logo__text span{color:var(--brand-600);}
    .mq-header__back{font-size:13px;font-weight:700;color:var(--brand-600);text-decoration:none;}
    /* ── 2-column game layout ── */
    .mq-main{flex:1;display:grid;grid-template-columns:1fr 380px;overflow:hidden;}
    .map-col{background:#EAF2FE;display:flex;align-items:center;justify-content:center;padding:10px;overflow:hidden;}
    .panel-col{display:flex;flex-direction:column;gap:10px;padding:14px;overflow-y:auto;border-left:1px solid var(--border);background:var(--surface);}
    /* ── map ── */
    #japan-map{width:100%;height:100%;display:block;object-fit:contain;}
    .prefecture{transition:fill .3s;}
    .prefecture.is-highlighted{fill:#2563EB !important;animation:mapPulse 1.6s ease-in-out infinite;}
    .prefecture.is-correct{fill:#1AAE71 !important;}
    .prefecture.is-wrong{fill:#E5484D !important;}
    @keyframes mapPulse{0%,100%{opacity:1;}50%{opacity:.7;}}
    /* ── quiz bar ── */
    .quiz-bar{background:var(--hero-blue);border-radius:var(--r-xl);padding:12px 16px;position:relative;overflow:hidden;flex-shrink:0;}
    .quiz-bar::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.2) 1px,transparent 1px);background-size:22px 22px;}
    .quiz-bar__inner{display:flex;align-items:center;gap:10px;position:relative;z-index:1;}
    .quiz-counter{font-size:13px;font-weight:800;color:rgba(255,255,255,.85);white-space:nowrap;}
    .progress-wrap{flex:1;background:rgba(255,255,255,.2);border-radius:var(--r-pill);height:10px;overflow:hidden;}
    .progress-bar{height:100%;background:var(--accent-yellow);border-radius:var(--r-pill);transition:width .4s ease;}
    .score-badge{background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.3);font-size:13px;font-weight:900;padding:5px 12px;border-radius:var(--r-pill);white-space:nowrap;}
    /* ── question / choices / feedback ── */
    .question-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r-xl);padding:16px 20px;box-shadow:var(--shadow-sm);flex-shrink:0;}
    .question-card__text{font-size:16px;font-weight:800;color:var(--ink-900);}
    .choices{display:flex;flex-direction:column;gap:8px;}
    .choice-btn{width:100%;padding:12px 16px;background:#fff;border:2px solid var(--border);border-radius:var(--r-lg);cursor:pointer;font-family:"M PLUS Rounded 1c",sans-serif;font-size:14px;font-weight:700;color:var(--ink-700);text-align:left;display:flex;align-items:center;gap:10px;transition:all .15s;box-shadow:var(--shadow-sm);}
    .choice-btn:hover:not(:disabled){border-color:var(--brand-500);background:#EAF2FE;transform:translateY(-1px);box-shadow:var(--shadow-md);}
    .choice-btn__label{width:26px;height:26px;border-radius:50%;background:var(--ink-100);color:var(--ink-500);display:grid;place-items:center;font-size:11px;font-weight:900;flex-shrink:0;}
    .choice-btn.correct{border-color:var(--success);background:var(--success-bg);color:#0F7A4F;}
    .choice-btn.correct .choice-btn__label{background:var(--success);color:#fff;}
    .choice-btn.wrong{border-color:var(--danger);background:var(--danger-bg);color:#9B1E22;}
    .choice-btn.wrong .choice-btn__label{background:var(--danger);color:#fff;}
    .choice-btn:disabled{cursor:default;transform:none;}
    .feedback{border-radius:var(--r-lg);padding:14px 18px;font-size:13px;font-weight:700;line-height:1.6;display:none;}
    .feedback.correct{background:var(--success-bg);color:#0A6644;border:1.5px solid #34C38F;display:block;}
    .feedback.wrong{background:var(--danger-bg);color:#9B1E22;border:1.5px solid var(--danger);display:block;}
    .mq-btn{display:flex;align-items:center;justify-content:center;height:48px;padding:0 24px;border:none;border-radius:var(--r-pill);cursor:pointer;font-family:"M PLUS Rounded 1c",sans-serif;font-size:15px;font-weight:800;transition:transform .15s;width:100%;margin-bottom:8px;}
    .mq-btn:active{transform:translateY(2px);}
    .mq-btn--accent{background:var(--accent-yellow);color:var(--ink-900);box-shadow:0 4px 0 var(--accent-yellow-dark);}
    .mq-btn--primary{background:var(--brand-500);color:#fff;box-shadow:0 4px 0 var(--brand-700);}
    .mq-btn--ghost{background:#fff;color:var(--brand-600);box-shadow:0 2px 0 var(--border),inset 0 0 0 1.5px var(--border);}
    /* ── result modal overlay ── */
    .result-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.65);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center;padding:20px;}
    .result-overlay.active{display:flex;}
    .result-inner{background:#fff;border-radius:var(--r-xl);padding:28px 24px;max-width:440px;width:100%;overflow-y:auto;max-height:90vh;}
    .result-card{background:var(--hero-blue);border-radius:var(--r-xl);padding:28px 20px;text-align:center;margin-bottom:16px;position:relative;overflow:hidden;}
    .result-card::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.18) 1px,transparent 1px);background-size:24px 24px;}
    .result-card__inner{position:relative;z-index:1;}
    .result-card__icon{font-size:54px;margin-bottom:10px;}
    .result-card__score{font-size:50px;font-weight:900;color:#fff;line-height:1;margin-bottom:4px;}
    .result-card__score span{font-size:20px;color:rgba(255,255,255,.6);}
    .result-card__msg{font-size:13px;color:rgba(255,255,255,.78);margin-top:8px;line-height:1.7;}
    .result-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
    .result-stat{background:#fff;border:1.5px solid var(--border);border-radius:var(--r-lg);padding:14px;text-align:center;box-shadow:var(--shadow-sm);}
    .result-stat__num{font-size:26px;font-weight:900;}
    .result-stat__label{font-size:11px;color:var(--ink-500);font-weight:700;margin-top:3px;}
    /* ── mobile ── */
    @media(max-width:640px){
      html,body{overflow:auto;}
      .mq-main{grid-template-columns:1fr;overflow:visible;}
      .map-col{height:55vw;min-height:220px;max-height:340px;order:2;}
      .panel-col{order:1;overflow-y:visible;}
    }

  /* ── gacha ── */
  @keyframes capsuleSpin{0%{transform:rotate(0) scale(1)}60%{transform:rotate(540deg) scale(1.3)}100%{transform:rotate(720deg) scale(1)}}
  @keyframes cardFlipIn{0%{transform:rotateY(90deg) scale(.8);opacity:0}100%{transform:rotateY(0) scale(1);opacity:1}}
  @keyframes popIn{0%{transform:scale(.5);opacity:0}80%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
  @keyframes srGlowPulse{0%,100%{box-shadow:0 0 30px #ffd700,0 0 60px rgba(255,215,0,.4)}50%{box-shadow:0 0 50px #ffd700,0 0 90px rgba(255,215,0,.6)}}
  @keyframes gachaBtnPulse{0%,100%{transform:scale(1);box-shadow:0 4px 20px rgba(124,58,237,.45)}50%{transform:scale(1.03);box-shadow:0 6px 28px rgba(124,58,237,.65)}}
  .gacha-capsule{font-size:72px;display:flex;align-items:center;justify-content:center;margin:16px auto;}
  .gacha-capsule.spin{animation:capsuleSpin 1.6s cubic-bezier(0.25,0.46,0.45,0.94) forwards;}
  .gacha-rarity-announce{font-size:22px;font-weight:900;text-align:center;margin:4px 0;animation:popIn 0.4s ease;}
  .gacha-card{width:200px;border-radius:16px;overflow:hidden;animation:cardFlipIn 0.6s ease forwards;}
  .gacha-card.sr{box-shadow:0 0 30px #ffd700,0 0 60px rgba(255,215,0,0.4);animation:cardFlipIn 0.6s ease forwards,srGlowPulse 2s ease-in-out 0.6s infinite;}
  .gacha-card.r{box-shadow:0 0 20px #a78bfa,0 0 40px rgba(167,139,250,0.35);}
  .gacha-next-btn{padding:14px 40px;background:linear-gradient(135deg,#2E6DE5,#1A449E);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:900;cursor:pointer;margin-top:14px;font-family:"M PLUS Rounded 1c",sans-serif;}
  .gacha-close-btn{padding:10px 28px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);border-radius:12px;color:rgba(255,255,255,0.6);font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;font-family:"M PLUS Rounded 1c",sans-serif;}
  .gacha-trigger-btn{width:100%;padding:18px;background:linear-gradient(135deg,#7c3aed,#a855f7);border:none;border-radius:16px;color:#fff;font-size:18px;font-weight:900;cursor:pointer;margin-bottom:12px;box-shadow:0 4px 20px rgba(124,58,237,0.45);animation:gachaBtnPulse 1.6s ease-in-out infinite;font-family:"M PLUS Rounded 1c",sans-serif;}
  .btn-catalog-link{display:block;width:100%;padding:14px;background:rgba(255,215,0,0.08);border:1.5px solid rgba(255,215,0,0.3);border-radius:20px;color:#b8860b;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:12px;text-align:center;text-decoration:none;font-family:"M PLUS Rounded 1c",sans-serif;}
  </style>

const LABELS=['A','B','C','D'];
let order=[],idx=0,score=0,answered=false;
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function showScreen(id){if(id==='screen-result'){document.getElementById('screen-result').classList.add('active');}else{document.getElementById('screen-result').classList.remove('active');}}
function clearHighlights(){document.querySelectorAll('.prefecture').forEach(el=>{el.classList.remove('is-highlighted','is-correct','is-wrong');el.style.animation='';el.style.fill='';} );}
function setHighlight(key,cls){clearHighlights();const el=document.querySelector('.'+key);if(el)el.classList.add(cls);}
function renderQuestion(){
  answered=false;
  const [key,choices,ans,exp]=Q[order[idx]];
  const total=Q.length;
  document.getElementById('quiz-counter').textContent=`${idx+1} / ${total}`;
  document.getElementById('progress-bar').style.width=`${((idx+1)/total)*100}%`;
  document.getElementById('score-badge').textContent=`⭐ ${score}`;
  document.getElementById('feedback').className='feedback';
  document.getElementById('feedback').innerHTML='';
  document.getElementById('next-wrap').style.display='none';
  setHighlight(key,'is-highlighted');
  const el=document.getElementById('choices');el.innerHTML='';
  choices.forEach((c,i)=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.innerHTML=`<span class="choice-btn__label">${LABELS[i]}</span>${c}`;
    btn.onclick=()=>selectAnswer(i,ans,choices,key,exp);
    el.appendChild(btn);
  });
}
function selectAnswer(i,ans,choices,key,exp){
  if(answered)return;answered=true;
  const btns=document.querySelectorAll('.choice-btn');
  btns.forEach(b=>b.disabled=true);
  const fb=document.getElementById('feedback');
  if(i===ans){score++;btns[i].classList.add('correct');SND.play('correct');fb.className='feedback correct';fb.innerHTML=`✅ 正解！ ${exp}`;setHighlight(key,'is-correct');}
  else{btns[i].classList.add('wrong');btns[ans].classList.add('correct');SND.play('wrong');fb.className='feedback wrong';fb.innerHTML=`❌ 不正解… 正解は「${choices[ans]}」。${exp}`;setHighlight(key,'is-wrong');}
  document.getElementById('score-badge').textContent=`⭐ ${score}`;
  const nw=document.getElementById('next-wrap');nw.style.display='block';
  if(idx===Q.length-1)nw.querySelector('.mq-btn').textContent='結果を見る 🏁';
}
function nextQuestion(){idx++;if(idx>=Q.length)showResult();else renderQuestion();}
function showResult(){
  showScreen('screen-result');
  const total=Q.length,pct=score/total;
  document.getElementById('r-score').textContent=score;
  document.getElementById('r-total').textContent=` / ${total}`;
  document.getElementById('r-correct').textContent=score;
  document.getElementById('r-wrong').textContent=total-score;
  let icon,msg;
  if(pct===1){icon='🏆';msg='全問正解！都道府県の位置をマスターしました！';}
  else if(pct>=.8){icon='🥇';msg='あと少しで満点。よく覚えてる！';}
  else if(pct>=.6){icon='🥈';msg='半分以上正解！もう一度チャレンジしよう。';}
  else if(pct>=.4){icon='🥉';msg='くり返し解くと覚えられるよ！';}
  else{icon='📚';msg='日本地図を見ながら一緒に覚えていこう！';}
  document.getElementById('r-icon').textContent=icon;
  document.getElementById('r-msg').textContent=msg;
}
function restart(){idx=0;score=0;order=shuffle(Q.map((_,i)=>i));showScreen('screen-quiz');renderQuestion();}
function goHome(){window.location.href='index.html';}
order=shuffle(Q.map((_,i)=>i));renderQuestion();

let gachaState = loadGachaState();
let _pullResults = [], _pullIdx = 0;

function updateCatalogBtn() {
  const n = gachaState.collected.length;
  document.querySelectorAll('.catalogCount').forEach(el => el.textContent = n);
}

function startGachaFromResult() {
  const pulls = calcGachaPulls(score, Q.length);
  if(pulls === 0) return;
  _pullResults = [];
  _pullIdx = 0;
  for(let i = 0; i < pulls; i++) _pullResults.push(drawSingleCard(gachaState));
  updateCatalogBtn();
  showGachaOverlay();
  runGachaAnimation();
}

function showGachaOverlay() { document.getElementById('gachaOverlay').style.display = 'flex'; }
function hideGachaOverlay() { document.getElementById('gachaOverlay').style.display = 'none'; }

function runGachaAnimation() {

  if(_pullResults.length > 1) { ci.textContent = `${_pullIdx+1} / ${_pullResults.length} 回目`; ci.style.display='block'; }

  setTimeout(() => { cap.className = 'gacha-capsule spin'; }, 50);
  setTimeout(() => {
    document.getElementById('gachaCapsulePhase').style.display = 'none';
    document.getElementById('gachaCardPhase').style.display = 'flex';
    const { card, isNew, pts } = _pullResults[_pullIdx];
    const ann = document.getElementById('gachaRarityAnnounce');
    ann.textContent = { sr:'⭐⭐⭐ SR!', r:'⭐⭐ R', n:'⭐ N' }[card.rarity];
    ann.style.color = card.rarity==='sr'?'#ffd700':card.rarity==='r'?'#a78bfa':'#94a3b8';
    document.getElementById('gachaCardDisplay').innerHTML = `
      <div class="gacha-card ${card.rarity}" style="width:200px;border-radius:16px;overflow:hidden">
        <img src="${card.img}" style="width:100%;display:block" onerror="this.style.display='none'">
        <div style="padding:10px;background:${card.rarity==='sr'?'linear-gradient(135deg,#1a1a2e,#16213e)':card.rarity==='r'?'linear-gradient(135deg,#1e1b4b,#312e81)':'#1e293b'}">
          <div style="font-size:11px;font-weight:900;color:${card.rarity==='sr'?'#ffd700':card.rarity==='r'?'#a78bfa':'#94a3b8'}">${card.rarity.toUpperCase()}</div>
          <div style="font-size:14px;font-weight:900;color:#fff">${card.name}</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.6)">${card.team||''}</div>
          <div style="font-size:13px;font-weight:700;color:#ffd700;margin-top:4px">+${pts}pt ${isNew?'<span style="color:#34c38f">NEW!</span>':''}</div>
        </div>
      </div>`;
    _pullIdx++;
    const nextBtn = document.getElementById('gachaNextBtn');
    const closeBtn = document.getElementById('gachaCloseBtn');
    if(_pullIdx < _pullResults.length) {
      nextBtn.textContent='つぎへ →'; nextBtn.onclick=runGachaAnimation; closeBtn.style.display='none';
    } else {
      nextBtn.style.display='none'; closeBtn.style.display='block';
      closeBtn.textContent='✕ 閉じる'; closeBtn.onclick=hideGachaOverlay;
    }
  }, 1700);
}

updateCatalogBtn();
</script>

<!-- ガチャオーバーレイ -->
<div id="gachaOverlay" style="display:none;position:fixed;inset:0;background:radial-gradient(ellipse at 50% 20%,#1e0050 0%,#080018 55%,#000005 100%);z-index:1000;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center">
  <div id="gachaCountIndicator" style="font-size:13px;color:rgba(255,255,255,0.55);margin-bottom:6px;display:none"></div>
  <div id="gachaCapsulePhase" style="display:flex;flex-direction:column;align-items:center">
    <div style="font-size:28px;font-weight:900;color:#fff;margin-bottom:8px">🎰 ガチャタイム！</div>
    <div id="gachaCapsule" class="gacha-capsule">🎱</div>
  </div>
  <div id="gachaCardPhase" style="display:none;flex-direction:column;align-items:center">
    <div id="gachaRarityAnnounce" class="gacha-rarity-announce"></div>
    <div id="gachaCardDisplay"></div>
    <button id="gachaNextBtn" class="gacha-next-btn">つぎへ →</button>
    <button id="gachaCloseBtn" class="gacha-close-btn">✕ 閉じる</button>
  </div>
</div>
<script src="data/cards.js"></script>
<script src="data/gacha.js">
// ── サウンド ──
const SND = {
  enabled: localStorage.getItem('sndEnabled') !== 'false',
  correct: new Audio('assets/audio/correct.mp3'),
  wrong:   new Audio('assets/audio/wrong.mp3'),
  play(type) {
    if (!this.enabled) return;
    this[type].cloneNode().play().catch(()=>{});
  }
};
function toggleSound() {
  SND.enabled = !SND.enabled;
  localStorage.setItem('sndEnabled', SND.enabled);
  document.getElementById('soundBtn').textContent = SND.enabled ? '🔊' : '🔇';
}
document.addEventListener('DOMContentLoaded',()=>{
  const btn=document.getElementById('soundBtn');
  if(btn) btn.textContent=SND.enabled?'🔊':'🔇';
});
</script>
