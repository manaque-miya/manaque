<html lang="ja">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>どうぶつはどれ？ | まなクエ！</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'M PLUS Rounded 1c', 'Hiragino Kaku Gothic ProN', sans-serif;
  background: linear-gradient(160deg, #e8f5e9 0%, #fff9e6 100%);
  min-height: 100vh;
  padding: 16px 12px 60px;
  color: #333;
}
.container { max-width: 480px; margin: 0 auto; }

/* ヘッダー */
.header { text-align: center; margin-bottom: 24px; }
.header h1 { font-size: 26px; font-weight: 900; color: #43a047; }
.header p  { font-size: 13px; color: #aaa; margin-top: 4px; }

/* モード選択 */
.mode-select {
  background: #fff; border-radius: 20px;
  padding: 28px 20px;
  box-shadow: 0 4px 16px rgba(0,0,0,.08);
  text-align: center;
}
.mode-select h2 { font-size: 20px; font-weight: 900; color: #333; margin-bottom: 8px; }
.mode-select p  { font-size: 13px; color: #aaa; margin-bottom: 24px; }
.mode-btns { display: flex; flex-direction: column; gap: 12px; }
.mode-btn {
  padding: 18px; border: none; border-radius: 16px;
  font-size: 20px; font-weight: 900; cursor: pointer;
  font-family: inherit; transition: opacity .15s;
}
.mode-btn:hover { opacity: .85; }
.mode-btn--3  { background: linear-gradient(135deg, #66bb6a, #43a047); color: #fff; }
.mode-btn--5  { background: linear-gradient(135deg, #ffa726, #fb8c00); color: #fff; }
.mode-btn--10 { background: linear-gradient(135deg, #ef5350, #e53935); color: #fff; }

/* スコアバー */
.score-bar {
  display: flex; justify-content: space-between; align-items: center;
  background: #fff; border-radius: 14px; padding: 10px 16px;
  margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.06);
  font-size: 14px; font-weight: 700;
}
.score-bar .q-num { color: #aaa; }
.score-bar .pts   { color: #43a047; font-size: 18px; }

/* 問題 */
.question-box {
  background: #fff; border-radius: 20px;
  padding: 24px 20px 20px;
  box-shadow: 0 4px 16px rgba(0,0,0,.08);
  margin-bottom: 20px;
  text-align: center;
}
.question-text {
  font-size: clamp(28px, 8vw, 40px);
  font-weight: 900; color: #333; margin-bottom: 6px;
}
.question-sub { font-size: 14px; color: #aaa; }

/* 選択肢グリッド */
.choices {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px; margin-bottom: 20px;
}
.choice-btn {
  background: #fff; border: 3px solid #e8e8e8;
  border-radius: 16px; padding: 10px; cursor: pointer;
  transition: all .15s;
  display: flex; align-items: center; justify-content: center;
  aspect-ratio: 1; overflow: hidden;
}
.choice-btn:hover { border-color: #43a047; transform: scale(1.02); }
.choice-btn img { width: 100%; height: 100%; object-fit: contain; }

.choice-btn.correct {
  border-color: #28c76f; background: #f0fff6;
  animation: pop .3s ease-out;
}
.choice-btn.wrong {
  border-color: #ff4a4a; background: #fff0f0;
  animation: shake .3s;
}
@keyframes pop   { 0%{transform:scale(1)} 50%{transform:scale(1.08)} 100%{transform:scale(1)} }
@keyframes shake { 0%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} 100%{transform:translateX(0)} }

/* フィードバック */
.feedback {
  text-align: center; font-size: 22px; font-weight: 900;
  min-height: 36px; margin-bottom: 16px; transition: opacity .2s;
}
.feedback.correct { color: #28c76f; }
.feedback.wrong   { color: #ff4a4a; }

/* 次へボタン */
.next-btn {
  display: none; width: 100%;
  padding: 16px; border: none; border-radius: 14px;
  background: linear-gradient(135deg, #43a047, #66bb6a);
  color: #fff; font-size: 18px; font-weight: 900;
  cursor: pointer; font-family: inherit;
  box-shadow: 0 4px 14px rgba(67,160,71,.35);
  transition: opacity .15s;
}
.next-btn:hover { opacity: .9; }
.next-btn.show  { display: block; }

/* 結果画面 */
.result {
  display: none; text-align: center;
  background: #fff; border-radius: 20px;
  padding: 36px 20px;
  box-shadow: 0 4px 16px rgba(0,0,0,.08);
}
.result.show { display: block; }
.result-emoji { font-size: 64px; margin-bottom: 12px; }
.result-title { font-size: 24px; font-weight: 900; margin-bottom: 8px; color: #43a047; }
.result-score { font-size: 48px; font-weight: 900; color: #333; margin-bottom: 20px; }
.result-score span { font-size: 20px; color: #aaa; }
.retry-btn {
  width: 100%; padding: 16px; border: none; border-radius: 14px;
  background: linear-gradient(135deg, #43a047, #66bb6a);
  color: #fff; font-size: 18px; font-weight: 900;
  cursor: pointer; font-family: inherit; margin-bottom: 12px;
  box-shadow: 0 4px 14px rgba(67,160,71,.35);
}
.mode-again-btn {
  width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 14px;
  background: #fff; color: #888; font-size: 16px; font-weight: 700;
  cursor: pointer; font-family: inherit; margin-bottom: 12px;
}
.home-btn {
  display: block; text-align: center; color: #aaa;
  font-size: 14px; font-weight: 700; text-decoration: none; margin-top: 4px;
}

@media (max-width: 768px) {
  body { min-height: unset; padding-bottom: 40px; }
}
</style>

     crossorigin="anonymous"></script>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>🐾 どうぶつはどれ？</h1>
    <p>えをみて こたえよう！</p>
  </div>

  <!-- モード選択 -->
  <div class="mode-select" id="modeSelect">
    <h2>なんもんにする？</h2>
    <p>すきなもんすうをえらんでね</p>
    <div class="mode-btns">
      <button class="mode-btn mode-btn--3"  onclick="startQuiz(3)">🌱 ３もん</button>
      <button class="mode-btn mode-btn--5"  onclick="startQuiz(5)">🌟 ５もん</button>
      <button class="mode-btn mode-btn--10" onclick="startQuiz(10)">🔥 １０もん</button>
    </div>
  </div>

  <!-- クイズエリア -->
  <div id="quizWrap" style="display:none">
    <div class="score-bar">
      <span class="q-num" id="qNum">1 / 5もん</span>
      <span class="pts" id="pts">⭐ 0</span>
    </div>

    <div id="quizArea">
      <div class="question-box">
        <div class="question-text" id="questionText"></div>
        <div class="question-sub">ただしいえをえらんでね</div>
      </div>
      <div class="choices" id="choices"></div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">つぎへ →</button>
    </div>

    <!-- 結果エリア -->
    <div class="result" id="result">
      <div class="result-emoji" id="resultEmoji">🎉</div>
      <div class="result-title" id="resultTitle">ぜんぶできた！</div>
      <div class="result-score"><span id="resultScore">0</span><span id="resultTotal"> / 5もん</span></div>
      <button class="retry-btn" id="retryBtn">もういちど！</button>
      <button class="mode-again-btn" onclick="showModeSelect()">もんすうをかえる</button>
      <a class="home-btn" href="index.html">← もどる</a>
    </div>
  </div>

</div>

<script>
const ANIMALS = [
  { id: 'dog',      label: 'いぬ',       img: 'assets/img/animals/dog.png'      },
  { id: 'cat',      label: 'ねこ',       img: 'assets/img/animals/cat.png'      },
  { id: 'elephant', label: 'ぞう',       img: 'assets/img/animals/elephant.png' },
  { id: 'rabbit',   label: 'うさぎ',     img: 'assets/img/animals/rabbit.png'   },
  { id: 'giraffe',  label: 'きりん',     img: 'assets/img/animals/giraffe.png'  },
  { id: 'monkey',   label: 'さる',       img: 'assets/img/animals/monkey.png'   },
  { id: 'bear',     label: 'くま',       img: 'assets/img/animals/bear.png'     },
  { id: 'chick',    label: 'ひよこ',     img: 'assets/img/animals/chick.png'    },
  { id: 'panda',    label: 'パンダ',     img: 'assets/img/animals/panda.png'    },
  { id: 'koala',    label: 'コアラ',     img: 'assets/img/animals/koala.png'    },
  { id: 'lion',     label: 'らいおん',   img: 'assets/img/animals/lion.png'     },
  { id: 'penguin',  label: 'ペンギン',   img: 'assets/img/animals/penguin.png'  },
  { id: 'fox',      label: 'きつね',     img: 'assets/img/animals/fox.png'      },
  { id: 'hedgehog', label: 'はりねずみ', img: 'assets/img/animals/hedgehog.png' },
  { id: 'raccoon',  label: 'あらいぐま', img: 'assets/img/animals/raccoon.png'  },
  { id: 'dolphin',  label: 'いるか',     img: 'assets/img/animals/dolphin.png'  },
];

let questions = [], current = 0, score = 0, answered = false, modeCount = 5;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showModeSelect() {
  document.getElementById('modeSelect').style.display = '';
  document.getElementById('quizWrap').style.display = 'none';
}

function startQuiz(count) {
  modeCount = count;
  questions = shuffle(ANIMALS).slice(0, count);
  current = 0; score = 0; answered = false;
  document.getElementById('modeSelect').style.display = 'none';
  document.getElementById('quizWrap').style.display = '';
  document.getElementById('result').classList.remove('show');
  document.getElementById('quizArea').style.display = '';
  document.getElementById('retryBtn').onclick = () => startQuiz(modeCount);
  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = questions[current];
  document.getElementById('qNum').textContent = `${current + 1} / ${questions.length}もん`;
  document.getElementById('pts').textContent = `⭐ ${score}`;
  document.getElementById('questionText').textContent = `「${q.label}」はどれ？`;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('nextBtn').classList.remove('show');

  // 選択肢：正解1＋ランダム3
  const others = shuffle(ANIMALS.filter(a => a.id !== q.id)).slice(0, 3);
  const choices = shuffle([q, ...others]);

  const el = document.getElementById('choices');
  el.innerHTML = choices.map(a => `
    <button class="choice-btn" onclick="answer('${a.id}', '${q.id}', this)">
      <img src="${a.img}" alt="${a.label}">
    </button>
  `).join('');
}

function answer(selected, correct, btn) {
  if (answered) return;
  answered = true;
  const fb = document.getElementById('feedback');
  const allBtns = document.querySelectorAll('.choice-btn');

  if (selected === correct) {
    btn.classList.add('correct');
    fb.textContent = '⭕ せいかい！';
    fb.className = 'feedback correct';
    score++;
  } else {
    btn.classList.add('wrong');
    fb.textContent = '❌ ちがうよ！';
    fb.className = 'feedback wrong';
    allBtns.forEach(b => {
      const img = b.querySelector('img');
      if (img && img.src.includes(correct)) b.classList.add('correct');
    });
  }

  allBtns.forEach(b => b.style.pointerEvents = 'none');
  document.getElementById('pts').textContent = `⭐ ${score}`;
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  current++;
  if (current < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('quizArea').style.display = 'none';
  const r = document.getElementById('result');
  r.classList.add('show');
  document.getElementById('resultScore').textContent = score;
  document.getElementById('resultTotal').textContent = ` / ${questions.length}もん`;
  const pct = score / questions.length;
  document.getElementById('resultEmoji').textContent = pct === 1 ? '🎉' : pct >= 0.5 ? '😊' : '😢';
  document.getElementById('resultTitle').textContent =
    pct === 1 ? 'ぜんぶできた！すごい！' :
    pct >= 0.5 ? 'よくできました！' : 'もういちどやってみよう！';
}
</script>
</body>
</html>
