<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'M PLUS Rounded 1c', 'Hiragino Kaku Gothic ProN', sans-serif;
  background: linear-gradient(160deg, #fff9e6 0%, #fff0f5 100%);
  min-height: 100vh;
  padding: 16px 12px 60px;
  color: #333;
}
.container { max-width: 480px; margin: 0 auto; }

/* ヘッダー */
.header { text-align: center; margin-bottom: 24px; }
.header h1 { font-size: 26px; font-weight: 900; color: #ff6b9d; }
.header p  { font-size: 13px; color: #aaa; margin-top: 4px; }

/* スコア */
.score-bar {
  display: flex; justify-content: space-between; align-items: center;
  background: #fff; border-radius: 14px; padding: 10px 16px;
  margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.06);
  font-size: 14px; font-weight: 700;
}
.score-bar .q-num { color: #aaa; }
.score-bar .pts   { color: #ff6b9d; font-size: 18px; }

/* 問題 */
.question-box {
  background: #fff; border-radius: 20px;
  padding: 24px 20px 20px;
  box-shadow: 0 4px 16px rgba(0,0,0,.08);
  margin-bottom: 20px;
  text-align: center;
}
.question-text {
  font-size: clamp(28px, 8vw, 40px);
  font-weight: 900; color: #333; margin-bottom: 6px;
}
.question-sub { font-size: 14px; color: #aaa; }

/* 選択肢グリッド */
.choices {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px; margin-bottom: 20px;
}
.choice-btn {
  background: #fff; border: 3px solid #e8e8e8;
  border-radius: 16px; padding: 10px; cursor: pointer;
  transition: all .15s;
  display: flex; align-items: center; justify-content: center;
  aspect-ratio: 1; overflow: hidden;
}
.choice-btn:hover { border-color: #ff6b9d; transform: scale(1.02); }
.choice-btn img { width: 100%; height: 100%; object-fit: contain; }

.choice-btn.correct {
  border-color: #28c76f; background: #f0fff6;
  animation: pop .3s ease-out;
}
.choice-btn.wrong {
  border-color: #ff4a4a; background: #fff0f0;
  animation: shake .3s;
}
@keyframes pop   { 0%{transform:scale(1)} 50%{transform:scale(1.08)} 100%{transform:scale(1)} }
@keyframes shake { 0%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} 100%{transform:translateX(0)} }

/* フィードバック */
.feedback {
  text-align: center; font-size: 22px; font-weight: 900;
  min-height: 36px; margin-bottom: 16px; transition: opacity .2s;
}
.feedback.correct { color: #28c76f; }
.feedback.wrong   { color: #ff4a4a; }

/* 次へボタン */
.next-btn {
  display: none; width: 100%;
  padding: 16px; border: none; border-radius: 14px;
  background: linear-gradient(135deg, #ff6b9d, #ff8fb1);
  color: #fff; font-size: 18px; font-weight: 900;
  cursor: pointer; font-family: inherit;
  box-shadow: 0 4px 14px rgba(255,107,157,.35);
  transition: opacity .15s;
}
.next-btn:hover { opacity: .9; }
.next-btn.show  { display: block; }

/* 結果画面 */
.result {
  display: none; text-align: center;
  background: #fff; border-radius: 20px;
  padding: 36px 20px;
  box-shadow: 0 4px 16px rgba(0,0,0,.08);
}
.result.show { display: block; }
.result-emoji { font-size: 64px; margin-bottom: 12px; }
.result-title { font-size: 24px; font-weight: 900; margin-bottom: 8px; color: #ff6b9d; }
.result-score { font-size: 48px; font-weight: 900; color: #333; margin-bottom: 20px; }
.result-score span { font-size: 20px; color: #aaa; }
.retry-btn {
  width: 100%; padding: 16px; border: none; border-radius: 14px;
  background: linear-gradient(135deg, #ff6b9d, #ff8fb1);
  color: #fff; font-size: 18px; font-weight: 900;
  cursor: pointer; font-family: inherit; margin-bottom: 12px;
  box-shadow: 0 4px 14px rgba(255,107,157,.35);
}
.home-btn {
  display: block; text-align: center; color: #aaa;
  font-size: 14px; font-weight: 700; text-decoration: none; margin-top: 4px;
}

/* ガチャオーバーレイ */
.gacha-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(30,0,60,.88); z-index: 100;
  flex-direction: column; align-items: center; justify-content: center; padding: 24px;
}
.gacha-overlay.show { display: flex; }
.gacha-card {
  background: #fff; border-radius: 24px; padding: 32px 24px;
  text-align: center; max-width: 320px; width: 100%;
}
.gacha-label { font-size: 14px; font-weight: 700; color: #9B7BE8; margin-bottom: 8px; }
.gacha-art   { width: 100px; height: 100px; margin: 0 auto 12px; font-size: 60px;
               display: flex; align-items: center; justify-content: center; }
.gacha-art img { width: 100%; height: 100%; object-fit: contain; }
.gacha-rarity { font-size: 13px; font-weight: 900; margin-bottom: 4px; }
.gacha-name   { font-size: 22px; font-weight: 900; color: #333; margin-bottom: 8px; }
.gacha-flavor { font-size: 12px; color: #aaa; margin-bottom: 20px; white-space: pre-line; }
.gacha-close  {
  width: 100%; padding: 14px; border: none; border-radius: 12px;
  background: linear-gradient(135deg, #9B7BE8, #7C5CBF);
  color: #fff; font-size: 16px; font-weight: 900;
  cursor: pointer; font-family: inherit;
}

@media (max-width: 768px) {
  body { min-height: unset; padding-bottom: 40px; }
}

<body>
<header class="site-header">
  <a class="site-logo" href="index.html">
    <span class="site-logo__icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="#fff" stroke-width="2.2" stroke-linejoin="round"/>
        <path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="#fff" stroke-width="2.2" stroke-linejoin="round"/>
      </svg>

<div class="container">

  <div class="header">
    <h1>🧒 からだはどこ？</h1>
    <p>えをみて こたえよう！</p>
  </div>

  <!-- クイズエリア -->
  <div id="quizWrap">
    <div class="score-bar">
      <span class="q-num" id="qNum">1 / 5もん</span>
      <span class="pts" id="pts">⭐ 0</span>
      <button id="soundBtn" onclick="toggleSound()" style="background:none;border:none;font-size:20px;cursor:pointer;line-height:1;" title="音ON/OFF">🔊</button>
    </div>

    <div id="quizArea">
      <div class="question-box">
        <div class="question-text" id="questionText"></div>
        <div class="question-sub">ただしいえをえらんでね</div>
      </div>
      <div class="choices" id="choices"></div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">つぎへ →</button>
    </div>

    <!-- 結果エリア -->
    <div class="result" id="result">
      <div class="result-emoji" id="resultEmoji">🎉</div>
      <div class="result-title" id="resultTitle">ぜんぶできた！</div>
      <div class="result-score"><span id="resultScore">0</span><span id="resultTotal"> / 5もん</span></div>
      <button id="gachaBtnResult" onclick="triggerGachaReward()" style="display:none;width:100%;padding:14px;margin-bottom:10px;background:linear-gradient(135deg,#a855f7,#7c3aed);border:none;border-radius:14px;color:#fff;font-size:17px;font-weight:900;cursor:pointer;box-shadow:0 4px 16px rgba(168,85,247,.45);">🎰 ガチャを引く！</button>
      <button class="retry-btn" id="retryBtn">もういちど！</button>
      <a class="home-btn" href="index.html">← もどる</a>
    </div>
  </div>

</div>

    <div class="gacha-art" id="gachaCardArt"></div>
    <div class="gacha-rarity" id="gachaCardRarity"></div>
    <div class="gacha-name" id="gachaCardName"></div>
    <div class="gacha-flavor" id="gachaCardFlavor"></div>
    <button class="gacha-close" onclick="document.getElementById('gachaOverlay').classList.remove('show')">とじる</button>
  </div>
</div>

<script>
const QUIZ_ID = 'kids-body';

const PARTS = [
  { id: 'hand',  label: 'て',    img: 'assets/img/body-parts/hand.png'  },
  { id: 'foot',  label: 'あし',  img: 'assets/img/body-parts/foot.png'  },
  { id: 'eye',   label: 'め',    img: 'assets/img/body-parts/eye.png'   },
  { id: 'ear',   label: 'みみ',  img: 'assets/img/body-parts/ear.png'   },
  { id: 'nose',  label: 'はな',  img: 'assets/img/body-parts/nose.png'  },
  { id: 'mouth', label: 'くち',  img: 'assets/img/body-parts/mouth.png' },
  { id: 'belly', label: 'おなか',img: 'assets/img/body-parts/belly.png' },
  { id: 'face',  label: 'かお',  img: 'assets/img/body-parts/face.png'  },
];

let questions = [], current = 0, score = 0, answered = false, modeCount = 5;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz(count) {
  modeCount = count;
  questions = shuffle(PARTS).slice(0, count);
  current = 0; score = 0; answered = false;
  document.getElementById('result').classList.remove('show');
  document.getElementById('quizArea').style.display = '';
  document.getElementById('retryBtn').onclick = () => startQuiz(modeCount);
  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = questions[current];
  document.getElementById('qNum').textContent = `${current+1} / ${questions.length}もん`;
  document.getElementById('pts').textContent = `⭐ ${score}`;
  document.getElementById('questionText').textContent = `「${q.label}」はどれ？`;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('nextBtn').classList.remove('show');

  const others = shuffle(PARTS.filter(p => p.id !== q.id)).slice(0, 3);
  const choices = shuffle([q, ...others]);

  const el = document.getElementById('choices');
  el.innerHTML = choices.map(p => `
    <button class="choice-btn" onclick="answer('${p.id}', '${q.id}', this)">
      <img src="${p.img}" alt="${p.label}">
    </button>
  `).join('');
}

function answer(selected, correct, btn) {
  if (answered) return;
  answered = true;
  const fb = document.getElementById('feedback');
  const allBtns = document.querySelectorAll('.choice-btn');

  if (selected === correct) {
    btn.classList.add('correct'); SND.play('correct');
    fb.textContent = '⭕ せいかい！';
    fb.className = 'feedback correct';
    score++;
  } else {
    btn.classList.add('wrong'); SND.play('wrong');
    fb.textContent = '❌ ちがうよ！';
    fb.className = 'feedback wrong';
    allBtns.forEach(b => {
      const img = b.querySelector('img');
      if (img && img.src.includes(correct)) b.classList.add('correct');
    });
  }

  allBtns.forEach(b => b.style.pointerEvents = 'none');
  document.getElementById('pts').textContent = `⭐ ${score}`;
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  current++;
  if (current < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('quizArea').style.display = 'none';
  const r = document.getElementById('result');
  r.classList.add('show');
  document.getElementById('resultScore').textContent = score;
  document.getElementById('resultTotal').textContent = ` / ${questions.length}もん`;
  const pct = score / questions.length;
  document.getElementById('resultEmoji').textContent = pct === 1 ? '🎉' : pct >= 0.5 ? '😊' : '😢';
  document.getElementById('resultTitle').textContent =
    pct === 1 ? 'ぜんぶできた！すごい！' :
    pct >= 0.5 ? 'よくできました！' : 'もういちどやってみよう！';

  // ガチャ連携（全問正解のみ1連）
  if (typeof claimQuizGacha === 'function') {
    const { pulls, results } = claimQuizGacha(QUIZ_ID, score, questions.length);
    if (pulls > 0 && results && results.length > 0) {
      _pendingGacha = results[0];
      setTimeout(() => {
        const btn = document.getElementById('gachaBtnResult');
        if (btn) btn.style.display = 'block';
      }, 600);
    }
  }
}

let _gachaResults = [];
let _gachaIdx = 0;
let _gachaStarsReady = false;

function gachaClose() {
  const ov = document.getElementById('gachaRewardOverlay');
  ov.style.transition = 'opacity .4s ease';
  ov.style.opacity = '0';
  setTimeout(() => { ov.classList.remove('show'); ov.style.opacity = ''; _gachaReset(); }, 400);
}
function _gachaReset() {
  const qm = document.getElementById('gachaQmark');
  const cw = document.getElementById('gachaCardWrap');
  const ci = document.getElementById('gachaCardInner');
  const banner = document.getElementById('gachaRarityBanner');
  qm.className = ''; qm.style.cssText = '';
  document.getElementById('gachaFlash').classList.remove('active');
  cw.classList.remove('reveal'); cw.style.opacity = '0';
  ci.className = ''; banner.className = ''; banner.classList.remove('show'); banner.textContent = '';
  document.getElementById('gachaNextBtn').classList.remove('show');
  document.getElementById('gachaCloseBtn').classList.remove('show');
  document.getElementById('gachaNorewardPhase').classList.remove('show');
  document.getElementById('gachaParticles').innerHTML = '';
  document.getElementById('gachaCounter').textContent = '';
}
function _gachaInitStars() {
  if (_gachaStarsReady) return;
  const sf = document.getElementById('gachaStarField');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    const sz = Math.random() * 3 + 1;
    s.className = 'g-star';
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${1+Math.random()*3}s;animation-delay:${Math.random()*3}s`;
    sf.appendChild(s);
  }
  _gachaStarsReady = true;
}
function _gachaParticles(rarity) {
  const con = document.getElementById('gachaParticles');
  con.innerHTML = '';
  const palettes = { n:['#F6C744','#2563EB','#fff','#60a5fa'], r:['#60a5fa','#2563EB','#fff'], sr:['#a78bfa','#7c3aed','#F6C744','#fff'], ssr:['#ffd700','#ff6b35','#ff1493','#00bfff','#fff','#a78bfa'] };
  const colors = palettes[rarity] || palettes.n;
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    const isStar = Math.random() > 0.5;
    p.className = 'g-particle' + (isStar ? ' star-shape' : '');
    const sz = Math.random() * 16 + 6;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const angle = (Math.PI * 2 * i) / 60 + Math.random() * 0.3;
    const dist = 150 + Math.random() * 300;
    const tx = Math.cos(angle) * dist, ty = Math.sin(angle) * dist;
    p.style.cssText = `width:${sz}px;height:${sz}px;left:${cx}px;top:${cy}px;background:${color};box-shadow:0 0 ${sz}px ${color};transform:translate(-50%,-50%)`;
    con.appendChild(p);
    p.animate([{transform:'translate(-50%,-50%) scale(1)',opacity:1},{transform:`translate(calc(-50% + ${tx}px),calc(-50% + ${ty}px)) scale(0)`,opacity:0}],{duration:600+Math.random()*600,delay:Math.random()*100,easing:'cubic-bezier(0,0,0.2,1)',fill:'forwards'});
  }
}
function _gachaCardHTML(result) {
  const c = result.card, r = c.rarity;
  const labels = {n:'N',r:'R',sr:'SR',ssr:'SSR'};
  const rings = [30,72,114,156,198,240,282,324,366].map(t => `<div class="g-ring" style="top:${t}px"></div>`).join('');
  return `<div class="g-card-outer ${r}">${rings}<div class="g-card-paper"><div class="g-badge ${r}">${labels[r]||r.toUpperCase()}</div><div class="g-char-area"><div class="g-char-emoji">${cardArt(c)}</div></div><div class="g-name-area"><div class="g-char-name">${c.name}</div>${result.isNew ? '<div class="g-char-new">NEW!</div>' : ''}</div></div></div>`;
}
function _gachaBanner(rarity) {
  const cfg = {n:{cls:'',text:'✦ NORMAL ✦'},r:{cls:'',text:'✦ RARE ✦'},sr:{cls:'sr-banner',text:'✦ SUPER RARE ✦'},ssr:{cls:'ssr-banner',text:'🌈 SUPER SUPER RARE 🌈'}};
  return cfg[rarity] || cfg.n;
}
function _gachaShowCard(idx, fullAnim) {
  const result = _gachaResults[idx];
  const total = _gachaResults.length;
  document.getElementById('gachaCounter').textContent = total > 1 ? `${idx+1} / ${total}枚` : '';
  document.getElementById('gachaCardFront').innerHTML = _gachaCardHTML(result);
  const banner = document.getElementById('gachaRarityBanner');
  const bannerCfg = _gachaBanner(result.card.rarity);
  const ov = document.getElementById('gachaRewardOverlay');
  const qm = document.getElementById('gachaQmark');
  const cw = document.getElementById('gachaCardWrap');
  const ci = document.getElementById('gachaCardInner');
  const revealCard = () => {
    qm.classList.add('explode');
    document.getElementById('gachaFlash').classList.add('active');
    setTimeout(() => {
      qm.style.opacity = '0'; cw.style.opacity = '1'; cw.classList.add('reveal'); ci.classList.add('flip');
      _gachaParticles(result.card.rarity);
      setTimeout(() => {
        banner.className = bannerCfg.cls; banner.textContent = bannerCfg.text; banner.classList.add('show');
        const isLast = idx === _gachaResults.length - 1;
        if (!isLast) {
          const nb = document.getElementById('gachaNextBtn'); nb.textContent = '次のカード →'; nb.classList.add('show');
          nb.onclick = () => { nb.classList.remove('show'); _gachaReset(); _gachaShowCard(idx + 1, true); };
        } else {
          const cb = document.getElementById('gachaCloseBtn');
          cb.textContent = _gachaResults.length > 1 ? '全部見た！とじる' : 'とじる'; cb.classList.add('show'); cb.onclick = gachaClose;
        }
      }, 600);
    }, 250);
  };
  if (fullAnim) {
    qm.classList.add('appear');
    setTimeout(() => {
      qm.classList.add('pulse');
      const tapHandler = (e) => {
        if (e.target.closest && (e.target.closest('#gachaNextBtn') || e.target.closest('#gachaCloseBtn'))) return;
        ov.removeEventListener('click', tapHandler); revealCard();
      };
      ov.addEventListener('click', tapHandler);
    }, 700);
  } else { revealCard(); }
}
function triggerGachaReward() {
  const btn = document.getElementById('gachaBtnResult');
  if (btn) btn.style.display = 'none';
  if (!document.getElementById('gachaRewardOverlay')) {
    const el = document.createElement('div');
    el.className = 'gacha-reward-overlay'; el.id = 'gachaRewardOverlay';
    el.innerHTML = `<div id="gachaFlash"></div><div id="gachaStarField"></div><div id="gachaQmark">？</div><div id="gachaParticles"></div><div id="gachaCounter"></div><div id="gachaCardWrap"><div id="gachaCardInner"><div id="gachaCardFront"></div></div></div><div id="gachaRarityBanner"></div><button id="gachaNextBtn"></button><button id="gachaCloseBtn">とじる</button><div id="gachaNorewardPhase"><div style="font-size:48px">😢</div><div style="color:rgba(255,255,255,.8);font-size:16px;font-weight:700">今回は報酬なし</div><div style="color:rgba(255,255,255,.6);font-size:13px">80%以上の正解でガチャが引けるよ！</div></div>`;
    document.body.appendChild(el);
  }
  const { pulls, results } = claimQuizGacha(QUIZ_ID, score, questions.length);
  const ov = document.getElementById('gachaRewardOverlay');
  ov.classList.add('show'); _gachaInitStars();
  if (pulls === 0 || results.length === 0) {
    document.getElementById('gachaNorewardPhase').classList.add('show');
    const cb = document.getElementById('gachaCloseBtn'); cb.textContent = 'とじる'; cb.classList.add('show'); cb.onclick = gachaClose;
    return;
  }
  _gachaResults = results; _gachaIdx = 0; _gachaReset(); _gachaShowCard(0, true);
}

// ── サウンド ──
const SND = {
  enabled: localStorage.getItem('sndEnabled') !== 'false',
  correct: new Audio('assets/audio/correct.mp3'),
  wrong:   new Audio('assets/audio/wrong.mp3'),
  play(type) {
    if (!this.enabled) return;
    this[type].cloneNode().play().catch(()=>{});
  }
};
function toggleSound() {
  SND.enabled = !SND.enabled;
  localStorage.setItem('sndEnabled', SND.enabled);
  document.getElementById('soundBtn').textContent = SND.enabled ? '🔊' : '🔇';
}

document.addEventListener('DOMContentLoaded', () => {
  const btn = document.getElementById('soundBtn');
  if (btn) btn.textContent = SND.enabled ? '🔊' : '🔇';
  const params = new URLSearchParams(location.search);
  const count = parseInt(params.get('count')) || 5;
  startQuiz(count);
});
</script>
