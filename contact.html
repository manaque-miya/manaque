<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ｜まなクエ！</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800;900&display=swap" rel="stylesheet">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-LDNLC7PWNM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-LDNLC7PWNM');
  </script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:"M PLUS Rounded 1c",sans-serif;background:#EAF2FE;color:#2B3858;min-height:100vh;}
    .header{background:rgba(255,255,255,.95);border-bottom:1px solid #E4E9F2;padding:14px 32px;}
    .header__inner{max-width:800px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;}
    .logo{display:inline-flex;align-items:center;gap:8px;text-decoration:none;font-size:20px;font-weight:900;color:#0F1830;}
    .logo span{color:#1F56C6;}
    .logo__icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#2E6DE5,#1A449E);display:grid;place-items:center;}
    .back{font-size:13px;font-weight:700;color:#1F56C6;text-decoration:none;}
    .main{max-width:800px;margin:0 auto;padding:48px 24px 80px;}
    .page-title{font-size:28px;font-weight:900;color:#0F1830;margin-bottom:8px;}
    .page-meta{font-size:13px;color:#8693AE;margin-bottom:40px;}
    .card{background:#fff;border-radius:20px;padding:32px;margin-bottom:24px;box-shadow:0 2px 8px rgba(30,50,110,.06);}
    h2{font-size:16px;font-weight:800;color:#0F1830;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #EAF2FE;}
    p{font-size:14px;line-height:1.9;color:#2B3858;margin-bottom:10px;}
    p:last-child{margin-bottom:0;}

    /* フォーム */
    .form-group{margin-bottom:20px;}
    .form-label{display:block;font-size:13px;font-weight:800;color:#0F1830;margin-bottom:8px;}
    .form-label .required{color:#E53E3E;font-size:11px;margin-left:4px;}
    .form-input, .form-select, .form-textarea{
      width:100%;padding:12px 16px;
      border:1.5px solid #DBE1EC;border-radius:12px;
      font-family:"M PLUS Rounded 1c",sans-serif;
      font-size:14px;color:#2B3858;
      background:#fff;
      transition:border-color .15s;
      outline:none;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus{border-color:#1F56C6;}
    .form-textarea{resize:vertical;min-height:140px;line-height:1.7;}
    .submit-btn{
      width:100%;padding:16px;
      background:linear-gradient(135deg,#2E6DE5,#1A449E);
      color:#fff;font-family:"M PLUS Rounded 1c",sans-serif;
      font-size:16px;font-weight:900;
      border:none;border-radius:12px;cursor:pointer;
      transition:opacity .15s, transform .15s;
    }
    .submit-btn:hover{opacity:.88;transform:translateY(-1px);}
    .submit-btn:active{transform:translateY(1px);}

    /* 送信後メッセージ */
    .thankyou{display:none;text-align:center;padding:40px 0;}
    .thankyou.show{display:block;}
    .thankyou-icon{font-size:52px;margin-bottom:16px;}
    .thankyou-title{font-size:22px;font-weight:900;color:#0F1830;margin-bottom:10px;}
    .thankyou-text{font-size:14px;color:#5B6785;line-height:1.8;}

    .note{font-size:12px;color:#8693AE;margin-top:8px;line-height:1.7;}
    .email-direct{display:inline-flex;align-items:center;gap:6px;background:#EAF2FE;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:700;color:#1F56C6;text-decoration:none;}
  </style>
</head>
<body>
<header class="header">
  <div class="header__inner">
    <a class="logo" href="index.html">
      <span class="logo__icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="#fff" stroke-width="2.2" stroke-linejoin="round"/>
          <path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="#fff" stroke-width="2.2" stroke-linejoin="round"/>
        </svg>
      </span>
      まな<span>クエ！</span>
    </a>
    <a class="back" href="index.html">← TOPにもどる</a>
  </div>
</header>

<main class="main">
  <div class="page-title">お問い合わせ</div>
  <div class="page-meta">内容を確認のうえ、3営業日以内にご返信します</div>

  <div class="card">
    <h2>お問い合わせフォーム</h2>

    <!-- Formspree：action の YOUR_FORM_ID を差し替えてください -->
    <form id="contactForm" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">

      <div class="form-group">
        <label class="form-label" for="name">お名前<span class="required">必須</span></label>
        <input class="form-input" type="text" id="name" name="name" placeholder="例：田中 太郎" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">メールアドレス<span class="required">必須</span></label>
        <input class="form-input" type="email" id="email" name="email" placeholder="例：example@gmail.com" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="category">お問い合わせ種別</label>
        <select class="form-select" id="category" name="category">
          <option value="question">クイズ内容について</option>
          <option value="bug">不具合・バグ報告</option>
          <option value="ad">広告・掲載について</option>
          <option value="other">その他</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" for="message">お問い合わせ内容<span class="required">必須</span></label>
        <textarea class="form-textarea" id="message" name="message" placeholder="お問い合わせ内容をご記入ください。" required></textarea>
      </div>

      <button type="submit" class="submit-btn">送信する →</button>
    </form>

    <div class="thankyou" id="thankyou">
      <div class="thankyou-icon">✅</div>
      <div class="thankyou-title">送信しました！</div>
      <div class="thankyou-text">お問い合わせありがとうございます。<br>内容を確認のうえ、3営業日以内にご返信いたします。</div>
    </div>

    <p class="note">直接メールでのお問い合わせも受け付けています：<br>
      <a class="email-direct" href="mailto:manaque.official@gmail.com">📧 manaque.official@gmail.com</a>
    </p>
  </div>
</main>

<script>
  const form = document.getElementById('contactForm');
  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    const data = new FormData(form);
    const res = await fetch(form.action, {
      method: 'POST',
      body: data,
      headers: { 'Accept': 'application/json' }
    });
    if (res.ok) {
      form.style.display = 'none';
      document.getElementById('thankyou').classList.add('show');
    } else {
      alert('送信に失敗しました。お手数ですが、直接メールにてご連絡ください。');
    }
  });
</script>
</body>
</html>
