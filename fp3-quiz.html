<style>
:root {
  --brand: #16a34a; --brand-d: #15803d; --brand-l: #f0fdf4;
  --ink: #1e293b; --muted: #64748b; --border: #e2e8f0;
  --bg: #f6fdf8; --white: #fff;
  --correct: #16a34a; --wrong: #dc2626;
  --r: 14px; --r-lg: 18px;
  font-family: 'M PLUS Rounded 1c', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--ink); min-height: 100vh; }

.site-header {
  position: sticky; top: 0; z-index: 100;
  background: #fff; border-bottom: 1.5px solid var(--border);
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px; box-shadow: 0 2px 8px rgba(22,163,74,.07);
}
.site-header__logo { font-size: 18px; font-weight: 900; color: var(--brand); text-decoration: none; }
.site-header__back { font-size: 13px; color: var(--muted); text-decoration: none; margin-left: auto; }

.screen { display: none; max-width: 680px; margin: 0 auto; padding: 20px 16px 40px; }
.screen.active { display: block; }

/* HERO */
.hero-banner {
  background: linear-gradient(135deg, #15803d 0%, #064e1d 55%, #166534 100%);
  margin: -20px -16px 24px; padding: 28px 20px 24px;
  position: relative; overflow: hidden;
}
.hero-banner::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at 70% 50%, rgba(255,255,255,.06) 0%, transparent 60%);
}
.hero-banner__stars {
  position: absolute; inset: 0; pointer-events: none;
  background-image:
    radial-gradient(circle 2px at 15% 20%, rgba(255,255,255,.6) 0%, transparent 100%),
    radial-gradient(circle 1.5px at 82% 15%, rgba(255,255,255,.5) 0%, transparent 100%),
    radial-gradient(circle 2px at 90% 70%, rgba(255,255,255,.4) 0%, transparent 100%),
    radial-gradient(circle 1px at 5% 80%, rgba(255,255,255,.6) 0%, transparent 100%),
    radial-gradient(circle 1.5px at 50% 8%, rgba(255,255,255,.5) 0%, transparent 100%);
}
.hero-inner { display: flex; align-items: center; gap: 0; position: relative; }
.hero-text { flex: 1; }
.hero-badge {
  display: inline-block; background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.35);
  color: rgba(255,255,255,.95); font-size: 11px; font-weight: 800;
  padding: 3px 12px; border-radius: 20px; margin-bottom: 10px; letter-spacing: .05em;
}
.hero-title { font-size: 15px; font-weight: 900; color: rgba(255,255,255,.9); margin-bottom: 4px; line-height: 1.3; }
.hero-big { font-size: 46px; font-weight: 900; color: #fff; line-height: 1.05; margin-bottom: 6px; text-shadow: 0 2px 12px rgba(0,0,0,.3); }
.hero-big em { color: #86efac; font-style: normal; }
.hero-sub { font-size: 12px; color: rgba(255,255,255,.75); line-height: 1.6; }
.hero-chara { width: 110px; flex-shrink: 0; filter: drop-shadow(0 4px 16px rgba(0,0,0,.3)); animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

/* FEATURES */
.feature-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 24px; }
.feature-card { background: #fff; border: 1px solid var(--border); border-radius: var(--r); padding: 12px 8px; text-align: center; }
.feature-card__icon { font-size: 22px; display: block; margin-bottom: 4px; }
.feature-card__label { font-size: 11px; font-weight: 800; color: var(--brand); display: block; margin-bottom: 2px; }
.feature-card__desc { font-size: 10px; color: var(--muted); line-height: 1.4; }

/* STATS */
.stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 24px; }
.stat-card { background: #fff; border: 1px solid var(--border); border-radius: var(--r); padding: 12px; text-align: center; }
.stat-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.stat-val { font-size: 20px; font-weight: 900; color: var(--brand); }

/* MODE */
.mode-section { margin-bottom: 20px; }
.mode-title { font-size: 14px; font-weight: 800; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .05em; }
.mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.mode-btn { background: #fff; border: 1.5px solid var(--border); border-radius: var(--r-lg); padding: 14px 12px; cursor: pointer; text-align: left; transition: all .15s; font-family: inherit; }
.mode-btn:hover { border-color: var(--brand); background: var(--brand-l); }
.mode-btn.selected { border-color: var(--brand); background: var(--brand-l); box-shadow: 0 0 0 2px rgba(22,163,74,.15); }
.mode-btn__icon { font-size: 22px; display: block; margin-bottom: 6px; }
.mode-btn__title { font-size: 14px; font-weight: 800; color: var(--ink); display: block; }
.mode-btn__desc { font-size: 11px; color: var(--muted); display: block; margin-top: 2px; }

/* COUNT */
.count-section { margin-bottom: 20px; }
.count-grid { display: flex; gap: 8px; flex-wrap: wrap; }
.count-btn { background: #fff; border: 1.5px solid var(--border); border-radius: 30px; padding: 8px 20px; font-size: 14px; font-weight: 800; cursor: pointer; font-family: inherit; transition: all .15s; color: var(--ink); }
.count-btn:hover { border-color: var(--brand); color: var(--brand); }
.count-btn.selected { background: var(--brand); border-color: var(--brand); color: #fff; }

.wrong-empty { text-align: center; color: var(--muted); font-size: 14px; padding: 20px; display: none; }
.sub-options { margin-top: 12px; display: none; }
.sub-options.show { display: block; }
.sub-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.sub-btn { background: #fff; border: 1.5px solid var(--border); border-radius: 30px; padding: 7px 16px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .15s; color: var(--ink); }
.sub-btn:hover { border-color: var(--brand); color: var(--brand); }
.sub-btn.selected { background: var(--brand); border-color: var(--brand); color: #fff; }
.cat-badge { font-size: 11px; font-weight: 800; padding: 3px 10px; border-radius: 20px; white-space: nowrap; background: #d1fae5; color: #065f46; }

.start-go-wrap { position: relative; margin-top: 8px; }
.start-go-new { width: 100%; padding: 18px; background: linear-gradient(135deg,#f43f5e,#e11d48); border: none; border-radius: var(--r-lg); color: #fff; font-size: 18px; font-weight: 900; cursor: pointer; font-family: inherit; box-shadow: 0 4px 0 #9f1239,0 8px 24px rgba(244,63,94,.35); transition: all .12s; letter-spacing: .03em; }
.start-go-new:active { transform: translateY(3px); box-shadow: 0 1px 0 #9f1239; }

/* QUIZ */
.quiz-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.quiz-progress-wrap { flex: 1; }
.quiz-progress-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.quiz-progress-fill { height: 100%; background: var(--brand); border-radius: 4px; transition: width .3s; }
.quiz-counter { font-size: 13px; font-weight: 700; color: var(--muted); white-space: nowrap; }

.question-card { background: #fff; border-radius: var(--r-lg); padding: 20px; border: 1px solid var(--border); margin-bottom: 16px; }
.question-text { font-size: 16px; font-weight: 700; line-height: 1.7; color: var(--ink); }
/* FP3図表テーブル */
.fp3-table{border-collapse:collapse;width:100%;font-size:clamp(11px,2.8vw,14px);font-weight:600;margin:10px 0}
.fp3-table th,.fp3-table td{border:1px solid #c0c8d8;padding:5px 7px;text-align:center}
.fp3-table th{background:#d1fae5;color:#065f46}
.fp3-table tr:nth-child(even) td{background:#f0fdf4}

.options-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.option-btn { background: #fff; border: 1.5px solid var(--border); border-radius: var(--r); padding: 14px 16px; font-size: 15px; font-weight: 700; text-align: left; cursor: pointer; font-family: inherit; color: var(--ink); transition: all .12s; display: flex; align-items: center; gap: 10px; line-height: 1.5; }
.option-btn:hover:not(:disabled) { border-color: var(--brand); background: var(--brand-l); }
.option-btn:disabled { cursor: default; }
.option-btn.correct { border-color: var(--correct); background: #f0fdf4; color: var(--correct); }
.option-btn.wrong { border-color: var(--wrong); background: #fef2f2; color: var(--wrong); }
.option-label { font-size: 12px; font-weight: 900; width: 22px; height: 22px; border-radius: 50%; background: var(--border); color: var(--muted); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.option-btn.correct .option-label { background: var(--correct); color: #fff; }
.option-btn.wrong .option-label { background: var(--wrong); color: #fff; }

/* EXP */
.exp-card { display: none; background: #fff; border-radius: var(--r-lg); border: 1px solid var(--border); overflow: hidden; margin-bottom: 14px; }
.exp-card.show { display: block; }
.exp-result-bar { padding: 12px 16px; font-size: 15px; font-weight: 900; }
.exp-result-bar.correct { background: #f0fdf4; color: var(--correct); }
.exp-result-bar.wrong { background: #fef2f2; color: var(--wrong); }
.exp-sensei { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
.exp-sensei img { width: 56px; flex-shrink: 0; }
.exp-bubble { background: var(--bg); border-radius: 2px 12px 12px 12px; padding: 10px 14px; font-size: 13px; line-height: 1.7; color: var(--ink); flex: 1; }
.exp-text { padding: 14px 16px; font-size: 13px; line-height: 1.8; color: var(--ink); border-top: 1px solid var(--border); }
.exp-label { font-size: 11px; font-weight: 800; color: var(--muted); margin-bottom: 6px; }

.next-btn { width: 100%; padding: 16px; background: var(--brand); border: none; border-radius: var(--r-lg); color: #fff; font-size: 16px; font-weight: 900; cursor: pointer; font-family: inherit; box-shadow: 0 3px 0 var(--brand-d); transition: all .12s; display: none; }
.next-btn.show { display: block; }
.next-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--brand-d); }

/* RESULT */
.result-hero { text-align: center; margin-bottom: 24px; }
.result-chara { width: 110px; margin: 0 auto 10px; display: block; }
.result-score-big { font-size: 52px; font-weight: 900; color: var(--brand); line-height: 1; }
.result-score-label { font-size: 14px; color: var(--muted); margin-top: 4px; }
.result-msg { font-size: 15px; font-weight: 700; color: var(--ink); margin-top: 12px; }
.result-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
.result-btn { padding: 14px; border-radius: var(--r-lg); font-size: 14px; font-weight: 800; cursor: pointer; font-family: inherit; border: none; transition: all .12s; }
.result-btn--retry { background: var(--brand); color: #fff; box-shadow: 0 3px 0 var(--brand-d); }
.result-btn--wrong { background: #fff; border: 1.5px solid var(--wrong); color: var(--wrong); }
.result-btn--home { background: #fff; border: 1.5px solid var(--border); color: var(--muted); }
.gacha-btn { width: 100%; padding: 16px; margin-top: 12px; background: linear-gradient(135deg,#a855f7,#7c3aed); border: none; border-radius: var(--r-lg); color: #fff; font-size: 17px; font-weight: 900; cursor: pointer; font-family: inherit; box-shadow: 0 4px 16px rgba(124,58,237,.4); display: none; animation: pulse .9s ease-in-out infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }

@media (max-width:600px){
  .hero-big { font-size: 36px; }
  .hero-chara { width: 85px; }
  .feature-row { grid-template-columns: repeat(2,1fr); }
  .hero-banner { padding: 22px 16px 20px; }
  .stats-row { grid-template-columns: 1fr 1fr; }
  .start-go-new { font-size: 16px; padding: 15px; }
}

let _pool = [], _idx = 0, _score = 0, _answered = [];

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { return {}; }
}
function saveHistory(h) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(h)); } catch(e) {}
}
function getWrongIds() {
  const h = loadHistory();
  return Object.keys(h).filter(id => (h[id].wrong || 0) > (h[id].correct || 0)).map(Number);
}

function updateStats() {
  const h = loadHistory();
  const ids = Object.keys(h);
  const solved = ids.length;
  const correct = ids.reduce((s,id) => s + (h[id].correct||0), 0);
  const total = ids.reduce((s,id) => s + (h[id].correct||0) + (h[id].wrong||0), 0);
  document.getElementById('statSolved').textContent = solved;
  document.getElementById('statAccuracy').textContent = total > 0 ? Math.round(correct/total*100) + '%' : '-';
}

function selectMode(mode) {
  _mode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('selected', b.dataset.mode === mode));
  document.getElementById('subCategory').classList.toggle('show', mode === 'category');
  document.getElementById('subDifficulty').classList.toggle('show', mode === 'difficulty');
  document.getElementById('wrongEmpty').style.display = 'none';
  if (mode === 'wrong') {
    const ids = getWrongIds();
    if (ids.length === 0) document.getElementById('wrongEmpty').style.display = 'block';
  }
}

function selectSub(btn) {
  const parent = btn.parentElement;
  parent.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  _sub = btn.dataset.sub;
}

function selectCount(btn) {
  document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  _count = parseInt(btn.dataset.n);
}

function buildPool() {
  let pool = FP3_QUESTIONS.map((q, i) => Object.assign({ _idx: i }, q));
  if (_mode === 'category') pool = pool.filter(q => q.cat === _sub);
  else if (_mode === 'difficulty') pool = pool.filter(q => q.diff === _sub);
  else if (_mode === 'wrong') {
    const ids = new Set(getWrongIds());
    pool = pool.filter(q => ids.has(q._idx));
  }
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return _count > 0 ? pool.slice(0, _count) : pool;
}

function startQuiz() {
  _pool = buildPool();
  if (_pool.length === 0) { alert('該当する問題がありません'); return; }
  _idx = 0; _score = 0; _answered = [];
  showScreen('screenQuiz');
  renderQuestion();
}

function renderQuestion() {
  const q = _pool[_idx];
  const total = _pool.length;
  document.getElementById('progressFill').style.width = (_idx / total * 100) + '%';
  document.getElementById('quizCounter').textContent = `${_idx + 1} / ${total}`;
  const badge = document.getElementById('catBadge');
  if (q.cat) { badge.textContent = q.cat; badge.style.display = 'inline-block'; }
  else { badge.style.display = 'none'; }

  const labels = ['ア', 'イ', 'ウ', 'エ'];
  // innerHTML使用（実技の図表HTMLを展開するため）
  document.getElementById('questionText').innerHTML = q.text;

  const list = document.getElementById('optionsList');
  list.innerHTML = q.choices.map((opt, i) => `
    <button class="option-btn" onclick="selectAnswer(${i})">
      <span class="option-label">${labels[i]}</span>
      <span>${opt}</span>
    </button>`).join('');

  document.getElementById('expCard').classList.remove('show');
  document.getElementById('nextBtn').classList.remove('show');
}

const MSG_OK = ['……正解。よくできました。','その調子よ。基礎は大事にしなさい。','正解！問題の本質を見抜いたわね。','できるじゃない。この問題は重要よ。'];
const MSG_NG = ['まったく……基礎から見直しなさい。','惜しいわね。解説をよく読んで。','次は気をつけて。これは頻出問題よ。','ここで間違える人が多いの。しっかり覚えて。'];

function selectAnswer(idx) {
  const q = _pool[_idx];
  const isCorrect = idx === q.answer;
  if (isCorrect) _score++;

  const h = loadHistory();
  const key = q._idx;
  if (!h[key]) h[key] = { correct: 0, wrong: 0 };
  isCorrect ? h[key].correct++ : h[key].wrong++;
  saveHistory(h);

  _answered.push({ q, chosen: idx, correct: isCorrect });

  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.answer) btn.classList.add('correct');
    else if (i === idx && !isCorrect) btn.classList.add('wrong');
  });

  const exp = document.getElementById('expCard');
  exp.classList.add('show');
  const bar = document.getElementById('expResultBar');
  bar.className = `exp-result-bar ${isCorrect ? 'correct' : 'wrong'}`;
  bar.textContent = isCorrect ? '⭕ 正解！' : '✕ 不正解';
  const msgs = isCorrect ? MSG_OK : MSG_NG;
  document.getElementById('expBubble').textContent = msgs[Math.floor(Math.random() * msgs.length)];
  document.getElementById('expText').textContent = q.exp;

  document.getElementById('nextBtn').classList.add('show');
  document.getElementById('nextBtn').textContent = _idx + 1 < _pool.length ? '次の問題 →' : '結果を見る →';
}

function nextQuestion() {
  _idx++;
  if (_idx >= _pool.length) { showResult(); return; }
  renderQuestion();
}

function showResult() {
  showScreen('screenResult');
  const total = _pool.length;
  const pct = Math.round(_score / total * 100);
  document.getElementById('resultScore').textContent = _score;
  document.getElementById('resultScoreLabel').textContent = `/ ${total}問正解（${pct}%）`;
  const msgs = pct >= 80 ? ['……合格圏ね。この調子で。','悪くないわ。本番でも実力を出しなさい。']
              : pct >= 60 ? ['まあまあね。あと少しで合格圏よ。','惜しい。間違えた問題を復習しなさい。']
              : ['基礎が抜けているわ。解説を読み直して。','まだまだね。諦めずに続けなさい。'];
  document.getElementById('resultMsg').textContent = msgs[Math.floor(Math.random() * msgs.length)];

  if (typeof calcGachaPulls === 'function') {
    const pulls = calcGachaPulls(_score, total);
    const btn = document.getElementById('gachaBtnResult');
    if (btn && pulls > 0) { btn.style.display = 'block'; btn.textContent = `🎰 ガチャを引く！（${pulls}回）`; }
  }
  updateStats();
}

function retryQuiz() { startQuiz(); }
function reviewWrong() { selectMode('wrong'); showScreen('screenStart'); }
function goHome() { showScreen('screenStart'); updateStats(); }
function triggerGachaReward() {
  const btn = document.getElementById('gachaBtnResult');
  if (btn) btn.style.display = 'none';
  if (typeof claimQuizGacha !== 'function') return;
  const { pulls, results } = claimQuizGacha('fp3', _score, _pool.length);
  if (!pulls || !results.length) return;
  alert(`🎰 ガチャ${pulls}回！\n${results.map(r => `${r.isNew?'★NEW★':''} ${r.card.name}（${r.card.rarity.toUpperCase()}）`).join('\n')}`);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

document.addEventListener('DOMContentLoaded', () => {
  updateStats();
  selectMode('random');
});
</script>
</body>
</html>
