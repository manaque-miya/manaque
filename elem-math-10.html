<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>比・比の値 | 全10問</title>
<meta name="description" content="小学生向け比・比の値クイズ10問。比の簡略化、比例式、分配の問題を解説つきで学ぼう。">
<style>
:root {
  --bg:#0f0f13;--card:#1a1a22;--border:#2a2a38;
  --text:#f0f0f5;--muted:#7a7a9a;
  --accent:#FFD60A;--green:#30D158;--red:#FF453A;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;min-height:100vh;padding:24px 16px 80px}
.container{max-width:640px;margin:0 auto}
.page-header{text-align:center;margin-bottom:32px}
.grade-tag{display:inline-block;background:var(--accent);color:#000;font-size:11px;font-weight:900;letter-spacing:.08em;padding:4px 12px;border-radius:20px;margin-bottom:10px}
.page-header h1{font-size:26px;font-weight:900}
.page-header p{color:var(--muted);font-size:13px;margin-top:8px;line-height:1.6}
.progress-wrap{margin-bottom:24px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s ease;width:0%}
.question-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px 20px;margin-bottom:16px}
.q-number{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.08em;margin-bottom:10px}
.q-text{font-size:18px;font-weight:900;line-height:1.5;margin-bottom:8px}
.q-sub{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.6}
.q-formula{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:17px;font-weight:900;text-align:center;letter-spacing:.03em;margin-bottom:16px;font-family:'Courier New',monospace;white-space:pre-line}
.choices{display:flex;flex-direction:column;gap:10px}
.choice-btn{background:var(--bg);border:1.5px solid var(--border);color:var(--text);border-radius:12px;padding:14px 16px;font-size:15px;font-weight:700;cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:center;gap:12px}
.choice-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(128,128,128,.06)}
.choice-btn.correct{border-color:var(--green);background:rgba(48,209,88,.12);color:var(--green)}
.choice-btn.wrong{border-color:var(--red);background:rgba(255,69,58,.12);color:var(--red)}
.choice-btn:disabled{cursor:default}
.choice-label{width:26px;height:26px;min-width:26px;background:var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900}
.choice-btn.correct .choice-label{background:var(--green);color:#000}
.choice-btn.wrong .choice-label{background:var(--red);color:#fff}
.feedback{margin-top:14px;border-radius:12px;padding:14px 16px;display:none}
.feedback.show{display:block}
.feedback.correct-fb{background:rgba(48,209,88,.1);border:1px solid rgba(48,209,88,.3)}
.feedback.wrong-fb{background:rgba(255,69,58,.1);border:1px solid rgba(255,69,58,.3)}
.feedback-label{font-size:12px;font-weight:900;margin-bottom:6px}
.feedback.correct-fb .feedback-label{color:var(--green)}
.feedback.wrong-fb .feedback-label{color:var(--red)}
.feedback-text{font-size:13px;line-height:1.7}
.next-btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:900;cursor:pointer;margin-top:12px;display:none;transition:opacity .15s}
.next-btn.show{display:block}
.next-btn:hover{opacity:.85}
.score-screen{display:none;text-align:center}
.score-screen.show{display:block}
.score-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px 24px;margin-bottom:20px}
.score-emoji{font-size:52px;margin-bottom:12px}
.score-num{font-size:56px;font-weight:900;color:var(--accent);line-height:1;margin-bottom:4px}
.score-denom{font-size:20px;color:var(--muted);margin-bottom:16px}
.score-msg{font-size:16px;font-weight:700;line-height:1.6}
.score-bar-wrap{margin:20px 0}
.score-bar-bg{height:12px;background:var(--border);border-radius:6px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:6px;background:var(--accent);transition:width 1s ease}
.retry-btn{display:inline-block;background:transparent;border:1.5px solid var(--accent);color:var(--accent);border-radius:12px;padding:12px 28px;font-size:15px;font-weight:900;cursor:pointer;transition:all .15s;margin-top:8px}
.retry-btn:hover{background:var(--accent);color:#000}
.review-list{margin-top:20px}
.review-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;gap:10px;align-items:flex-start;text-align:left}
.review-icon{font-size:16px;flex-shrink:0}
.review-q{font-size:13px;font-weight:700;margin-bottom:4px}
.review-a{font-size:12px;color:var(--muted)}
.review-a span{color:var(--accent);font-weight:700}
</style>
</head>
<body>
<div class="container">
<div class="page-header">
  <div class="grade-tag">🏫 小学生向け</div>
  <h1>比・比の値クイズ　全10問</h1>
  <p>比の意味・簡単な整数比・比例式——比をマスターしよう！</p>
</div>
<div class="progress-wrap">
  <div class="progress-label">
    <span id="progressText">問題 1 / 10</span>
    <span id="scoreText">正解 0問</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>
<div id="quizArea"></div>
<div class="score-screen" id="scoreScreen">
  <div class="score-card">
    <div class="score-emoji" id="scoreEmoji"></div>
    <div class="score-num" id="scoreNum"></div>
    <div class="score-denom">/ 10問</div>
    <div class="score-bar-wrap"><div class="score-bar-bg"><div class="score-bar-fill" id="scoreBarFill" style="width:0%"></div></div></div>
    <div class="score-msg" id="scoreMsg"></div>
  </div>
  <button class="retry-btn" onclick="restart()">もう一度チャレンジ</button>
  <div class="review-list" id="reviewList"></div>
</div>
</div>
<script>
const QUESTIONS=[{"q": "4:6 を最も簡単な整数の比にすると？", "sub": "最大公約数で両方を割ろう。4と6の最大公約数は？", "formula": null, "choices": ["1:2", "2:3", "3:4", "4:6"], "answer": 1, "explain": "4と6の最大公約数は2。4÷2:6÷2=2:3。比は両方を同じ数で割っても同じ比になる。"}, {"q": "2:3 の比の値はいくつ？", "sub": "比の値=前の数÷後の数", "formula": null, "choices": ["2/5", "2/3", "3/2", "3/5"], "answer": 1, "explain": "比の値=2÷3=2/3。「a:bの比の値はa÷b=a/b」。比の値は分数で表す。"}, {"q": "3:4 = 9:□ の□にあてはまる数は？", "sub": "前の数が3から9に（3倍）。後の数も3倍。", "formula": null, "choices": ["10", "11", "12", "13"], "answer": 2, "explain": "3×3=9なので、後ろも3倍。4×3=12。または比例式a:b=c:dでは「a×d=b×c」（外×外=内×内）：3×□=4×9=36、□=12。"}, {"q": "12:8 を最も簡単な整数の比にすると？", "sub": "12と8の最大公約数は4。両方4で割ろう。", "formula": null, "choices": ["6:4", "4:3", "3:2", "2:1"], "answer": 2, "explain": "12÷4:8÷4=3:2。最大公約数4で割る。3:2以上は約分できない（3と2は互いに素）。"}, {"q": "30を2:3に分けたとき、小さい方はいくつ？", "sub": "全体を（2+3）=5等分して、小さい方は2つ分。", "formula": null, "choices": ["10", "12", "15", "18"], "answer": 1, "explain": "30÷（2+3）=30÷5=6（1つ分）。小さい方（2つ分）=6×2=12。大きい方=6×3=18。12+18=30で確認。"}, {"q": "全体が100で比が3:2のとき、大きい方は？", "sub": "全体を（3+2）=5等分して、大きい方は3つ分。", "formula": null, "choices": ["40", "50", "60", "70"], "answer": 2, "explain": "100÷（3+2）=20（1つ分）。大きい方=20×3=60。小さい方=20×2=40。60+40=100で確認。"}, {"q": "15:25 を最も簡単な整数の比にすると？", "sub": "15と25の最大公約数は5。", "formula": null, "choices": ["1:2", "2:3", "3:5", "5:8"], "answer": 2, "explain": "15÷5:25÷5=3:5。最大公約数5で割る。3と5は互いに素なので、これ以上約分できない。"}, {"q": "6:10 = □:25 の□にあてはまる数は？", "sub": "後ろの数が10から25に（2.5倍）。前の数も2.5倍。", "formula": null, "choices": ["12", "15", "18", "20"], "answer": 1, "explain": "10×□=25より□=2.5倍。6×2.5=15。または6:10=3:5に簡略化し、3:5=□:25→□=15。"}, {"q": "縦と横の比が3:4で縦が9cmのとき横は何cm？", "sub": "縦が3から9cm（3倍）。横も3倍。", "formula": null, "choices": ["10cm", "11cm", "12cm", "16cm"], "answer": 2, "explain": "3×3=9なので3倍。横=4×3=12cm。比例式で：3:4=9:□、3×□=4×9=36、□=12。"}, {"q": "男女の比が5:3で男子が20人のとき、女子は何人？", "sub": "男子が5から20人（4倍）。女子も4倍。", "formula": null, "choices": ["10人", "12人", "15人", "16人"], "answer": 1, "explain": "5×4=20なので4倍。女子=3×4=12人。全体=20+12=32人。5:3=20:12を確認。"}];
let current=0,score=0,answered=[];
function renderQuestion(idx){
  const q=QUESTIONS[idx];
  const fml=q.formula?`<div class="q-formula">${q.formula}</div>`:'';
  document.getElementById('quizArea').innerHTML=`
    <div class="question-card">
      <div class="q-number">問題 ${idx+1} / ${QUESTIONS.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="q-sub">${q.sub}</div>
      ${fml}
      <div class="choices">
        ${q.choices.map((c,i)=>`<button class="choice-btn" onclick="selectAnswer(${i})" id="choice-${i}"><span class="choice-label">${'ABCD'[i]}</span>${c}</button>`).join('')}
      </div>
      <div class="feedback" id="feedback"><div class="feedback-label" id="feedbackLabel"></div><div class="feedback-text" id="feedbackText"></div></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">${idx<QUESTIONS.length-1?'次の問題へ →':'結果を見る'}</button>
    </div>`;
  document.getElementById('progressFill').style.width=(idx/QUESTIONS.length*100)+'%';
  document.getElementById('progressText').textContent=`問題 ${idx+1} / ${QUESTIONS.length}`;
}
function selectAnswer(sel){
  const q=QUESTIONS[current];const ok=sel===q.answer;
  if(ok)score++;answered.push({idx:current,selected:sel,correct:ok});
  document.querySelectorAll('.choice-btn').forEach((b,i)=>{
    b.disabled=true;
    if(i===q.answer)b.classList.add('correct');
    else if(i===sel&&!ok)b.classList.add('wrong');
  });
  const fb=document.getElementById('feedback');
  fb.className=`feedback show ${ok?'correct-fb':'wrong-fb'}`;
  document.getElementById('feedbackLabel').textContent=ok?'✅ 正解！':`❌ 不正解。正解は「${q.choices[q.answer]}」`;
  document.getElementById('feedbackText').textContent=q.explain;
  document.getElementById('nextBtn').classList.add('show');
  document.getElementById('scoreText').textContent=`正解 ${score}問`;
}
function nextQuestion(){current++;if(current>=QUESTIONS.length)showScore();else renderQuestion(current);}
function showScore(){
  document.getElementById('quizArea').style.display='none';
  document.getElementById('progressFill').style.width='100%';
  document.getElementById('progressText').textContent='完了！';
  document.getElementById('scoreScreen').classList.add('show');
  const p=score/QUESTIONS.length;
  let e,m;
  if(p===1){e='🏆';m='全問正解！完璧だ！'}
  else if(p>=.8){e='🎉';m='すばらしい！あと少しで満点！'}
  else if(p>=.6){e='😊';m='よくできました！解説を読んで復習しよう。'}
  else if(p>=.4){e='📚';m='もう一歩！解説をしっかり確認しよう。'}
  else{e='💪';m='もう一度チャレンジ！解説が理解の近道。'}
  document.getElementById('scoreEmoji').textContent=e;
  document.getElementById('scoreNum').textContent=score;
  document.getElementById('scoreMsg').textContent=m;
  setTimeout(()=>{document.getElementById('scoreBarFill').style.width=(p*100)+'%';},100);
  document.getElementById('reviewList').innerHTML=
    '<div style="font-size:13px;font-weight:700;color:var(--muted);margin-bottom:10px;text-align:left;">📋 振り返り</div>'+
    answered.map(a=>{const q=QUESTIONS[a.idx];return`<div class="review-item"><div class="review-icon">${a.correct?'✅':'❌'}</div><div><div class="review-q">${q.q}</div><div class="review-a">正解：<span>${q.choices[q.answer]}</span>　あなたの回答：${q.choices[a.selected]}</div></div></div>`;}).join('');
}
function restart(){
  current=0;score=0;answered=[];
  document.getElementById('quizArea').style.display='block';
  document.getElementById('scoreScreen').classList.remove('show');
  document.getElementById('scoreText').textContent='正解 0問';
  renderQuestion(0);
}
renderQuestion(0);
</script>
</body>
</html>
