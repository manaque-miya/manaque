<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クイズ｜まなクエ！</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-LDNLC7PWNM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-LDNLC7PWNM');
  </script>
  <style>
    :root{--accent:#3B82F6;--green:#30D158;--red:#FF453A;--bg:#0f0f13;--card:#1a1a22;--border:#2a2a38;--text:#f0f0f5;--muted:#7a7a9a}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;min-height:100vh;padding:0 0 80px}

    /* ヘッダー */
    .site-header{background:rgba(15,15,19,.95);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:10px;}
    .site-logo{display:inline-flex;align-items:center;gap:6px;text-decoration:none;font-size:17px;font-weight:900;color:#fff;}
    .site-logo__icon{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#2E6DE5,#1A449E);display:grid;place-items:center;flex-shrink:0;}
    .site-logo span{color:#60a5fa;}
    .back-link{margin-left:auto;font-size:12px;font-weight:700;color:var(--muted);text-decoration:none;}
    .back-link:hover{color:var(--text);}

    /* コンテンツ */
    .container{max-width:640px;margin:0 auto;padding:24px 16px}
    .page-header{text-align:center;margin-bottom:32px}
    .grade-tag{display:inline-block;background:var(--accent);color:#fff;font-size:11px;font-weight:900;letter-spacing:.08em;padding:4px 12px;border-radius:20px;margin-bottom:10px}
    .page-header h1{font-size:24px;font-weight:900;line-height:1.4}

    /* プログレス */
    .progress-wrap{margin-bottom:24px}
    .progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
    .progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
    .progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s ease;width:0%}

    /* 問題カード */
    .question-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px 20px;margin-bottom:16px}
    .q-number{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.08em;margin-bottom:10px}
    .q-text{font-size:18px;font-weight:900;line-height:1.6;margin-bottom:20px}
    .choices{display:flex;flex-direction:column;gap:10px}
    .choice-btn{background:var(--bg);border:1.5px solid var(--border);color:var(--text);border-radius:12px;padding:14px 16px;font-size:15px;font-weight:700;cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:center;gap:12px}
    .choice-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(128,128,128,.06)}
    .choice-btn.correct{border-color:var(--green);background:rgba(48,209,88,.12);color:var(--green)}
    .choice-btn.wrong{border-color:var(--red);background:rgba(255,69,58,.12);color:var(--red)}
    .choice-btn:disabled{cursor:default}
    .choice-label{width:26px;height:26px;min-width:26px;background:var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900}
    .choice-btn.correct .choice-label{background:var(--green);color:#000}
    .choice-btn.wrong .choice-label{background:var(--red);color:#fff}
    .feedback{margin-top:14px;border-radius:12px;padding:14px 16px;display:none}
    .feedback.show{display:block}
    .feedback.correct-fb{background:rgba(48,209,88,.1);border:1px solid rgba(48,209,88,.3)}
    .feedback.wrong-fb{background:rgba(255,69,58,.1);border:1px solid rgba(255,69,58,.3)}
    .feedback-label{font-size:12px;font-weight:900;margin-bottom:6px}
    .feedback.correct-fb .feedback-label{color:var(--green)}
    .feedback.wrong-fb .feedback-label{color:var(--red)}
    .feedback-text{font-size:13px;line-height:1.7}
    .next-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:900;cursor:pointer;margin-top:12px;display:none;transition:opacity .15s}
    .next-btn.show{display:block}
    .next-btn:hover{opacity:.85}

    /* スコア */
    .score-screen{display:none;text-align:center}
    .score-screen.show{display:block}
    .score-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px 24px;margin-bottom:20px}
    .score-emoji{font-size:52px;margin-bottom:12px}
    .score-num{font-size:56px;font-weight:900;color:var(--accent);line-height:1;margin-bottom:4px}
    .score-denom{font-size:20px;color:var(--muted);margin-bottom:16px}
    .score-msg{font-size:16px;font-weight:700;line-height:1.6}
    .score-bar-wrap{margin:20px 0}
    .score-bar-bg{height:12px;background:var(--border);border-radius:6px;overflow:hidden}
    .score-bar-fill{height:100%;border-radius:6px;background:var(--accent);transition:width 1s ease}
    .retry-btn{display:inline-block;background:transparent;border:1.5px solid var(--accent);color:var(--accent);border-radius:12px;padding:12px 28px;font-size:15px;font-weight:900;cursor:pointer;transition:all .15s;margin-top:8px}
    .retry-btn:hover{background:var(--accent);color:#fff}
    .review-list{margin-top:20px}
    .review-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;gap:10px;align-items:flex-start;text-align:left}
    .review-icon{font-size:16px;flex-shrink:0}
    .review-q{font-size:13px;font-weight:700;margin-bottom:4px}
    .review-a{font-size:12px;color:var(--muted)}
    .review-a span{color:var(--accent);font-weight:700}

    /* ローディング */
    .loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}

    /* スタート画面 */
    .start-screen{text-align:center;padding:12px 0}
    .start-screen h1{font-size:22px;font-weight:900;line-height:1.5;margin-bottom:6px}
    .start-screen .grade-tag{display:inline-block;background:var(--accent);color:#fff;font-size:11px;font-weight:900;letter-spacing:.08em;padding:4px 12px;border-radius:20px;margin-bottom:14px}
    .start-meta{font-size:13px;color:var(--muted);margin-bottom:28px}
    .count-label{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:12px;letter-spacing:.04em}
    .count-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:28px}
    .count-btn{background:var(--card);border:1.5px solid var(--border);color:var(--text);border-radius:12px;padding:14px 22px;font-size:15px;font-weight:900;cursor:pointer;transition:all .15s;min-width:90px}
    .count-btn:hover{border-color:var(--accent);color:var(--accent)}
    .count-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .start-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:900;cursor:pointer;transition:opacity .15s}
    .start-btn:hover{opacity:.85}
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4180647894648021"
       crossorigin="anonymous"></script>
</head>
<body>

<header class="site-header">
  <a class="site-logo" href="index.html">
    <span class="site-logo__icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="#fff" stroke-width="2.2" stroke-linejoin="round"/>
        <path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="#fff" stroke-width="2.2" stroke-linejoin="round"/>
      </svg>
    </span>
    まな<span>クエ！</span>
  </a>
  <a class="back-link" href="index.html">← TOPにもどる</a>
</header>

<div class="container">
  <div id="app"><div class="loading">読み込み中…</div></div>
</div>

<script>
// URLパラメータからクイズIDを取得
const quizId = new URLSearchParams(location.search).get('id') || '';

if (!quizId) {
  document.getElementById('app').innerHTML = '<div class="loading">クイズIDが指定されていません。<br><a href="index.html" style="color:#60a5fa">TOPにもどる</a></div>';
} else {
  // 動的にデータファイルを読み込む
  const s = document.createElement('script');
  s.src = `data/${quizId}.js`;
  s.onerror = () => {
    document.getElementById('app').innerHTML = '<div class="loading">データの読み込みに失敗しました。<br><a href="index.html" style="color:#60a5fa">TOPにもどる</a></div>';
  };
  s.onload = () => {
    if (typeof UNIT_QUIZ === 'undefined') {
      document.getElementById('app').innerHTML = '<div class="loading">クイズデータが見つかりません。<br><a href="index.html" style="color:#60a5fa">TOPにもどる</a></div>';
      return;
    }
    const meta = UNIT_QUIZ.meta;
    // アクセントカラー適用
    document.documentElement.style.setProperty('--accent', meta.accent);
    // タイトル更新
    document.title = `${meta.title}｜まなクエ！`;
    initQuiz(meta, UNIT_QUIZ.questions);
  };
  document.head.appendChild(s);
}

// ===== クイズエンジン =====
let current = 0, score = 0, answered = [];
let QUESTIONS = [];

let _allQuestions = [];
let _meta = {};

function initQuiz(meta, questions) {
  _allQuestions = questions;
  _meta = meta;

  // 10問未満は選択画面なしで即スタート
  if (questions.length < 10) {
    startQuiz(questions);
    return;
  }

  // 選択肢を生成（3・5・10・全問）
  const opts = [];
  if (questions.length >= 3)  opts.push(3);
  if (questions.length >= 5)  opts.push(5);
  if (questions.length >= 10) opts.push(10);
  opts.push(questions.length); // 全問

  document.getElementById('app').innerHTML = `
    <div class="start-screen">
      <div class="grade-tag">${meta.gradeTag}</div>
      <h1>${meta.title}</h1>
      <div class="start-meta">全 ${questions.length} 問収録</div>
      <div class="count-label">何問チャレンジする？</div>
      <div class="count-btns">
        ${opts.map((n, i) => `
          <button class="count-btn${i === 0 ? ' active' : ''}"
            onclick="selectCount(this, ${n})">
            ${n === questions.length && n !== 10 && n !== 20 ? `全問<br><span style="font-size:12px;font-weight:700">${n}問</span>` : `${n}問`}
          </button>`).join('')}
      </div>
      <button class="start-btn" onclick="startFromScreen()">スタート！</button>
    </div>
  `;
  _selectedCount = opts[0];
}

let _selectedCount = 10;

function selectCount(el, n) {
  document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  _selectedCount = n;
}

function startFromScreen() {
  // シャッフルして指定問数を切り出す
  const shuffled = [..._allQuestions].sort(() => Math.random() - 0.5);
  startQuiz(shuffled.slice(0, _selectedCount));
}

function startQuiz(questions) {
  QUESTIONS = questions;
  current = 0; score = 0; answered = [];

  document.getElementById('app').innerHTML = `
    <div class="page-header">
      <div class="grade-tag">${_meta.gradeTag}</div>
      <h1>${_meta.title}　${questions.length}問チャレンジ</h1>
    </div>
    <div class="progress-wrap">
      <div class="progress-label">
        <span id="progressText">問題 1 / ${questions.length}</span>
        <span id="scoreText">正解 0問</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div id="quizArea"></div>
    <div class="score-screen" id="scoreScreen">
      <div class="score-card">
        <div class="score-emoji" id="scoreEmoji"></div>
        <div class="score-num" id="scoreNum"></div>
        <div class="score-denom">/ ${questions.length}問</div>
        <div class="score-bar-wrap"><div class="score-bar-bg"><div class="score-bar-fill" id="scoreBarFill" style="width:0%"></div></div></div>
        <div class="score-msg" id="scoreMsg"></div>
      </div>
      <button class="retry-btn" onclick="restart()">もう一度チャレンジ</button>
      <div class="review-list" id="reviewList"></div>
    </div>
  `;

  renderQuestion(0);
}

function renderQuestion(idx) {
  const q = QUESTIONS[idx];
  document.getElementById('quizArea').innerHTML = `
    <div class="question-card">
      <div class="q-number">問題 ${idx+1} / ${QUESTIONS.length}</div>
      <div class="q-text">${q.text}</div>
      <div class="choices">
        ${q.choices.map((c,i) => `<button class="choice-btn" onclick="selectAnswer(${i})" id="choice-${i}"><span class="choice-label">${'ABCD'[i]}</span>${c}</button>`).join('')}
      </div>
      <div class="feedback" id="feedback"><div class="feedback-label" id="feedbackLabel"></div><div class="feedback-text" id="feedbackText"></div></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">${idx < QUESTIONS.length-1 ? '次の問題へ →' : '結果を見る'}</button>
    </div>`;
  document.getElementById('progressFill').style.width = (idx / QUESTIONS.length * 100) + '%';
  document.getElementById('progressText').textContent = `問題 ${idx+1} / ${QUESTIONS.length}`;
}

function selectAnswer(sel) {
  const q = QUESTIONS[current];
  const ok = sel === q.answer;
  if (ok) score++;
  answered.push({idx: current, selected: sel, correct: ok});
  document.querySelectorAll('.choice-btn').forEach((b,i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add('correct');
    else if (i === sel && !ok) b.classList.add('wrong');
  });
  const fb = document.getElementById('feedback');
  fb.className = `feedback show ${ok ? 'correct-fb' : 'wrong-fb'}`;
  document.getElementById('feedbackLabel').textContent = ok ? '✅ 正解！' : `❌ 不正解。正解は「${q.choices[q.answer]}」`;
  document.getElementById('feedbackText').textContent = q.exp;
  document.getElementById('nextBtn').classList.add('show');
  document.getElementById('scoreText').textContent = `正解 ${score}問`;
}

function nextQuestion() {
  current++;
  if (current >= QUESTIONS.length) showScore();
  else renderQuestion(current);
}

function showScore() {
  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressText').textContent = '完了！';
  document.getElementById('scoreScreen').classList.add('show');
  const p = score / QUESTIONS.length;
  let e, m;
  if (p === 1)    { e='🏆'; m='全問正解！完璧だ！' }
  else if (p>=.8) { e='🎉'; m='すばらしい！あと少しで満点！' }
  else if (p>=.6) { e='😊'; m='よくできました！解説を読んで復習しよう。' }
  else if (p>=.4) { e='📚'; m='もう一歩！解説をしっかり確認しよう。' }
  else            { e='💪'; m='もう一度チャレンジ！解説が理解の近道。' }
  document.getElementById('scoreEmoji').textContent = e;
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('scoreMsg').textContent = m;
  setTimeout(() => { document.getElementById('scoreBarFill').style.width = (p*100)+'%'; }, 100);
  document.getElementById('reviewList').innerHTML =
    '<div style="font-size:13px;font-weight:700;color:var(--muted);margin-bottom:10px;text-align:left;">📋 振り返り</div>' +
    answered.map(a => {
      const q = QUESTIONS[a.idx];
      return `<div class="review-item"><div class="review-icon">${a.correct?'✅':'❌'}</div><div><div class="review-q">${q.text}</div><div class="review-a">正解：<span>${q.choices[q.answer]}</span>　あなたの回答：${q.choices[a.selected]}</div></div></div>`;
    }).join('');
}

function restart() {
  // スタート画面に戻る（問題数を選び直せる）
  initQuiz(_meta, _allQuestions);
}
</script>
</body>
</html>
