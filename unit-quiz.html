<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <style>
    :root{--accent:#3B82F6;--green:#16a34a;--red:#dc2626;--bg:#EAF2FE;--card:#FFFFFF;--border:#E4E9F2;--text:#0F1830;--muted:#5B6785;--shadow:0 2px 12px rgba(30,50,110,.08)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'M PLUS Rounded 1c','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;min-height:100vh;padding:0 0 100px}
    @media(max-width:1024px){body{min-height:unset;padding-bottom:40px}}

    /* ヘッダー */
    .site-header{background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:30;}
    .site-logo{display:inline-flex;align-items:center;gap:6px;text-decoration:none;font-size:17px;font-weight:900;color:#0F1830;}
    .site-logo__icon{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#2E6DE5,#1A449E);display:grid;place-items:center;flex-shrink:0;}
    .site-logo span{color:#2E6DE5;}
    .back-link{margin-left:auto;font-size:12px;font-weight:700;color:var(--muted);text-decoration:none;padding:6px 14px;border:1.5px solid var(--border);border-radius:999px;transition:all .15s;}
    .back-link:hover{border-color:#2E6DE5;color:#2E6DE5;}

    /* コンテンツ */
    .container{max-width:min(900px,95vw);margin:0 auto;padding:clamp(16px,4vw,28px) clamp(12px,3.5vw,24px)}
    .page-header{text-align:center;margin-bottom:28px}
    .grade-tag{display:inline-block;background:var(--accent);color:#fff;font-size:11px;font-weight:900;letter-spacing:.08em;padding:4px 14px;border-radius:999px;margin-bottom:10px}
    .page-header h1{font-size:clamp(15px,4.5vw,22px);font-weight:900;line-height:1.4;color:var(--text)}

    /* プログレス */
    .progress-wrap{margin-bottom:20px}
    .progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600}
    .progress-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#60a5fa);border-radius:4px;transition:width .4s ease;width:0%}

    /* 問題カード */
    .question-card{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:28px 24px;margin-bottom:16px;box-shadow:var(--shadow)}
    .q-number{font-size:clamp(11px,2.5vw,13px);font-weight:800;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
    .q-text{font-size:clamp(20px,5.5vw,28px);font-weight:900;line-height:1.6;margin-bottom:22px;color:var(--text)}
    .choices{display:flex;flex-direction:column;gap:clamp(10px,2.5vw,14px)}
    .choice-btn{background:#F6F8FC;border:2px solid var(--border);color:var(--text);border-radius:14px;padding:clamp(16px,4vw,20px) clamp(14px,3.5vw,20px);font-size:clamp(17px,4.5vw,22px);font-weight:700;cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:center;gap:12px;font-family:'M PLUS Rounded 1c',sans-serif}
    .choice-btn:hover:not(:disabled){border-color:var(--accent);background:#EFF6FF;transform:translateX(2px)}
    .choice-btn.correct{border-color:var(--green);background:#F0FDF4;color:var(--green)}
    .choice-btn.wrong{border-color:var(--red);background:#FEF2F2;color:var(--red)}
    .choice-btn:disabled{cursor:default}
    .choice-label{width:clamp(30px,7vw,38px);height:clamp(30px,7vw,38px);min-width:clamp(30px,7vw,38px);background:var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:clamp(13px,3vw,16px);font-weight:900;color:var(--muted)}
    .choice-btn:hover:not(:disabled) .choice-label{background:var(--accent);color:#fff}
    .choice-btn.correct .choice-label{background:var(--green);color:#fff}
    .choice-btn.wrong .choice-label{background:var(--red);color:#fff}
    .feedback{margin-top:14px;border-radius:14px;padding:14px 16px;display:none}
    .feedback.show{display:block}
    .feedback.correct-fb{background:#F0FDF4;border:1.5px solid #86efac}
    .feedback.wrong-fb{background:#FEF2F2;border:1.5px solid #fca5a5}
    .feedback-label{font-size:clamp(14px,3.5vw,18px);font-weight:900;margin-bottom:6px}
    .feedback.correct-fb .feedback-label{color:var(--green)}
    .feedback.wrong-fb .feedback-label{color:var(--red)}
    .feedback-text{font-size:clamp(14px,3.5vw,18px);line-height:1.8;color:var(--text)}
    .next-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:14px;padding:clamp(17px,4.5vw,22px);font-size:clamp(17px,4.5vw,22px);font-weight:900;cursor:pointer;margin-top:14px;display:none;transition:all .15s;box-shadow:0 4px 0 color-mix(in srgb,var(--accent) 70%,#000);font-family:'M PLUS Rounded 1c',sans-serif}
    .next-btn.show{display:block}
    .next-btn:hover{opacity:.9;transform:translateY(-1px)}
    .next-btn:active{transform:translateY(2px);box-shadow:none}

    /* スコア */
    .score-screen{display:none;text-align:center}
    .score-screen.show{display:block}
    .score-card{background:var(--card);border:1.5px solid var(--border);border-radius:24px;padding:clamp(28px,7vw,48px) clamp(20px,5vw,36px);margin-bottom:20px;box-shadow:var(--shadow)}
    .score-chara{width:clamp(100px,22vw,140px);margin:0 auto 12px;display:block;filter:drop-shadow(0 4px 12px rgba(0,0,0,.1))}
    .score-emoji{font-size:clamp(52px,13vw,80px);margin-bottom:10px}
    .score-num{font-size:clamp(72px,18vw,110px);font-weight:900;color:var(--accent);line-height:1;margin-bottom:2px}
    .score-denom{font-size:clamp(20px,5vw,28px);color:var(--muted);font-weight:600;margin-bottom:16px}
    .score-msg{font-size:clamp(18px,4.5vw,24px);font-weight:700;line-height:1.6;color:var(--text)}
    .score-bar-wrap{margin:20px 0}
    .score-bar-bg{height:12px;background:var(--border);border-radius:6px;overflow:hidden}
    .score-bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent),#60a5fa);transition:width 1s ease}
    .retry-btn{display:inline-block;background:var(--accent);color:#fff;border:none;border-radius:14px;padding:clamp(15px,4vw,20px) clamp(28px,8vw,44px);font-size:clamp(17px,4.5vw,22px);font-weight:900;cursor:pointer;transition:all .15s;margin-top:8px;box-shadow:0 4px 0 color-mix(in srgb,var(--accent) 70%,#000);font-family:'M PLUS Rounded 1c',sans-serif}
    .retry-btn:hover{opacity:.9;transform:translateY(-1px)}
    .review-list{margin-top:24px}
    .review-item{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;gap:10px;align-items:flex-start;text-align:left;box-shadow:0 1px 4px rgba(30,50,110,.05)}
    .review-icon{font-size:16px;flex-shrink:0}
    .review-q{font-size:clamp(15px,3.5vw,18px);font-weight:700;margin-bottom:4px;color:var(--text)}
    .review-a{font-size:clamp(13px,3vw,16px);color:var(--muted)}
    .review-a span{color:var(--accent);font-weight:700}

    /* ===== クエ丸（スタート・スコア画面専用） ===== */
    .chara-inline{display:block;width:130px;margin:0 auto 16px;filter:drop-shadow(0 6px 18px rgba(30,50,110,.15));animation:floatChara 3s ease-in-out infinite}
    .chara-inline--score{width:110px;margin:0 auto 8px;animation:none}
    .chara-inline--bounce{animation:charaBounce .5s ease forwards}
    @keyframes charaBounce{0%,100%{transform:translateY(0)}35%{transform:translateY(-16px)}65%{transform:translateY(-6px)}}

    /* ローディング */
    .loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}

    /* ===== ガチャ報酬オーバーレイ ===== */
    .gacha-reward-overlay{display:none;position:fixed;inset:0;background:radial-gradient(ellipse at center,#0d1a3a 0%,#050810 100%);z-index:1000;align-items:center;justify-content:center;overflow:hidden}
    .gacha-reward-overlay.show{display:flex}
    /* 星フィールド */
    .g-star{position:absolute;background:white;border-radius:50%;animation:gTwinkle var(--d) ease-in-out infinite alternate}
    @keyframes gTwinkle{from{opacity:.1;transform:scale(.8)}to{opacity:.9;transform:scale(1.2)}}
    /* フラッシュ */
    #gachaFlash{position:absolute;inset:0;background:white;opacity:0;pointer-events:none;z-index:50}
    #gachaFlash.active{animation:gFlash .4s ease-out forwards}
    @keyframes gFlash{0%{opacity:.9}100%{opacity:0}}
    /* ？マーク */
    #gachaQmark{position:absolute;font-size:clamp(140px,25vw,220px);font-weight:900;color:#2563EB;text-shadow:0 0 20px #2563EB,0 0 50px #2563EB,0 0 100px #1d4ed8,0 0 10px #F6C744;opacity:0;transform:scale(.3);user-select:none;z-index:10;line-height:1}
    #gachaQmark.appear{animation:gQappear .6s cubic-bezier(.34,1.56,.64,1) forwards}
    @keyframes gQappear{to{opacity:1;transform:scale(1)}}
    #gachaQmark.pulse{animation:gQpulse .4s ease-in-out 3}
    @keyframes gQpulse{0%{transform:scale(1);text-shadow:0 0 20px #2563EB,0 0 50px #2563EB}50%{transform:scale(1.15);text-shadow:0 0 40px #F6C744,0 0 80px #F6C744}100%{transform:scale(1);text-shadow:0 0 20px #2563EB,0 0 50px #2563EB}}
    #gachaQmark.explode{animation:gQexplode .3s ease-in forwards}
    @keyframes gQexplode{0%{opacity:1;transform:scale(1)}50%{opacity:1;transform:scale(1.4);filter:brightness(3)}100%{opacity:0;transform:scale(0)}}
    /* パーティクル */
    .g-particle{position:absolute;border-radius:50%;pointer-events:none;z-index:20}
    .g-particle.star-shape{clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);border-radius:0}
    /* カードラッパー */
    #gachaCardWrap{position:absolute;width:min(320px,68vw);height:min(460px,72vh);perspective:1000px;opacity:0;z-index:30}
    #gachaCardWrap.reveal{animation:gCardReveal .5s cubic-bezier(.34,1.56,.64,1) forwards}
    @keyframes gCardReveal{0%{opacity:0;transform:translateY(60px) scale(.7)}100%{opacity:1;transform:translateY(0) scale(1)}}
    #gachaCardInner{width:100%;height:100%;position:relative;transform-style:preserve-3d;animation:gCardFlip .7s ease-out forwards;animation-play-state:paused}
    #gachaCardInner.flip{animation-play-state:running}
    @keyframes gCardFlip{0%{transform:rotateY(180deg)}100%{transform:rotateY(0)}}
    .g-card-back{position:absolute;inset:0;backface-visibility:hidden;transform:rotateY(180deg);background:linear-gradient(135deg,#0d1a3a,#1a3a6e);border-radius:18px;border:3px solid #F6C744;display:flex;align-items:center;justify-content:center;font-size:80px;box-shadow:0 0 30px rgba(246,199,68,.4)}
    .g-card-front{position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;overflow:hidden}
    /* ノート風カードデザイン */
    .g-card-outer{width:100%;height:100%;border-radius:18px;border:3px solid #F6C744;padding:8px 8px 8px 22px;position:relative;background:linear-gradient(180deg,#1a3a6e,#0f2456)}
    .g-card-outer.r{border-color:#60a5fa}
    .g-card-outer.sr{border-color:#a78bfa;background:linear-gradient(180deg,#2d1b69,#1a0f45)}
    .g-card-outer.ssr{border-color:#ffd700;background:linear-gradient(180deg,#5a2800,#2a1200);box-shadow:0 0 20px rgba(255,215,0,.4)}
    .g-ring{position:absolute;left:-4px;width:16px;height:16px;background:linear-gradient(135deg,#aaa,#eee,#aaa);border-radius:50%;border:2px solid #888}
    .g-card-paper{width:100%;height:100%;background:linear-gradient(180deg,#fdf8ee,#f5edda);border-radius:10px;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center}
    .g-card-paper::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(180deg,transparent,transparent 22px,rgba(150,190,230,.4) 22px,rgba(150,190,230,.4) 23px);top:55px}
    .g-badge{position:absolute;top:-3px;left:50%;transform:translateX(-50%);background:linear-gradient(180deg,#1a3a8e,#0d2060);border:2px solid #F6C744;border-radius:0 0 14px 14px;padding:4px 14px 6px;font-size:clamp(14px,3.5vw,18px);font-weight:900;color:#F6C744;letter-spacing:2px;z-index:2}
    .g-badge.r{border-color:#60a5fa;color:#60a5fa;background:linear-gradient(180deg,#1a3060,#0d2050)}
    .g-badge.sr{border-color:#a78bfa;color:#a78bfa;background:linear-gradient(180deg,#2d1b69,#1a0f45)}
    .g-badge.ssr{border-color:#ffd700;color:#ffd700;background:linear-gradient(180deg,#5a2800,#2a1200);animation:gSsrPulse 1s ease-in-out infinite}
    @keyframes gSsrPulse{0%,100%{box-shadow:0 0 8px rgba(255,215,0,.5)}50%{box-shadow:0 0 20px rgba(255,215,0,.9)}}
    .g-char-area{width:100%;flex:1;display:flex;align-items:center;justify-content:center;padding:50px 10px 0;position:relative;z-index:1}
    .g-char-emoji{font-size:clamp(60px,14vw,90px);filter:drop-shadow(0 4px 8px rgba(0,0,0,.2))}
    .g-name-area{width:85%;margin:8px auto 10px;background:rgba(255,248,231,.95);border:2px solid #C8960C;border-radius:20px;padding:5px 10px;text-align:center;position:relative;z-index:1}
    .g-char-name{font-size:clamp(13px,3vw,17px);font-weight:bold;color:#1a2855}
    .g-char-new{font-size:9px;background:#ef4444;color:#fff;border-radius:4px;padding:1px 5px;font-weight:900;display:inline-block;margin-top:2px}
    /* レアリティバナー */
    #gachaRarityBanner{position:absolute;bottom:-60px;left:50%;transform:translateX(-50%);padding:8px 40px;font-size:15px;font-weight:bold;letter-spacing:4px;white-space:nowrap;opacity:0;transition:opacity .4s,bottom .4s;text-shadow:0 0 10px rgba(246,199,68,.8);z-index:31;color:white;background:linear-gradient(90deg,transparent,#1a3a6e,#F6C744,#1a3a6e,transparent)}
    #gachaRarityBanner.sr-banner{background:linear-gradient(90deg,transparent,#2d1b69,#a78bfa,#2d1b69,transparent);text-shadow:0 0 10px rgba(167,139,250,.8)}
    #gachaRarityBanner.ssr-banner{background:linear-gradient(90deg,transparent,#5a2800,#ffd700,#5a2800,transparent);text-shadow:0 0 10px rgba(255,215,0,.9)}
    #gachaRarityBanner.show{opacity:1;bottom:-50px}
    /* カウンター */
    #gachaCounter{position:absolute;top:20px;right:20px;color:rgba(255,255,255,.6);font-size:14px;font-weight:700;z-index:40}
    /* 次へ / 閉じる ボタン */
    #gachaNextBtn,#gachaCloseBtn{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);padding:14px 40px;border:none;border-radius:12px;font-size:clamp(15px,2vw,19px);font-weight:900;cursor:pointer;z-index:40;display:none;white-space:nowrap;font-family:inherit}
    #gachaNextBtn{background:rgba(37,99,235,.25);color:#F6C744;border:2px solid #F6C744;letter-spacing:.05em}
    #gachaNextBtn:hover{background:rgba(37,99,235,.45)}
    #gachaCloseBtn{background:linear-gradient(135deg,#2E6DE5,#1A449E);color:#fff;box-shadow:0 4px 20px rgba(46,109,229,.4)}
    #gachaNextBtn.show,#gachaCloseBtn.show{display:block}
    /* 報酬なし / クリア済み */
    #gachaNorewardPhase{display:none;flex-direction:column;align-items:center;gap:16px;text-align:center;padding:20px}
    #gachaNorewardPhase.show{display:flex}
    .g-noreward-title{font-size:22px;font-weight:900;color:#fff}
    .g-noreward-sub{font-size:14px;color:rgba(255,255,255,.55);max-width:280px;line-height:1.6}
    .g-noreward-close{padding:12px 36px;background:linear-gradient(135deg,#2E6DE5,#1A449E);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:900;cursor:pointer;font-family:inherit}
    /* ガチャボタン用（スコア画面） */
    @keyframes orbPulse{0%,100%{box-shadow:0 0 40px rgba(168,85,247,.8),0 0 80px rgba(168,85,247,.4)}50%{box-shadow:0 0 60px rgba(168,85,247,1),0 0 120px rgba(168,85,247,.6)}}

    /* スタート画面 */
    .start-screen{text-align:center;padding:12px 0}
    .start-chara{width:130px;margin:0 auto 16px;display:block;filter:drop-shadow(0 4px 16px rgba(30,50,110,.15));animation:floatChara 3s ease-in-out infinite}
    @keyframes floatChara{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    .start-screen h1{font-size:22px;font-weight:900;line-height:1.5;margin-bottom:6px;color:var(--text)}
    .start-screen .grade-tag{display:inline-block;background:var(--accent);color:#fff;font-size:11px;font-weight:900;letter-spacing:.08em;padding:4px 14px;border-radius:999px;margin-bottom:14px}
    .start-meta{font-size:13px;color:var(--muted);margin-bottom:24px;font-weight:600}
    .count-label{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:12px;letter-spacing:.04em}
    .count-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:28px}
    .count-btn{background:var(--card);border:2px solid var(--border);color:var(--text);border-radius:14px;padding:14px 22px;font-size:15px;font-weight:900;cursor:pointer;transition:all .15s;min-width:90px;box-shadow:var(--shadow);font-family:'M PLUS Rounded 1c',sans-serif}
    .count-btn:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px)}
    .count-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 4px 0 color-mix(in srgb,var(--accent) 70%,#000)}
    .start-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:900;cursor:pointer;transition:all .15s;box-shadow:0 4px 0 color-mix(in srgb,var(--accent) 70%,#000);font-family:'M PLUS Rounded 1c',sans-serif}
    .start-btn:hover{opacity:.9;transform:translateY(-1px)}
    .start-btn:active{transform:translateY(2px);box-shadow:none}

    /* ===== スマホ専用（CSSの末尾に配置→基本CSSを正しく上書き）===== */
    @media(max-width:700px){
      /* containerを全幅に */
      .container{max-width:100%;width:100%;padding:10px 10px 8px}
      .page-header{margin-bottom:8px}
      .progress-wrap{margin-bottom:8px}

      /* ── question-cardをビューポート高さ基準で直接サイズ指定 ──
         flexチェーンに依存しないシンプルな方法。
         200px = header(50) + padding(10) + page-header(95) + progress(45) の概算 */
      .question-card{
        display:flex;
        flex-direction:column;
        height:calc(100vh - 200px);
        height:calc(100svh - 200px);
        padding:14px 12px 10px;
        margin-bottom:0;
        border-radius:16px;
        overflow-y:auto;
      }
      .q-number{flex-shrink:0;margin-bottom:8px}
      .q-text{flex-shrink:0;margin-bottom:10px}

      /* 選択肢が question-card の残り高さを埋める */
      .choices{
        flex:1;
        display:flex;
        flex-direction:column;
        gap:8px;
        min-height:0;
      }
      .choice-btn{
        flex:1;
        min-height:60px;
        padding:0 14px;
        display:flex;
        align-items:center;
      }
      .feedback{flex-shrink:0;margin-top:10px}
      .next-btn{flex-shrink:0;margin-top:10px;padding:14px}
    }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4180647894648021"
       crossorigin="anonymous"></script>

<body>

<header class="site-header">
  <a class="site-logo" href="index.html">
    <span class="site-logo__icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="#fff" stroke-width="2.2" stroke-linejoin="round"/>
        <path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="#fff" stroke-width="2.2" stroke-linejoin="round"/>
      </svg>
    </span>
    まな<span>クエ！</span>
  </a>
  <a class="back-link" href="index.html">← TOPにもどる</a>
</header>

<div class="container">
  <div id="app"><div class="loading">読み込み中…</div></div>
</div>


<script>
// URLパラメータからクイズIDと問題数を取得
const quizId = new URLSearchParams(location.search).get('id') || '';
const countParam = parseInt(new URLSearchParams(location.search).get('count')) || 0;

if (!quizId) {
  document.getElementById('app').innerHTML = '<div class="loading">クイズIDが指定されていません。<br><a href="index.html" style="color:#60a5fa">TOPにもどる</a></div>';
} else {
  // 動的にデータファイルを読み込む
  const s = document.createElement('script');
  s.src = `data/${quizId}.js`;
  s.onerror = () => {
    document.getElementById('app').innerHTML = '<div class="loading">データの読み込みに失敗しました。<br><a href="index.html" style="color:#60a5fa">TOPにもどる</a></div>';
  };
  s.onload = () => {
    if (typeof UNIT_QUIZ === 'undefined') {
      document.getElementById('app').innerHTML = '<div class="loading">クイズデータが見つかりません。<br><a href="index.html" style="color:#60a5fa">TOPにもどる</a></div>';
      return;
    }
    const meta = UNIT_QUIZ.meta;
    // アクセントカラー適用
    document.documentElement.style.setProperty('--accent', meta.accent);
    // ===== SEO: タイトル・description・OGP を動的設定 =====
    const pageTitle = `${meta.fullTitle || meta.title}｜無料4択クイズ｜まなクエ！`;
    const subjStr = meta.subject ? `${meta.subject}の` : '';
    const pageDesc = `${subjStr}${meta.fullTitle || meta.title}を無料でプレイ。${meta.gradeTag || ''}の4択クイズ。3問・5問・10問・全問から選択可能。ブラウザで直接遊べる学習クイズサイト まなクエ！`;
    document.title = pageTitle;
    const setMeta = (sel, val, attr='content') => { const el = document.querySelector(sel); if(el) el.setAttribute(attr, val); };
    setMeta('meta[name="description"]', pageDesc);
    setMeta('meta[property="og:title"]', pageTitle);
    setMeta('meta[property="og:description"]', pageDesc);
    setMeta('meta[property="og:url"]', location.href);
    setMeta('link[rel="canonical"]', location.href, 'href');
    initQuiz(meta, UNIT_QUIZ.questions);
  };
  document.head.appendChild(s);
}

// ===== クイズエンジン =====
let current = 0, score = 0, answered = [];
let QUESTIONS = [];

let _allQuestions = [];
let _meta = {};

function initQuiz(meta, questions) {
  _allQuestions = questions;
  _meta = meta;

  // URLパラメータで問題数が指定されている場合は即スタート
  if (countParam > 0) {
    const shuffled = [...questions].sort(() => Math.random() - 0.5);
    startQuiz(shuffled.slice(0, Math.min(countParam, questions.length)));
    return;
  }

  // 選択肢を生成（3・5・10・全問）
  const opts = [];
  if (questions.length >= 3)  opts.push(3);
  if (questions.length >= 5)  opts.push(5);
  if (questions.length >= 10) opts.push(10);
  if (!opts.includes(questions.length)) opts.push(questions.length); // 全問

  document.getElementById('app').innerHTML = `
    <div class="start-screen">
      <img src="character/クエ丸/クエ丸.png" class="start-chara" alt="クエ丸">
      <div class="grade-tag">${meta.gradeTag}</div>
      <h1>${meta.title}</h1>
      <div class="start-meta">全 ${questions.length} 問収録</div>
      <div class="count-label">何問チャレンジする？</div>
      <div class="count-btns">
        ${opts.map(n => `
          <button class="count-btn" onclick="startWithCount(${n})">
            ${n === questions.length && n > 10 ? `全問<br><span style="font-size:12px;font-weight:700">${n}問</span>` : `${n}問`}
          </button>`).join('')}
      </div>
    </div>
  `;
}

function startWithCount(n) {
  const shuffled = [..._allQuestions].sort(() => Math.random() - 0.5);
  startQuiz(shuffled.slice(0, Math.min(n, _allQuestions.length)));
}

function startQuiz(questions) {
  QUESTIONS = questions;
  current = 0; score = 0; answered = [];

  document.getElementById('app').innerHTML = `
    <div class="page-header">
      <div class="grade-tag">${_meta.gradeTag}</div>
      <h1>${_meta.title}　${questions.length}問チャレンジ</h1>
    </div>
    <div class="progress-wrap">
      <div class="progress-label">
        <span id="progressText">問題 1 / ${questions.length}</span>
        <span id="scoreText">正解 0問</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div id="quizArea"></div>
    <div class="score-screen" id="scoreScreen">
      <div class="score-card">
        <img src="character/クエ丸/クエ丸.png" class="chara-inline chara-inline--score" alt="クエ丸" id="scoreChara">
        <div class="score-emoji" id="scoreEmoji"></div>
        <div class="score-num" id="scoreNum"></div>
        <div class="score-denom">/ ${questions.length}問</div>
        <div class="score-bar-wrap"><div class="score-bar-bg"><div class="score-bar-fill" id="scoreBarFill" style="width:0%"></div></div></div>
        <div class="score-msg" id="scoreMsg"></div>
      </div>
      <button id="gachaBtnScore" onclick="triggerGachaReward()" style="display:none;width:100%;margin-bottom:12px;padding:16px 40px;background:linear-gradient(135deg,#a855f7,#7c3aed);border:none;border-radius:14px;color:#fff;font-size:18px;font-weight:900;cursor:pointer;box-shadow:0 4px 20px rgba(168,85,247,.5);animation:orbPulse .8s ease-in-out infinite">🎰 ガチャを引く！</button>
      <button class="retry-btn" onclick="restart()">もう一度チャレンジ</button>
      <div class="review-list" id="reviewList"></div>
    </div>
  `;

  renderQuestion(0);
}

function renderQuestion(idx) {
  const q = QUESTIONS[idx];
  document.getElementById('quizArea').innerHTML = `
    <div class="question-card">
      <div class="q-number">問題 ${idx+1} / ${QUESTIONS.length}</div>
      <div class="q-text">${q.text}</div>
      <div class="choices">
        ${q.choices.map((c,i) => `<button class="choice-btn" onclick="selectAnswer(${i})" id="choice-${i}"><span class="choice-label">${'ABCD'[i]}</span>${c}</button>`).join('')}
      </div>
      <div class="feedback" id="feedback"><div class="feedback-label" id="feedbackLabel"></div><div class="feedback-text" id="feedbackText"></div></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">${idx < QUESTIONS.length-1 ? '次の問題へ →' : '結果を見る'}</button>
    </div>`;
  document.getElementById('progressFill').style.width = (idx / QUESTIONS.length * 100) + '%';
  document.getElementById('progressText').textContent = `問題 ${idx+1} / ${QUESTIONS.length}`;
}

function selectAnswer(sel) {
  const q = QUESTIONS[current];
  const ok = sel === q.answer;
  if (ok) score++;
  answered.push({idx: current, selected: sel, correct: ok});
  document.querySelectorAll('.choice-btn').forEach((b,i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add('correct');
    else if (i === sel && !ok) b.classList.add('wrong');
  });
  const fb = document.getElementById('feedback');
  fb.className = `feedback show ${ok ? 'correct-fb' : 'wrong-fb'}`;
  document.getElementById('feedbackLabel').textContent = ok ? '✅ 正解！' : `❌ 不正解。正解は「${q.choices[q.answer]}」`;
  document.getElementById('feedbackText').textContent = q.exp;
  document.getElementById('nextBtn').classList.add('show');
  document.getElementById('scoreText').textContent = `正解 ${score}問`;
}

function nextQuestion() {
  current++;
  if (current >= QUESTIONS.length) showScore();
  else renderQuestion(current);
}

function showScore() {
  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressText').textContent = '完了！';
  document.getElementById('scoreScreen').classList.add('show');
  const p = score / QUESTIONS.length;
  let e, m;
  if (p === 1)    { e='🏆'; m='全問正解！完璧だ！' }
  else if (p>=.8) { e='🎉'; m='すばらしい！あと少しで満点！' }
  else if (p>=.6) { e='😊'; m='よくできました！解説を読んで復習しよう。' }
  else if (p>=.4) { e='📚'; m='もう一歩！解説をしっかり確認しよう。' }
  else            { e='💪'; m='もう一度チャレンジ！解説が理解の近道。' }
  document.getElementById('scoreEmoji').textContent = e;
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('scoreMsg').textContent = m;
  // スコアに応じてクエ丸の画像を切り替え
  const sc = document.getElementById('scoreChara');
  if (sc) {
    sc.src = p >= 0.6 ? 'character/クエ丸/ガッツポーズ.png' : 'character/クエ丸/クエ丸.png';
    if (p >= 0.6) { sc.classList.add('chara-inline--bounce'); }
  }
  setTimeout(() => { document.getElementById('scoreBarFill').style.width = (p*100)+'%'; }, 100);
  // ガチャ報酬ボタンを表示（報酬がある場合のみ）
  setTimeout(() => {
    const pulls = typeof calcGachaPulls === 'function' ? calcGachaPulls(score, QUESTIONS.length) : 0;
    const btn = document.getElementById('gachaBtnScore');
    if (btn && pulls > 0) btn.style.display = 'block';
  }, 800);
  document.getElementById('reviewList').innerHTML =
    '<div style="font-size:13px;font-weight:700;color:var(--muted);margin-bottom:10px;text-align:left;">📋 振り返り</div>' +
    answered.map(a => {
      const q = QUESTIONS[a.idx];
      return `<div class="review-item"><div class="review-icon">${a.correct?'✅':'❌'}</div><div><div class="review-q">${q.text}</div><div class="review-a">正解：<span>${q.choices[q.answer]}</span>　あなたの回答：${q.choices[a.selected]}</div></div></div>`;
    }).join('');
}

function restart() {
  // スタート画面に戻る（問題数を選び直せる）
  initQuiz(_meta, _allQuestions);
}

// ===== ガチャ演出システム =====
let _gachaResults = [];
let _gachaIdx = 0;
let _gachaStarsReady = false;

function gachaClose() {
  const ov = document.getElementById('gachaRewardOverlay');
  ov.style.transition = 'opacity .4s ease';
  ov.style.opacity = '0';
  setTimeout(() => {
    ov.classList.remove('show');
    ov.style.opacity = '';
    _gachaReset();
  }, 400);
}

function _gachaReset() {
  const qm = document.getElementById('gachaQmark');
  const cw = document.getElementById('gachaCardWrap');
  const ci = document.getElementById('gachaCardInner');
  const banner = document.getElementById('gachaRarityBanner');
  qm.className = ''; qm.style.cssText = '';
  document.getElementById('gachaFlash').classList.remove('active');
  cw.classList.remove('reveal'); cw.style.opacity = '0';
  ci.className = '';
  banner.className = ''; banner.classList.remove('show'); banner.textContent = '';
  document.getElementById('gachaNextBtn').classList.remove('show');
  document.getElementById('gachaCloseBtn').classList.remove('show');
  document.getElementById('gachaNorewardPhase').classList.remove('show');
  document.getElementById('gachaParticles').innerHTML = '';
  document.getElementById('gachaCounter').textContent = '';
}

function _gachaInitStars() {
  if (_gachaStarsReady) return;
  const sf = document.getElementById('gachaStarField');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    const sz = Math.random() * 3 + 1;
    s.className = 'g-star';
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${1+Math.random()*3}s;animation-delay:${Math.random()*3}s`;
    sf.appendChild(s);
  }
  _gachaStarsReady = true;
}

function _gachaParticles(rarity) {
  const con = document.getElementById('gachaParticles');
  con.innerHTML = '';
  const palettes = {
    n:   ['#F6C744','#2563EB','#ffffff','#60a5fa','#93c5fd'],
    r:   ['#60a5fa','#2563EB','#ffffff','#93c5fd','#bfdbfe'],
    sr:  ['#a78bfa','#7c3aed','#F6C744','#ffffff','#c4b5fd'],
    ssr: ['#ffd700','#ff6b35','#ff1493','#00bfff','#ffffff','#a78bfa']
  };
  const colors = palettes[rarity] || palettes.n;
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    const isStar = Math.random() > 0.5;
    p.className = 'g-particle' + (isStar ? ' star-shape' : '');
    const sz = Math.random() * 16 + 6;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const angle = (Math.PI * 2 * i) / 60 + Math.random() * 0.3;
    const dist = 150 + Math.random() * 300;
    const tx = Math.cos(angle) * dist, ty = Math.sin(angle) * dist;
    const dur = 600 + Math.random() * 600, delay = Math.random() * 100;
    p.style.cssText = `width:${sz}px;height:${sz}px;left:${cx}px;top:${cy}px;background:${color};box-shadow:0 0 ${sz}px ${color};transform:translate(-50%,-50%)`;
    con.appendChild(p);
    p.animate([
      {transform:'translate(-50%,-50%) scale(1)',opacity:1},
      {transform:`translate(calc(-50% + ${tx}px),calc(-50% + ${ty}px)) scale(0)`,opacity:0}
    ], {duration:dur, delay, easing:'cubic-bezier(0,0,0.2,1)', fill:'forwards'});
  }
}

function _gachaCardHTML(result) {
  const c = result.card, r = c.rarity;
  const labels = {n:'N',r:'R',sr:'SR',ssr:'SSR'};
  const rings = [30,72,114,156,198,240,282,324,366].map(t =>
    `<div class="g-ring" style="top:${t}px"></div>`).join('');
  return `<div class="g-card-outer ${r}">${rings}<div class="g-card-paper">
    <div class="g-badge ${r}">${labels[r]||r.toUpperCase()}</div>
    <div class="g-char-area"><div class="g-char-emoji">${c.emoji}</div></div>
    <div class="g-name-area">
      <div class="g-char-name">${c.name}</div>
      ${result.isNew ? '<div class="g-char-new">NEW!</div>' : ''}
    </div>
  </div></div>`;
}

function _gachaBanner(rarity) {
  const cfg = {
    n:   {cls:'',          text:'✦ NORMAL ✦'},
    r:   {cls:'',          text:'✦ RARE ✦'},
    sr:  {cls:'sr-banner', text:'✦ SUPER RARE ✦'},
    ssr: {cls:'ssr-banner',text:'🌈 SUPER SUPER RARE 🌈'}
  };
  return cfg[rarity] || cfg.n;
}

function _gachaShowCard(idx, fullAnim) {
  const result = _gachaResults[idx];
  const total = _gachaResults.length;
  const isLast = idx === total - 1;
  const rarity = result.card.rarity;

  document.getElementById('gachaCounter').textContent = total > 1 ? `${idx+1} / ${total}枚` : '';
  document.getElementById('gachaCardFront').innerHTML = _gachaCardHTML(result);

  const banner = document.getElementById('gachaRarityBanner');
  const bCfg = _gachaBanner(rarity);
  banner.className = bCfg.cls;
  banner.textContent = bCfg.text;

  const cw = document.getElementById('gachaCardWrap');
  const ci = document.getElementById('gachaCardInner');
  const nextBtn = document.getElementById('gachaNextBtn');
  const closeBtn = document.getElementById('gachaCloseBtn');

  if (fullAnim) {
    // ===== 1枚目：フル演出 =====
    const qm = document.getElementById('gachaQmark');
    const flash = document.getElementById('gachaFlash');
    qm.className = ''; qm.style.cssText = '';

    setTimeout(() => qm.classList.add('appear'), 400);
    setTimeout(() => {
      qm.classList.remove('appear');
      qm.style.opacity = '1'; qm.style.transform = 'scale(1)';
      qm.classList.add('pulse');
    }, 1100);
    setTimeout(() => {
      qm.classList.remove('pulse');
      qm.classList.add('explode');
      flash.classList.add('active');
      _gachaParticles(rarity);
    }, 2350);
    setTimeout(() => {
      cw.style.opacity = '0';
      cw.classList.add('reveal');
      setTimeout(() => ci.classList.add('flip'), 100);
    }, 2600);
    setTimeout(() => banner.classList.add('show'), 3400);
    setTimeout(() => {
      if (isLast) closeBtn.classList.add('show');
      else nextBtn.classList.add('show');
    }, 3800);

  } else {
    // ===== 2枚目以降：フリップのみ =====
    cw.style.opacity = '0';
    ci.className = '';
    void cw.offsetWidth;
    cw.classList.add('reveal');
    setTimeout(() => ci.classList.add('flip'), 100);
    setTimeout(() => banner.classList.add('show'), 900);
    setTimeout(() => {
      if (isLast) closeBtn.classList.add('show');
      else nextBtn.classList.add('show');
    }, 1300);
  }
}

function gachaNextCard() {
  const cw = document.getElementById('gachaCardWrap');
  const ci = document.getElementById('gachaCardInner');
  const banner = document.getElementById('gachaRarityBanner');
  document.getElementById('gachaNextBtn').classList.remove('show');
  document.getElementById('gachaCloseBtn').classList.remove('show');
  cw.classList.remove('reveal'); cw.style.opacity = '0';
  ci.className = '';
  banner.classList.remove('show');
  _gachaIdx++;
  setTimeout(() => _gachaShowCard(_gachaIdx, false), 150);
}

function triggerGachaReward() {
  if (typeof claimQuizGacha !== 'function') return;
  const btn = document.getElementById('gachaBtnScore');
  if (btn) btn.style.display = 'none';
  const { pulls, results, alreadyCleared } = claimQuizGacha(quizId, score, QUESTIONS.length);
  showGachaRewardOverlay(pulls, results, alreadyCleared);
}

function showGachaRewardOverlay(pulls, results, alreadyCleared) {
  const ov = document.getElementById('gachaRewardOverlay');
  _gachaReset();
  _gachaInitStars();
  _gachaResults = results || [];
  _gachaIdx = 0;

  ov.style.opacity = '0';
  ov.classList.add('show');
  requestAnimationFrame(() => requestAnimationFrame(() => {
    ov.style.transition = 'opacity .4s ease';
    ov.style.opacity = '1';
  }));

  if (alreadyCleared || pulls === 0) {
    const np = document.getElementById('gachaNorewardPhase');
    np.classList.add('show');
    document.getElementById('gachaNorewardTitle').textContent =
      alreadyCleared ? '📚 クリア済み' : '📖 クイズ完了！';
    document.getElementById('gachaNorewardSub').textContent =
      alreadyCleared
        ? '別のクイズをクリアして新しいカードをゲットしよう！'
        : 'もう少し正解するとガチャが回せるよ！';
    return;
  }

  setTimeout(() => _gachaShowCard(0, true), 300);
}
</script>

<!-- ガチャ報酬オーバーレイ -->
<div class="gacha-reward-overlay" id="gachaRewardOverlay">
  <div id="gachaStarField"></div>
  <div id="gachaFlash"></div>
  <div id="gachaParticles"></div>
  <div id="gachaQmark">？</div>
  <div id="gachaCounter"></div>
  <!-- カード（1枚ずつ表示） -->
  <div id="gachaCardWrap">
    <div id="gachaCardInner">
      <div class="g-card-back">？</div>
      <div class="g-card-front" id="gachaCardFront"></div>
    </div>
  </div>
  <div id="gachaRarityBanner"></div>
  <!-- ナビボタン -->
  <button id="gachaNextBtn" onclick="gachaNextCard()">次のカードへ →</button>
  <button id="gachaCloseBtn" onclick="gachaClose()">OK！図鑑で確認する →</button>
  <!-- 報酬なし / クリア済み -->
  <div id="gachaNorewardPhase">
    <div class="g-noreward-title" id="gachaNorewardTitle"></div>
    <div class="g-noreward-sub" id="gachaNorewardSub"></div>
    <button class="g-noreward-close" onclick="gachaClose()">閉じる</button>
  </div>
</div>

</body>
</html>
