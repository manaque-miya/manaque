<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>クエ丸 レベルアップ演出デモ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #EAF2FE;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: "M PLUS Rounded 1c", sans-serif;
      gap: 40px;
    }

    /* ===== ステージ ===== */
    .stage {
      position: relative;
      width: 300px;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== クエ丸本体 ===== */
    .quemaru {
      width: 160px;
      position: relative;
      z-index: 10;
    }

    /* ===== キラキラ（CSS生成） ===== */
    .sparkle {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #F6C744;
      z-index: 5;
      opacity: 0;
    }
    .sparkle::before, .sparkle::after {
      content: "";
      position: absolute;
      background: inherit;
      border-radius: 50%;
    }
    /* 十字形キラキラ */
    .sparkle-star {
      position: absolute;
      width: 8px;
      height: 8px;
      z-index: 5;
      opacity: 0;
    }
    .sparkle-star::before {
      content: "✦";
      font-size: 20px;
      color: #F6C744;
      position: absolute;
      top: -6px;
      left: -6px;
    }

    /* ===== レベルアップテキスト ===== */
    .levelup-text {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      font-weight: 900;
      color: #F6C744;
      text-shadow: 0 2px 0 #D4A60E, 0 0 16px rgba(246,199,68,0.8);
      white-space: nowrap;
      opacity: 0;
      z-index: 20;
    }

    /* ===== オーラ（背景光） ===== */
    .aura {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(246,199,68,0.35) 0%, rgba(46,109,229,0.15) 50%, transparent 70%);
      z-index: 1;
      opacity: 0;
    }

    /* ===== ボタン ===== */
    .btn {
      padding: 14px 40px;
      background: #2563EB;
      color: white;
      border: none;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 4px 12px rgba(37,99,235,0.4);
      transition: transform .1s, box-shadow .1s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(37,99,235,0.5); }
    .btn:active { transform: translateY(0); }

    /* ===================================================
       アニメーション定義
    =================================================== */

    /* クエ丸：ポヨンと登場 → バウンス */
    @keyframes quemaru-levelup {
      0%   { transform: scale(0) rotate(-10deg); opacity: 0; }
      40%  { transform: scale(1.3) rotate(5deg);  opacity: 1; }
      55%  { transform: scale(0.9) rotate(-3deg); }
      70%  { transform: scale(1.15) rotate(2deg); }
      82%  { transform: scale(0.97) rotate(0deg); }
      90%  { transform: scale(1.05); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    /* オーラ：フワッと広がる */
    @keyframes aura-pulse {
      0%   { opacity: 0; transform: scale(0.5); }
      30%  { opacity: 1; transform: scale(1.1); }
      70%  { opacity: 0.6; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.3); }
    }

    /* テキスト：上から落ちてくる */
    @keyframes text-drop {
      0%   { opacity: 0; transform: translateX(-50%) translateY(-20px) scale(1.4); }
      30%  { opacity: 1; transform: translateX(-50%) translateY(4px)  scale(0.95); }
      50%  { transform: translateX(-50%) translateY(-3px) scale(1.02); }
      70%  { transform: translateX(-50%) translateY(0) scale(1); }
      85%  { opacity: 1; }
      100% { opacity: 0; transform: translateX(-50%) translateY(-8px) scale(1); }
    }

    /* キラキラ：四方に飛び散る */
    @keyframes sparkle-1 {
      0%   { opacity: 0; transform: translate(0,0) scale(0); }
      20%  { opacity: 1; transform: translate(-60px,-70px) scale(1.2); }
      60%  { opacity: 0.8; transform: translate(-80px,-100px) scale(0.8); }
      100% { opacity: 0; transform: translate(-90px,-120px) scale(0); }
    }
    @keyframes sparkle-2 {
      0%   { opacity: 0; transform: translate(0,0) scale(0); }
      20%  { opacity: 1; transform: translate(65px,-60px) scale(1); }
      60%  { opacity: 0.8; transform: translate(90px,-90px) scale(0.7); }
      100% { opacity: 0; transform: translate(100px,-110px) scale(0); }
    }
    @keyframes sparkle-3 {
      0%   { opacity: 0; transform: translate(0,0) scale(0); }
      25%  { opacity: 1; transform: translate(-70px,50px) scale(1.1); }
      65%  { opacity: 0.7; transform: translate(-95px,75px) scale(0.6); }
      100% { opacity: 0; transform: translate(-110px,90px) scale(0); }
    }
    @keyframes sparkle-4 {
      0%   { opacity: 0; transform: translate(0,0) scale(0); }
      25%  { opacity: 1; transform: translate(70px,55px) scale(1); }
      65%  { opacity: 0.7; transform: translate(95px,80px) scale(0.6); }
      100% { opacity: 0; transform: translate(110px,95px) scale(0); }
    }
    @keyframes sparkle-5 {
      0%   { opacity: 0; transform: translate(0,0) scale(0); }
      20%  { opacity: 1; transform: translate(0,-90px) scale(1.2); }
      100% { opacity: 0; transform: translate(0,-130px) scale(0); }
    }

    /* ===== 再生クラス（JSで付与） ===== */
    .play .quemaru {
      animation: quemaru-levelup 0.9s cubic-bezier(.36,.07,.19,.97) forwards;
    }
    .play .aura {
      animation: aura-pulse 1.2s ease-out forwards;
    }
    .play .levelup-text {
      animation: text-drop 1.4s ease-out 0.2s forwards;
    }
    .play .sparkle-star:nth-child(1) { animation: sparkle-1 1s ease-out 0.15s forwards; }
    .play .sparkle-star:nth-child(2) { animation: sparkle-2 1s ease-out 0.2s forwards;  }
    .play .sparkle-star:nth-child(3) { animation: sparkle-3 1s ease-out 0.1s forwards;  }
    .play .sparkle-star:nth-child(4) { animation: sparkle-4 1s ease-out 0.25s forwards; }
    .play .sparkle-star:nth-child(5) { animation: sparkle-5 1s ease-out 0.05s forwards; }
  </style>
</head>
<body>

  <div class="stage" id="stage">
    <div class="aura"></div>
    <div class="levelup-text">レベルアップ！</div>
    <div class="sparkle-star"></div>
    <div class="sparkle-star"></div>
    <div class="sparkle-star"></div>
    <div class="sparkle-star"></div>
    <div class="sparkle-star"></div>
    <img class="quemaru" src="表情.png" alt="クエ丸">
  </div>

  <button class="btn" onclick="play()">▶ 再生</button>

  <script>
    function play() {
      const stage = document.getElementById('stage');
      stage.classList.remove('play');
      // 一瞬外してから再付与（リセット）
      void stage.offsetWidth;
      stage.classList.add('play');
    }
  </script>
</body>
</html>
