<!DOCTYPE html>
<html lang="ja">
<head>
  <!-- Google tag (gtag.js) -->

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>まなクエ！｜クイズに挑戦</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand-50:#EAF2FE; --brand-500:#2E6DE5; --brand-600:#1F56C6; --brand-700:#1A449E;
      --hero-blue:#2563EB; --accent-yellow:#F6C744; --accent-yellow-dark:#D4A60E;
      --success:#1AAE71; --success-bg:#E3F7ED; --danger:#E5484D; --danger-bg:#FCE6E6;
      --ink-900:#0F1830; --ink-700:#2B3858; --ink-500:#5B6785; --ink-400:#8693AE;
      --ink-100:#ECEFF5; --white:#FFFFFF; --border:#E4E9F2; --surface:#EAF2FE;
      --r-lg:20px; --r-xl:28px; --r-pill:999px;
      --shadow-sm:0 2px 6px rgba(30,50,110,.06),0 1px 2px rgba(30,50,110,.04);
      --shadow-md:0 8px 20px rgba(30,50,110,.08),0 2px 4px rgba(30,50,110,.04);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:"M PLUS Rounded 1c",-apple-system,system-ui,sans-serif;background:var(--surface);color:var(--ink-700);min-height:100vh;}

    /* HEADER */
    .mq-header{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
    .mq-header__inner{max-width:800px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;}
    .mq-logo{display:inline-flex;align-items:center;gap:8px;text-decoration:none;}
    .mq-logo__icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#2E6DE5,#1A449E);display:grid;place-items:center;box-shadow:0 2px 6px rgba(30,50,110,.2);}
    .mq-logo__text{font-size:20px;font-weight:900;color:var(--ink-900);}
    .mq-logo__text span{color:var(--brand-600);}
    .mq-header__back{font-size:13px;font-weight:700;color:var(--brand-600);text-decoration:none;}
    .mq-header__catalog{background:rgba(255,215,0,.12);border:1.5px solid rgba(255,215,0,.4);border-radius:var(--r-pill);padding:6px 14px;font-family:"M PLUS Rounded 1c",sans-serif;font-size:13px;font-weight:700;color:#7a5c00;cursor:pointer;transition:all .15s;}
    .mq-header__catalog:hover{background:rgba(255,215,0,.24);}

    /* MAIN */
    .mq-main{max-width:800px;margin:0 auto;padding:24px 16px 48px;}
    .screen{display:none;} .screen.active{display:block;}

    /* QUIZ BAR（ドット付き） */
    .quiz-bar{background:var(--hero-blue);border-radius:var(--r-xl);padding:16px 20px;margin-bottom:16px;position:relative;overflow:hidden;}
    .quiz-bar::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.2) 1px,transparent 1px);background-size:22px 22px;border-radius:var(--r-xl);}
    .quiz-bar__inner{display:flex;align-items:center;gap:12px;position:relative;z-index:1;}
    .quiz-counter{font-size:13px;font-weight:800;color:rgba(255,255,255,.85);white-space:nowrap;}
    .progress-wrap{flex:1;background:rgba(255,255,255,.2);border-radius:var(--r-pill);height:10px;overflow:hidden;}
    .progress-bar{height:100%;background:var(--accent-yellow);border-radius:var(--r-pill);transition:width .4s ease;}
    .score-badge{background:rgba(255,255,255,.2);color:var(--white);border:1px solid rgba(255,255,255,.3);font-size:13px;font-weight:900;padding:5px 14px;border-radius:var(--r-pill);white-space:nowrap;}

    /* QUESTION CARD */
    .question-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-xl);padding:28px 24px;box-shadow:var(--shadow-sm);margin-bottom:16px;}
    .question-card__tags{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
    .question-card__num{font-size:12px;font-weight:700;color:var(--ink-400);margin-bottom:8px;}
    .question-card__text{font-size:20px;font-weight:800;color:var(--ink-900);line-height:1.5;}

    /* BADGES */
    .badge{display:inline-flex;align-items:center;height:22px;padding:0 10px;border-radius:var(--r-pill);font-size:11px;font-weight:700;}
    .badge--green{background:#DCF5EA;color:#0F7A4F;} .badge--sky{background:#E0F4FD;color:#0369A1;}
    .badge--yellow{background:#FEF5D6;color:#946500;} .badge--pink{background:#FFE4EA;color:#B04351;}
    .badge--purple{background:#ECE5FA;color:#5C3FBF;} .badge--brand{background:#EAF2FE;color:#1A449E;}
    .badge--neutral{background:#ECEFF5;color:#2B3858;} .badge--orange{background:#FEF0E0;color:#9A4800;}

    /* CHOICES */
    .choices{display:flex;flex-direction:column;gap:10px;}
    .choice-btn{width:100%;padding:16px 20px;background:var(--white);border:2px solid var(--border);border-radius:var(--r-lg);cursor:pointer;font-family:"M PLUS Rounded 1c",system-ui,sans-serif;font-size:16px;font-weight:700;color:var(--ink-700);text-align:left;display:flex;align-items:center;gap:12px;transition:all .15s;box-shadow:var(--shadow-sm);}
    .choice-btn:hover:not(:disabled){border-color:var(--brand-500);background:var(--brand-50);transform:translateY(-1px);box-shadow:var(--shadow-md);}
    .choice-btn__label{width:28px;height:28px;border-radius:50%;background:var(--ink-100);color:var(--ink-500);display:grid;place-items:center;font-size:13px;font-weight:900;flex-shrink:0;}
    .choice-btn.correct{border-color:var(--success);background:var(--success-bg);color:#0F7A4F;}
    .choice-btn.correct .choice-btn__label{background:var(--success);color:var(--white);}
    .choice-btn.wrong{border-color:var(--danger);background:var(--danger-bg);color:#9B1E22;}
    .choice-btn.wrong .choice-btn__label{background:var(--danger);color:var(--white);}
    .choice-btn:disabled{cursor:default;transform:none;}

    /* FEEDBACK */
    .feedback{border-radius:var(--r-lg);padding:16px 20px;margin-top:16px;display:none;font-size:14px;font-weight:700;line-height:1.6;}
    .feedback.correct{background:var(--success-bg);color:#0A6644;border:1.5px solid #34C38F;display:block;}
    .feedback.wrong{background:var(--danger-bg);color:#9B1E22;border:1.5px solid var(--danger);display:block;}
    .next-btn-wrap{margin-top:20px;}

    /* BUTTONS */
    .mq-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:50px;padding:0 28px;border:none;border-radius:var(--r-pill);cursor:pointer;font-family:"M PLUS Rounded 1c",system-ui,sans-serif;font-size:16px;font-weight:800;transition:transform .15s cubic-bezier(.34,1.56,.64,1);text-decoration:none;width:100%;}
    .mq-btn:active{transform:translateY(2px);}
    .mq-btn--accent{background:var(--accent-yellow);color:var(--ink-900);box-shadow:0 4px 0 var(--accent-yellow-dark),0 6px 12px rgba(191,145,0,.2);}
    .mq-btn--primary{background:var(--brand-500);color:var(--white);box-shadow:0 4px 0 var(--brand-700),0 6px 12px rgba(30,50,110,.15);}
    .mq-btn--ghost{background:var(--white);color:var(--brand-600);box-shadow:0 2px 0 var(--border),inset 0 0 0 1.5px var(--border);}

    /* RESULT */
    .result-card{background:var(--hero-blue);border-radius:var(--r-xl);padding:36px 24px;text-align:center;margin-bottom:20px;position:relative;overflow:hidden;}
    .result-card::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.18) 1px,transparent 1px);background-size:24px 24px;border-radius:var(--r-xl);}
    .result-card__inner{position:relative;z-index:1;}
    .result-card__icon{font-size:64px;margin-bottom:12px;}
    .result-chara-img{display:block;margin:0 auto 4px;height:72px;object-fit:contain;filter:drop-shadow(0 2px 10px rgba(0,0,0,.3));}
    .result-card__rank{font-size:15px;font-weight:800;color:var(--accent-yellow);margin-bottom:8px;}
    .result-card__score{font-size:56px;font-weight:900;color:var(--white);line-height:1;margin-bottom:4px;}
    .result-card__score span{font-size:22px;color:rgba(255,255,255,.6);}
    .result-card__msg{font-size:14px;color:rgba(255,255,255,.78);margin-top:10px;line-height:1.7;}
    .result-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
    .result-stat{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:16px;text-align:center;box-shadow:var(--shadow-sm);}
    .result-stat__num{font-size:28px;font-weight:900;}
    .result-stat__label{font-size:12px;color:var(--ink-500);font-weight:700;margin-top:4px;}

    /* ===== GACHA SYSTEM CSS ===== */
    @keyframes popIn { 0%{transform:scale(0.5);opacity:0} 70%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
    @keyframes capsuleSpin {
      0%   { transform: rotate(0deg)   scale(1);   }
      40%  { transform: rotate(480deg) scale(1.3); }
      70%  { transform: rotate(620deg) scale(1.1); }
      100% { transform: rotate(720deg) scale(1);   }
    }
    @keyframes cardFlipIn {
      0%   { transform: rotateY(90deg) scale(0.6); opacity: 0; }
      100% { transform: rotateY(0deg)  scale(1);   opacity: 1; }
    }
    @keyframes srGlowPulse {
      0%,100% { box-shadow: 0 0 30px #ffd700, 0 0 60px rgba(255,215,0,0.4); }
      50%     { box-shadow: 0 0 50px #ffd700, 0 0 100px rgba(255,215,0,0.7); }
    }
    @keyframes srFlash { 0% { opacity:1; } 100% { opacity:0; } }
    @keyframes spTwinkle {
      0%, 100% { opacity: 0; transform: scale(0.15) rotate(0deg); }
      40%, 60% { opacity: 1; transform: scale(1.15) rotate(80deg); }
    }
    @keyframes artShimmer {
      0%, 100% { background-position: 0% 50%; }
      50%       { background-position: 100% 50%; }
    }
    @keyframes artSweep {
      0%   { transform: translateX(-120%); }
      100% { transform: translateX(220%); }
    }
    @keyframes gachaBtnPulse {
      0%,100% { box-shadow: 0 4px 20px rgba(124,58,237,0.45); }
      50%     { box-shadow: 0 4px 40px rgba(168,85,247,0.8); }
    }

    .gacha-capsule { font-size: 72px; display: flex; align-items: center; justify-content: center; margin: 16px auto; }
    .gacha-capsule.spin { animation: capsuleSpin 1.6s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
    .gacha-rarity-announce { font-size: 22px; font-weight: 900; text-align: center; margin: 4px 0; animation: popIn 0.4s ease; }
    .gacha-count-indicator { font-size: 13px; color: rgba(255,255,255,0.55); margin-bottom: 6px; text-align: center; }

    .gacha-card { width: 200px; border-radius: 16px; overflow: hidden; animation: cardFlipIn 0.6s ease forwards; position: relative; }
    .gacha-card.sr { box-shadow: 0 0 30px #ffd700, 0 0 60px rgba(255,215,0,0.4); animation: cardFlipIn 0.6s ease forwards, srGlowPulse 2s ease-in-out 0.6s infinite; }
    .gacha-card.r  { box-shadow: 0 0 20px #a78bfa, 0 0 40px rgba(167,139,250,0.35); }

    /* カードアート */
    .card-art { width: 100%; height: 100px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; border-radius: 11px 11px 0 0; }
    .card-art.n { background: linear-gradient(160deg, #dbeafe 0%, #93c5fd 50%, #60a5fa 100%); }
    .card-art.n::after { content:''; position:absolute; inset:0; background: radial-gradient(circle at 65% 30%, rgba(255,255,255,0.35), transparent 60%); }
    .card-art.r { background: linear-gradient(160deg, #1e0040 0%, #5b21b6 50%, #7c3aed 80%, #4c1d95 100%); }
    .card-art.r::after { content:''; position:absolute; inset:0; background: radial-gradient(circle at 30% 35%, rgba(167,139,250,0.45), transparent 55%); }
    .card-art.sr { background: linear-gradient(135deg, #7c2d00 0%, #d97706 25%, #fbbf24 50%, #d97706 75%, #92400e 100%); background-size: 300% 300%; animation: artShimmer 3s ease infinite; }
    .card-art.sr::before { content:''; position:absolute; inset:0; background: repeating-linear-gradient(55deg, transparent, transparent 14px, rgba(255,255,255,0.1) 14px, rgba(255,255,255,0.1) 28px); pointer-events: none; }
    .card-art.sr::after { content:''; position:absolute; inset:0; background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.18) 50%, transparent 100%); animation: artSweep 2.2s ease-in-out infinite; pointer-events: none; }
    .card-art-emoji { font-size: 56px; position: relative; z-index: 2; filter: drop-shadow(0 3px 10px rgba(0,0,0,0.55)); }

    /* カード情報 */
    .card-info { padding: 10px 12px 14px; display: flex; flex-direction: column; align-items: center; gap: 6px; position: relative; width: 100%; }
    .card-info.n  { background: linear-gradient(180deg, #f0f0f0 0%, #d8d8d8 100%); }
    .card-info.r  { background: linear-gradient(180deg, #3b0764 0%, #4c1d95 100%); }
    .card-info.sr { background: linear-gradient(180deg, #7c2d00 0%, #5c1f00 100%); }
    .card-rarity-badge { font-size: 10px; font-weight: 900; letter-spacing: 0.15em; padding: 3px 10px; border-radius: 20px; }
    .badge-n  { background: rgba(0,0,0,0.1);   color: #555; }
    .badge-r  { background: rgba(255,255,255,0.18); color: #e9d5ff; }
    .badge-sr { background: rgba(0,0,0,0.25);   color: #fef3c7; position: relative; z-index: 1; }
    .card-name { font-size: 16px; font-weight: 900; text-align: center; position: relative; z-index: 1; }
    .card-name.n { color: #1a1a1a; } .card-name.r { color: #fff; } .card-name.sr { color: #fef3c7; }
    .card-flavor { font-size: 10px; text-align: center; line-height: 1.45; position: relative; z-index: 1; }
    .card-flavor.n { color: #555; } .card-flavor.r { color: #ddd6fe; } .card-flavor.sr { color: #fef9c3; }
    .card-new-badge { position: absolute; top: -6px; right: -6px; background: #ef4444; color: #fff; font-size: 10px; font-weight: 900; padding: 3px 8px; border-radius: 20px; animation: popIn 0.3s ease; z-index: 10; }

    /* SR キラキラ */
    .sp-star { position: absolute; pointer-events: none; z-index: 5; animation: spTwinkle 1.8s ease-in-out infinite; }

    /* ガチャ内ボタン */
    .gacha-next-btn { padding: 14px 40px; background: linear-gradient(135deg, #2E6DE5, #1A449E); border: none; border-radius: 14px; color: #fff; font-size: 16px; font-weight: 900; cursor: pointer; margin-top: 14px; box-shadow: 0 4px 20px rgba(46,109,229,0.4); font-family:"M PLUS Rounded 1c",sans-serif; }
    .gacha-next-btn:active { transform: scale(0.97); }
    .gacha-close-btn { padding: 10px 28px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18); border-radius: 12px; color: rgba(255,255,255,0.6); font-size: 13px; font-weight: 700; cursor: pointer; margin-top: 8px; font-family:"M PLUS Rounded 1c",sans-serif; }
    .sr-flash { position: fixed; inset: 0; background: radial-gradient(circle at center, rgba(255,215,0,0.75) 0%, transparent 65%); z-index: 999; pointer-events: none; animation: srFlash 0.55s ease forwards; }

    /* 結果画面のガチャトリガーボタン */
    .gacha-trigger-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #7c3aed, #a855f7); border: none; border-radius: 16px; color: #fff; font-size: 18px; font-weight: 900; cursor: pointer; margin-bottom: 12px; box-shadow: 0 4px 20px rgba(124,58,237,0.45); animation: gachaBtnPulse 1.6s ease-in-out infinite; font-family:"M PLUS Rounded 1c",sans-serif; }
    .gacha-trigger-btn:disabled { opacity: 0.4; animation: none; cursor: not-allowed; }

    /* カタログボタン */
    .catalog-open-btn { width: 100%; padding: 14px; background: rgba(255,215,0,0.08); border: 1.5px solid rgba(255,215,0,0.3); border-radius: var(--r-pill); color: #b8860b; font-size: 15px; font-weight: 800; cursor: pointer; margin-bottom: 12px; transition: all 0.2s; font-family:"M PLUS Rounded 1c",sans-serif; }
    .catalog-open-btn:hover { background: rgba(255,215,0,0.16); }

    /* CATALOG OVERLAY */
    .catalog-title   { font-size: 22px; font-weight: 900; color: #ffd700; margin-bottom: 4px; }
    .catalog-subtitle{ font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 20px; }
    .catalog-section { width: 100%; max-width: 480px; margin-bottom: 24px; }
    .catalog-section-title { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.55); margin-bottom: 10px; }
    .catalog-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .catalog-mini { aspect-ratio: 5/7; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; padding: 6px; cursor: pointer; transition: transform 0.15s; }
    .catalog-mini:active { transform: scale(0.93); }
    .catalog-mini.n  { background: linear-gradient(160deg,#f0f0f0,#d8d8d8); border: 2px solid #bbb; }
    .catalog-mini.r  { background: linear-gradient(160deg,#4c1d95,#7c3aed); border: 2px solid #a78bfa; }
    .catalog-mini.sr { background: linear-gradient(160deg,#78350f,#d97706,#fbbf24); border: 2px solid #fbbf24; }
    .catalog-mini.locked { background: #2a2550; border: 2px solid #4a4580; }
    .catalog-mini .mini-emoji { font-size: 26px; }
    .catalog-mini.locked .mini-emoji { filter: grayscale(1); opacity: 0.2; }
    .catalog-mini .mini-name { font-size: 8px; font-weight: 700; text-align: center; color: #333; line-height: 1.2; }
    .catalog-mini.r .mini-name, .catalog-mini.sr .mini-name { color: #fff; }
    .catalog-mini.locked .mini-name { color: rgba(255,255,255,0.08); }
    .catalog-close-btn { padding: 14px 40px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 14px; color: rgba(255,255,255,0.8); font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 20px; font-family:"M PLUS Rounded 1c",sans-serif; }

    @media(max-width:768px){
      body{min-height:unset;padding-bottom:40px;}
      .mq-header__inner{padding:12px 16px;}
      .question-card{padding:20px 16px;}
      .question-card__text{font-size:17px;}
      .choice-btn{font-size:14px;padding:14px 16px;}
    }
  </style>
  <!-- カード・ガチャ共有データ -->
  <script src="data/cards.js"></script>
  <script src="data/gacha.js"></script>
  <!-- クイズ問題データ -->
  <script src="data/geography.js"></script>
  <script src="data/body.js"></script>
  <script src="data/fraction.js"></script>
  <script src="data/meiji.js"></script>
  <script src="data/english.js"></script>
  <script src="data/logic.js"></script>
  <script src="data/history.js"></script>
  <script src="data/prefecture.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4180647894648021"
       crossorigin="anonymous"></script>
</head>
<body>

<!-- ===== GACHA OVERLAY ===== -->
<div id="gachaOverlay" style="display:none;position:fixed;inset:0;background:radial-gradient(ellipse at 50% 20%,#1e0050 0%,#080018 55%,#000005 100%);z-index:1000;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center">
  <div id="gachaCountIndicator" class="gacha-count-indicator" style="display:none"></div>
  <div id="gachaCapsulePhase" style="display:flex;flex-direction:column;align-items:center">
    <div style="font-size:20px;font-weight:900;color:#fff;margin-bottom:4px">ガチャを回しています…</div>
    <div id="gachaCapsule" class="gacha-capsule">🎱</div>
  </div>
  <div id="gachaCardPhase" style="display:none;flex-direction:column;align-items:center">
    <div id="gachaRarityAnnounce" class="gacha-rarity-announce"></div>
    <div id="gachaCardDisplay" style="position:relative"></div>
    <button id="gachaNextBtn" class="gacha-next-btn">つぎへ →</button>
    <button id="gachaCloseBtn" class="gacha-close-btn">✕ 閉じる</button>
  </div>
</div>

<header class="mq-header">
  <div class="mq-header__inner">
    <a href="index.html" class="mq-logo">
      <span class="mq-logo__icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M6 4h9l5 5v11a1 1 0 01-1 1H6a1 1 0 01-1-1V5a1 1 0 011-1z" stroke="#fff" stroke-width="2.2" stroke-linejoin="round"/>
          <path d="M14 4v5h5" stroke="#fff" stroke-width="2.2" stroke-linejoin="round"/>
          <circle cx="12" cy="15" r="1.5" fill="#F6C744"/>
        </svg>
      </span>
      <span class="mq-logo__text">まな<span>クエ！</span></span>
    </a>
    <div style="display:flex;align-items:center;gap:10px">
      <button class="mq-header__catalog" onclick="showCatalog()">📖 図鑑（<span id="headerCatalogCount">0</span>）</button>
      <a href="index.html" class="mq-header__back">← TOP</a>
    </div>
  </div>
</header>

<main class="mq-main">
  <div class="screen" id="screen-quiz">
    <div class="quiz-bar">
      <div class="quiz-bar__inner">
        <div class="quiz-counter" id="quiz-counter">1 / 5</div>
        <div class="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:20%"></div></div>
        <div class="score-badge" id="score-badge">⭐ 0</div>
      </div>
    </div>
    <div class="question-card">
      <div class="question-card__tags" id="q-tags"></div>
      <div class="question-card__num" id="q-num">問題 1</div>
      <div class="question-card__text" id="q-text"></div>
    </div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <div class="next-btn-wrap" id="next-btn-wrap" style="display:none">
      <button class="mq-btn mq-btn--primary" onclick="nextQuestion()">つぎの問題へ →</button>
    </div>
  </div>

  <div class="screen" id="screen-result">
    <div class="result-card">
      <div class="result-card__inner">
        <img class="result-chara-img" src="assets/img/characters/que-maru/base.png" alt="クエ丸">
        <div class="result-card__icon" id="result-icon">🎉</div>
        <div class="result-card__rank" id="result-rank"></div>
        <div class="result-card__score"><span id="result-score">0</span><span id="result-total"> / 5</span></div>
        <p class="result-card__msg" id="result-msg"></p>
      </div>
    </div>
    <div class="result-stats">
      <div class="result-stat"><div class="result-stat__num" id="stat-correct" style="color:#1AAE71">0</div><div class="result-stat__label">✅ 正解</div></div>
      <div class="result-stat"><div class="result-stat__num" id="stat-wrong" style="color:#E5484D">0</div><div class="result-stat__label">❌ 不正解</div></div>
    </div>

    <!-- GACHA TRIGGER (正解数に応じて表示) -->
    <button class="gacha-trigger-btn" id="gachaTriggerBtn" style="display:none" onclick="startGachaFromResult()">🎰 ガチャを回す！</button>

    <!-- カード図鑑 -->
    <a href="catalog.html" class="catalog-open-btn" style="display:block;text-align:center;text-decoration:none;">📖 カード図鑑を見る（<span id="catalogBtnCount">0</span> / 20 枚）</a>

    <button class="mq-btn mq-btn--accent" onclick="restartQuiz()" style="margin-bottom:12px">🔄 もう一度チャレンジ</button>
    <button class="mq-btn mq-btn--ghost" onclick="goHome()">🏠 TOPにもどる</button>
  </div>
</main>

<script>
// ===== 全クイズデータ（各 data/*.js から読み込み済み） =====
const allQuizzes = {
  geography: QUIZ_GEOGRAPHY,
  body:      QUIZ_BODY,
  fraction:  QUIZ_FRACTION,
  meiji:     QUIZ_MEIJI,
  english:   QUIZ_ENGLISH,
  logic:     QUIZ_LOGIC,
  history:    QUIZ_HISTORY,
  prefecture: QUIZ_PREFECTURE,
};

// ===== ユーティリティ =====
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function prepareQuestions(qs) {
  // 問題順シャッフル + 各問題の選択肢シャッフル（正解インデックスを追従更新）
  return shuffleArray(qs).map(q => {
    const correctText   = q.choices[q.answer];
    const shuffled      = shuffleArray(q.choices);
    return { ...q, choices: shuffled, answer: shuffled.indexOf(correctText) };
  });
}

// ===== Web Audio API 効果音 =====
let _audioCtx = null;
function _getCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return _audioCtx;
}
function playCorrect() {
  try {
    const ctx = _getCtx(), t = ctx.currentTime;
    [[523.25,0],[659.25,.12],[783.99,.24]].forEach(([freq, d]) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine'; o.frequency.value = freq;
      g.gain.setValueAtTime(.28, t+d);
      g.gain.exponentialRampToValueAtTime(.001, t+d+.28);
      o.start(t+d); o.stop(t+d+.3);
    });
  } catch(e) {}
}
function playWrong() {
  try {
    const ctx = _getCtx(), t = ctx.currentTime;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(280, t);
    o.frequency.exponentialRampToValueAtTime(140, t+.32);
    g.gain.setValueAtTime(.18, t);
    g.gain.exponentialRampToValueAtTime(.001, t+.38);
    o.start(t); o.stop(t+.4);
  } catch(e) {}
}

// ===== クイズエンジン =====
let quizId = 'geography';
let questions = [];
let currentQ = 0, score = 0, answered = false;
const LABELS = ['A','B','C','D'];

window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  quizId = params.get('id') || 'geography';
  if (!params.get('autostart')) {
    window.location.replace('index.html');
    return;
  }
  const allQ      = allQuizzes[quizId]?.questions || allQuizzes.geography.questions;
  const countRaw  = params.get('count') || '10';
  const countNum  = countRaw === 'all' ? allQ.length : Math.min(parseInt(countRaw, 10) || 10, allQ.length);
  questions = prepareQuestions(allQ).slice(0, countNum);
  document.title = `まなクエ！｜${allQuizzes[quizId]?.title || 'クイズ'}（${countNum}問）`;
  updateCatalogBtn();
  showScreen('screen-quiz');
  renderQuestion();
});

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderQuestion() {
  answered = false;
  const q = questions[currentQ];
  const total = questions.length;
  document.getElementById('quiz-counter').textContent = `${currentQ+1} / ${total}`;
  document.getElementById('progress-bar').style.width = `${((currentQ+1)/total)*100}%`;
  document.getElementById('score-badge').textContent = `⭐ ${score}`;
  document.getElementById('q-num').textContent = `問題 ${currentQ+1}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-tags').innerHTML = q.tags.map(t=>`<span class="badge ${t.c}">${t.l}</span>`).join('');
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  q.choices.forEach((c,i)=>{
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-btn__label">${LABELS[i]}</span>${c}`;
    btn.onclick = ()=>selectAnswer(i);
    choicesEl.appendChild(btn);
  });
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('next-btn-wrap').style.display = 'none';
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = questions[currentQ];
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b=>b.disabled=true);
  const fb = document.getElementById('feedback');
  if (idx === q.answer) {
    score++;
    playCorrect();
    btns[idx].classList.add('correct');
    fb.className = 'feedback correct';
    fb.innerHTML = `✅ 正解！ ${q.exp}`;
  } else {
    playWrong();
    btns[idx].classList.add('wrong');
    btns[q.answer].classList.add('correct');
    fb.className = 'feedback wrong';
    fb.innerHTML = `❌ 不正解… 正解は「${q.choices[q.answer]}」。${q.exp}`;
  }
  document.getElementById('score-badge').textContent = `⭐ ${score}`;
  document.getElementById('next-btn-wrap').style.display = 'block';
  if (currentQ === questions.length-1)
    document.querySelector('#next-btn-wrap .mq-btn').textContent = '結果を見る 🏁';
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) showResult();
  else renderQuestion();
}

function showResult() {
  showScreen('screen-result');
  const total = questions.length;
  const pct = score/total;
  document.getElementById('result-score').textContent = score;
  document.getElementById('result-total').textContent = ` / ${total}`;
  document.getElementById('stat-correct').textContent = score;
  document.getElementById('stat-wrong').textContent = total-score;
  let icon,rank,msg;
  if(pct===1)       {icon='🏆';rank='パーフェクト！';   msg='全問正解！完璧な実力です。';}
  else if(pct>=0.8) {icon='🥇';rank='優秀！';          msg='あと少しで満点。よく覚えてる！';}
  else if(pct>=0.6) {icon='🥈';rank='もう少し！';      msg='半分以上正解！もう一度チャレンジしよう。';}
  else if(pct>=0.4) {icon='🥉';rank='がんばろう';      msg='くり返し解くと覚えられるよ！';}
  else              {icon='📚';rank='もっと勉強しよう！';msg='難しかったかな？一緒に覚えていこう！';}
  document.getElementById('result-icon').textContent = icon;
  document.getElementById('result-rank').textContent = rank;
  document.getElementById('result-msg').textContent = msg;

  // ガチャボタン設定
  const pulls = calcGachaPulls(score, total);
  const gb = document.getElementById('gachaTriggerBtn');
  if (pulls > 0) {
    gb.dataset.pulls = pulls;
    gb.disabled = false;
    gb.style.display = 'block';
    if (pct === 1 && total >= 10) {
      gb.textContent = `🎰 全問正解！ ${pulls}連ガチャを回す！`;
    } else if (pct === 1) {
      gb.textContent = `🎰 全問正解！ ${pulls}連ガチャを回す！`;
    } else {
      gb.textContent = `🎰 ${score}問正解！ ガチャを回す！`;
    }
  } else {
    gb.style.display = 'none';
  }
}

function restartQuiz() { currentQ=0; score=0; showScreen('screen-quiz'); renderQuestion(); }
function goHome() { window.location.href='index.html'; }

// =====================================================
// GACHA SYSTEM（データは data/cards.js + data/gacha.js から）
// =====================================================
let gachaState = loadGachaState();
let _pendingPulls = 0;
let _pullIdx = 0;
let _pullResults = [];

function startGachaFromResult() {
  const btn = document.getElementById('gachaTriggerBtn');
  const pulls = parseInt(btn.dataset.pulls || '1', 10);
  btn.disabled = true;
  _pendingPulls = pulls;
  _pullIdx = 0;
  _pullResults = [];
  for (let i = 0; i < pulls; i++) _pullResults.push(drawSingleCard(gachaState));
  showGachaOverlay();
  runGachaAnimation(0);
}

function showGachaOverlay() {
  document.getElementById('gachaOverlay').style.display = 'flex';
}
function hideGachaOverlay() {
  document.getElementById('gachaOverlay').style.display = 'none';
  updateCatalogBtn();
}

function runGachaAnimation(idx) {
  const { card, isNew } = _pullResults[idx];
  // カウント表示（複数回のとき）
  const ci = document.getElementById('gachaCountIndicator');
  if (_pendingPulls > 1) { ci.textContent = `${idx+1} / ${_pendingPulls}`; ci.style.display = 'block'; }
  else ci.style.display = 'none';

  // Phase 1：カプセル回転
  document.getElementById('gachaCapsulePhase').style.display = 'flex';
  document.getElementById('gachaCardPhase').style.display   = 'none';
  const cap = document.getElementById('gachaCapsule');
  cap.textContent = '🎱';
  cap.className = 'gacha-capsule';
  setTimeout(() => cap.classList.add('spin'), 80);

  setTimeout(() => {
    // Phase 2：カード表示
    document.getElementById('gachaCapsulePhase').style.display = 'none';
    document.getElementById('gachaCardPhase').style.display   = 'flex';

    // SR フラッシュ
    if (card.rarity === 'sr') {
      const fl = document.createElement('div');
      fl.className = 'sr-flash';
      document.body.appendChild(fl);
      setTimeout(() => fl.remove(), 560);
    }

    // レアリティアナウンス
    const ann = document.getElementById('gachaRarityAnnounce');
    if (card.rarity === 'sr')     { ann.textContent = '⭐⭐ SUPER RARE!! ⭐⭐'; ann.style.color = '#ffd700'; }
    else if (card.rarity === 'r') { ann.textContent = '✨ RARE! ✨';            ann.style.color = '#a78bfa'; }
    else                          { ann.textContent = 'NORMAL';                 ann.style.color = 'rgba(255,255,255,0.55)'; }

    // SR キラキラ星HTML
    const sparkHTML = card.rarity === 'sr' ? `
      <span class="sp-star" style="top:6%;left:9%;font-size:15px;animation-delay:0s;color:#ffd700">✦</span>
      <span class="sp-star" style="top:14%;right:8%;font-size:10px;animation-delay:0.4s;color:#fff">✧</span>
      <span class="sp-star" style="top:44%;left:5%;font-size:13px;animation-delay:0.8s;color:#ffd700">✦</span>
      <span class="sp-star" style="top:38%;right:5%;font-size:9px;animation-delay:1.15s;color:#ffe066">✦</span>
      <span class="sp-star" style="top:68%;left:14%;font-size:12px;animation-delay:0.55s;color:#fff">✧</span>
      <span class="sp-star" style="top:62%;right:12%;font-size:14px;animation-delay:1.45s;color:#ffd700">✦</span>` : '';

    // カードHTML
    document.getElementById('gachaCardDisplay').innerHTML = `
      <div class="gacha-card ${card.rarity}" style="width:200px;border-radius:16px;overflow:hidden;position:relative">
        ${isNew ? '<div class="card-new-badge">NEW!</div>' : ''}
        <div class="card-art ${card.rarity}">
          <span class="card-art-emoji">${card.emoji}</span>
        </div>
        <div class="card-info ${card.rarity}">
          ${sparkHTML}
          <span class="card-rarity-badge badge-${card.rarity}">${card.rarity.toUpperCase()}</span>
          <span class="card-name ${card.rarity}">${card.name}</span>
          <span class="card-flavor ${card.rarity}">${card.flavor.replace(/\n/g,'<br>')}</span>
        </div>
      </div>`;

    // ボタン設定
    const nb = document.getElementById('gachaNextBtn');
    const isLast = idx >= _pendingPulls - 1;
    if (isLast) {
      nb.textContent = '📖 図鑑を見る';
      nb.onclick = () => { window.location.href = 'catalog.html'; };
    } else {
      nb.textContent = `つぎのカード → (${idx+2}/${_pendingPulls})`;
      nb.onclick = () => runGachaAnimation(idx+1);
    }
    document.getElementById('gachaCloseBtn').onclick = hideGachaOverlay;
  }, 1900);
}

function updateCatalogBtn() {
  const n = gachaState.collected.length;
  const el = document.getElementById('catalogBtnCount');
  if (el) el.textContent = n;
  const h = document.getElementById('headerCatalogCount');
  if (h) h.textContent = n;
}
</script>
</body>
</html>
