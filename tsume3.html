<style>
  :root {
    --bg: #0f0f13; --card: #1a1a22; --border: #2a2a38;
    --text: #f0f0f5; --muted: #7a7a9a;
    --yellow: #FFD60A; --red: #FF453A; --green: #30D158;
    --board: #DCB35C;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'M PLUS Rounded 1c','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
    padding: 20px 12px 60px;
  }
  .container { max-width: 600px; margin: 0 auto; }
  .page-header { text-align: center; margin-bottom: 24px; }
  .page-header h1 { font-size: 24px; font-weight: 900; }
  .page-header h1 span { color: var(--yellow); }
  .page-header p { color: var(--muted); font-size: 13px; margin-top: 6px; }

  /* ナビ（非表示） */
  .problem-nav { display: none; }
  .nav-btn { display: none; }

  /* カード */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 16px; }

  /* 問題情報 */
  .prob-info { background: var(--bg); border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
  .prob-info h3 { font-size: 15px; font-weight: 900; margin-bottom: 4px; }
  .prob-info p  { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .prob-hint    { font-size: 11px; color: var(--yellow); font-weight: 700; margin-top: 6px; }

  /* 状態バー */
  .status-bar {
    text-align: center; font-size: 13px; font-weight: 700;
    padding: 8px; border-radius: 8px; margin-bottom: 10px;
    background: rgba(255,214,10,.1); color: var(--yellow);
    transition: background .3s;
  }
  .status-bar.ok    { background: rgba(48,209,88,.15); color: var(--green); }
  .status-bar.ng    { background: rgba(255,69,58,.15);  color: var(--red); }
  .status-bar.gote  { background: rgba(122,122,154,.1); color: var(--muted); }

  /* 持ち駒 */
  .hand-area {
    display: flex; gap: 8px; align-items: center;
    min-height: 36px; padding: 6px 10px;
    background: var(--bg); border-radius: 8px; margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .hand-label { font-size: 11px; color: var(--muted); margin-right: 4px; }
  .hand-koma {
    width: 38px; height: 38px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 900; cursor: pointer;
    clip-path: polygon(50% 0%,100% 25%,100% 100%,0% 100%,0% 25%);
    background: #f5f0e0; color: #1a0a00;
    border: 2px solid transparent; transition: border-color .15s;
    position: relative;
  }
  .hand-koma.selected { border-color: var(--yellow) !important; box-shadow: 0 0 0 2px var(--yellow); }
  .hand-koma.disabled { opacity: .4; cursor: default; }

  /* 盤面 */
  .board-wrap { display: flex; flex-direction: column; align-items: center; margin: 6px 0 10px; }
  .side-label { font-size: 11px; color: var(--muted); margin: 3px 0; }

  .board {
    display: grid;
    border: 3px solid #6B4F10; border-radius: 4px;
    background: #7B4E12; gap: 2px; padding: 2px;
  }
  .board-5x5 { grid-template-columns: repeat(5, 1fr); }

  .sq {
    width: 58px; height: 58px;
    background: var(--board);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; border-radius: 3px; position: relative;
    transition: background .12s;
  }
  .sq:hover { background: #E8C97A; }
  .sq.selected  { background: rgba(255,214,10,.5) !important; }
  .sq.movable   { background: rgba(48,209,88,.25) !important; }
  .sq.movable:hover { background: rgba(48,209,88,.45) !important; }
  .sq.in-check  { background: rgba(255,69,58,.35) !important; }
  .sq.last-from { background: rgba(255,214,10,.2); }
  .sq.last-to   { background: rgba(255,214,10,.35); }

  .piece {
    width: 50px; height: 50px;
    display: flex; align-items: center; justify-content: center;
    font-size: 19px; font-weight: 900; border-radius: 6px;
    clip-path: polygon(50% 0%,100% 25%,100% 100%,0% 100%,0% 25%);
    pointer-events: none; user-select: none;
    transition: transform .1s;
  }
  .piece.sente { background: #f5f0e0; color: #1a0a00; }
  .piece.gote  { background: #2a1810; color: #f5d080; transform: rotate(180deg); }
  .piece.promoted { color: var(--red) !important; }

  /* ボタン */
  .btn-row { display: flex; gap: 8px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
  .btn {
    background: transparent; border: 1.5px solid; border-radius: 10px;
    padding: 8px 18px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all .15s;
  }
  .btn-yellow { border-color: var(--yellow); color: var(--yellow); }
  .btn-yellow:hover { background: var(--yellow); color: #000; }
  .btn-muted  { border-color: var(--border); color: var(--muted); }
  .btn-muted:hover { border-color: var(--muted); color: var(--text); }

  /* 成り確認モーダル */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.7); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px; text-align: center;
    max-width: 300px; width: 90%;
  }
  .modal h3 { font-size: 16px; font-weight: 900; margin-bottom: 8px; color: var(--yellow); }
  .modal p  { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
  .modal .modal-btns { display: flex; gap: 10px; justify-content: center; }
  .modal .modal-btns .btn { padding: 8px 22px; }

  /* 正解アニメ */
  @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:.5} }
  .celebrating { animation: shimmer .4s ease-in-out 3; }

  /* 凡例 */
  .legend { display: flex; gap: 12px; justify-content: center; font-size: 11px; color: var(--muted); margin-bottom: 10px; }
  .legend span { display: flex; align-items: center; gap: 4px; }
  .leg { width: 14px; height: 14px; border-radius: 2px; }
  .leg-s { background: #f5f0e0; }
  .leg-g { background: #2a1810; }

  @media (max-width: 768px) {
    body { min-height: unset; padding-bottom: 40px; }
  }
  @media (max-width: 480px) {
    .sq { width: 52px; height: 52px; }
    .piece { width: 45px; height: 45px; font-size: 16px; }
    .hand-koma { width: 34px; height: 34px; font-size: 14px; }
  }

<div class="container">
  <div class="page-header">
    <h1>🎯 <span>3手詰め</span> 入門 10問</h1>

  </div>

    <span><span class="leg leg-s"></span>先手（あなた）</span>

<!-- 成りモーダル -->
<div class="modal-overlay" id="promoteModal">
  <div class="modal">
    <h3>成りますか？</h3>
    <p id="promoteText">この駒を成駒にしますか？</p>
    <div class="modal-btns">
      <button class="btn btn-yellow" onclick="confirmPromote(true)">成る</button>
      <button class="btn btn-muted" onclick="confirmPromote(false)">成らない</button>
    </div>
  </div>
</div>

<script>
// ============================================================
//  将棋エンジン（5×5）
// ============================================================
// board[r][c] = {name, side, promoted} or null
// 先手: side='sente', 前=row減少  後手: side='gote', 前=row増加

const FWD = {sente: -1, gote: 1};

// 成り対応
const PROMOTE_MAP = {
  '銀':'成銀','桂':'成桂','香':'成香','歩':'と','飛':'龍','角':'馬'
};
const DEMOTE_MAP = {};
for (const [k,v] of Object.entries(PROMOTE_MAP)) DEMOTE_MAP[v] = k;

// 利きを返す（利き先のセルリスト）
function getAttacks(board, r, c) {
  const p = board[r][c];
  if (!p) return [];
  const fwd = FWD[p.side];
  const name = p.promoted ? PROMOTE_MAP[p.name] || p.name : p.name;
  const opp  = p.side === 'sente' ? 'gote' : 'sente';
  const res  = [];

  const addStep = (dr, dc) => {
    const nr = r+dr, nc = c+dc;
    if (nr>=0&&nr<5&&nc>=0&&nc<5) res.push([nr,nc]);
  };
  const addSlide = (dr, dc) => {
    let nr=r+dr, nc=c+dc;
    while (nr>=0&&nr<5&&nc>=0&&nc<5) {
      res.push([nr,nc]);
      if (board[nr][nc]) break;
      nr+=dr; nc+=dc;
    }
  };

  if (name==='王') {
    for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++)
      if (dr||dc) addStep(dr,dc);
  } else if (name==='金'||name==='成銀'||name==='成桂'||name==='成香'||name==='と') {
    [[fwd,0],[fwd,1],[fwd,-1],[0,1],[0,-1],[-fwd,0]].forEach(([dr,dc])=>addStep(dr,dc));
  } else if (name==='銀') {
    [[fwd,0],[fwd,1],[fwd,-1],[-fwd,1],[-fwd,-1]].forEach(([dr,dc])=>addStep(dr,dc));
  } else if (name==='飛') {
    [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>addSlide(dr,dc));
  } else if (name==='龍') {
    [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>addSlide(dr,dc));
    [[-1,-1],[-1,1],[1,-1],[1,1]].forEach(([dr,dc])=>addStep(dr,dc));
  } else if (name==='角') {
    [[-1,-1],[-1,1],[1,-1],[1,1]].forEach(([dr,dc])=>addSlide(dr,dc));
  } else if (name==='馬') {
    [[-1,-1],[-1,1],[1,-1],[1,1]].forEach(([dr,dc])=>addSlide(dr,dc));
    [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>addStep(dr,dc));
  } else if (name==='香') {
    addSlide(fwd, 0);
  } else if (name==='桂') {
    addStep(2*fwd, 1); addStep(2*fwd, -1);
  } else if (name==='歩') {
    addStep(fwd, 0);
  }
  return res.filter(([nr,nc]) => {
    const t = board[nr][nc];
    return !t || t.side !== p.side;
  });
}

function findKing(board, side) {
  for (let r=0;r<5;r++) for (let c=0;c<5;c++) {
    const p=board[r][c];
    if (p && p.name==='王' && p.side===side) return [r,c];
  }
  return null;
}

function isAttackedBy(board, r, c, bySide) {
  for (let tr=0;tr<5;tr++) for (let tc=0;tc<5;tc++) {
    const p = board[tr][tc];
    if (!p || p.side!==bySide) continue;
    if (getAttacks(board,tr,tc).some(([ar,ac])=>ar===r&&ac===c)) return true;
  }
  return false;
}

function isInCheck(board, side) {
  const k = findKing(board, side);
  if (!k) return false;
  const opp = side==='sente'?'gote':'sente';
  return isAttackedBy(board, k[0], k[1], opp);
}

function copyBoard(board) {
  return board.map(row => row.map(cell => cell ? {...cell} : null));
}

function applyMove(board, hand, move, side) {
  const b = copyBoard(board);
  const h = hand.map(x=>({...x}));
  const opp = side==='sente'?'gote':'sente';

  if (move.drop) {
    const idx = h.findIndex(x=>x.name===move.drop&&x.side===side);
    if (idx>=0) h.splice(idx,1);
    b[move.tr][move.tc] = {name:move.drop, side, promoted:false};
  } else {
    const cap = b[move.tr][move.tc];
    if (cap) h.push({name: DEMOTE_MAP[cap.name]||cap.name, side, promoted:false});
    b[move.tr][move.tc] = {...b[move.fr][move.fc]};
    b[move.fr][move.fc] = null;
    if (move.promote) b[move.tr][move.tc].promoted = true;
  }
  return {board:b, hand:h};
}

function getLegalMoves(board, hand, side) {
  const moves = [];
  // 盤上の駒
  for (let fr=0;fr<5;fr++) for (let fc=0;fc<5;fc++) {
    const p = board[fr][fc];
    if (!p||p.side!==side) continue;
    for (const [tr,tc] of getAttacks(board,fr,fc)) {
      const bases = [false];
      // 成り可能か
      const fwd = FWD[side];
      const promZone = side==='sente' ? [0,1] : [3,4];
      if (!p.promoted && PROMOTE_MAP[p.name] &&
          (promZone.includes(fr)||promZone.includes(tr))) bases.push(true);
      for (const promote of bases) {
        const {board:nb} = applyMove(board, hand, {fr,fc,tr,tc,promote}, side);
        if (!isInCheck(nb, side)) moves.push({fr,fc,tr,tc,promote});
      }
    }
  }
  // 持ち駒打ち
  const seen = new Set();
  for (const h of hand) {
    if (h.side!==side||seen.has(h.name)) continue;
    seen.add(h.name);
    for (let tr=0;tr<5;tr++) for (let tc=0;tc<5;tc++) {
      if (board[tr][tc]) continue;
      // 歩の二歩チェック（簡易）
      if (h.name==='歩') {
        const fwd=FWD[side];
        let dup=false;
        for (let r2=0;r2<5;r2++) {
          const p2=board[r2][tc];
          if (p2&&p2.side===side&&p2.name==='歩'&&!p2.promoted) {dup=true;break;}
        }
        if (dup) continue;
      }
      const {board:nb} = applyMove(board, hand, {drop:h.name,tr,tc}, side);
      if (!isInCheck(nb, side)) moves.push({drop:h.name,tr,tc});
    }
  }
  return moves;
}

function isCheckmate(board, hand, side) {
  if (!isInCheck(board, side)) return false;
  return getLegalMoves(board, hand, side).length === 0;
}

// ============================================================
//  問題データ（コンピューター検証済み）
// ============================================================
const N = null;
const S = (n,p) => ({name:n,side:'sente',promoted:!!p});
const G = (n,p) => ({name:n,side:'gote',promoted:!!p});

const PROBLEMS = [
  {
    id:1, title:'問題1：角打ちで詰め',
    desc:'盤上の金・飛と持ち駒の角を使って詰めよう。',
    hint:'持ち駒の「角」を(2,2)に打つと王手になる',
    board:[
      [N, N, N, N, G('王')],
      [S('飛'), N, N, N, N],
      [N, N, N, N, N],
      [N, S('金'), N, N, N],
      [N, N, N, N, N]
    ],
    sHand:[{name:'角',side:'sente',promoted:false}], gHand:[],
    solution:[
      {drop:'角',tr:2,tc:2},
      {fr:0,fc:4,tr:0,tc:3,promote:false},
      {fr:1,fc:0,tr:1,tc:3,promote:true},
    ],
    goteResponses:[[0,4,0,3]],
  },
  {
    id:2, title:'問題2：金打ちで詰め',
    desc:'盤上の金・飛と持ち駒の金・金を使って詰めよう。',
    hint:'持ち駒の「金」を(0,3)に打つと王手になる',
    board:[
      [N, N, S('金'), N, G('王')],
      [N, N, N, N, N],
      [S('飛'), N, N, N, N],
      [N, N, N, N, N],
      [N, N, N, N, N]
    ],
    sHand:[{name:'金',side:'sente',promoted:false},{name:'金',side:'sente',promoted:false}], gHand:[],
    solution:[
      {drop:'金',tr:0,tc:3},
      {fr:0,fc:4,tr:1,tc:4,promote:false},
      {drop:'金',tr:0,tc:4},
    ],
    goteResponses:[[0,4,1,4]],
  },
  {
    id:3, title:'問題3：飛車の横走り',
    desc:'盤上の金・飛と持ち駒の金を使って詰めよう。',
    hint:'(2,0)の駒を(2,4)へ動かすと王手',
    board:[
      [N, N, N, N, G('王')],
      [N, S('金'), N, N, N],
      [S('飛'), N, N, N, N],
      [N, N, N, N, N],
      [N, N, N, N, N]
    ],
    sHand:[{name:'金',side:'sente',promoted:false}], gHand:[],
    solution:[
      {fr:2,fc:0,tr:2,tc:4,promote:false},
      {fr:0,fc:4,tr:0,tc:3,promote:false},
      {drop:'金',tr:1,tc:2},
    ],
    goteResponses:[[0,4,0,3], [0,4,1,3]],
    goteResponseMoves3:{
    '0,4,0,3':{drop:'金',tr:1,tc:2},
    '0,4,1,3':{drop:'金',tr:1,tc:4}
    },
  },
  {
    id:4, title:'問題4：銀打ちで詰め',
    desc:'盤上の金・飛と持ち駒の銀を使って詰めよう。',
    hint:'持ち駒の「銀」を(1,3)に打つと王手になる',
    board:[
      [N, N, N, N, G('王')],
      [N, N, N, N, N],
      [S('飛'), N, S('金'), N, N],
      [N, N, N, N, N],
      [N, N, N, N, N]
    ],
    sHand:[{name:'銀',side:'sente',promoted:false}], gHand:[],
    solution:[
      {drop:'銀',tr:1,tc:3},
      {fr:0,fc:4,tr:1,tc:4,promote:false},
      {fr:2,fc:2,tr:2,tc:3,promote:false},
    ],
    goteResponses:[[0,4,1,4]],
  },
  {
    id:5, title:'問題5：飛車を龍に',
    desc:'盤上の金・飛と持ち駒の金を使って詰めよう。',
    hint:'(2,2)の駒を(0,2)へ動かすと王手',
    board:[
      [N, N, N, N, G('王')],
      [N, N, N, N, N],
      [N, N, S('飛'), N, N],
      [N, N, S('金'), N, N],
      [N, N, N, N, N]
    ],
    sHand:[{name:'金',side:'sente',promoted:false}], gHand:[],
    solution:[
      {fr:2,fc:2,tr:0,tc:2,promote:true},
      {fr:0,fc:4,tr:1,tc:4,promote:false},
      {drop:'金',tr:2,tc:3},
    ],
    goteResponses:[[0,4,1,4]],
  },
  {
    id:6, title:'問題6：飛打ちで詰め',
    desc:'盤上の金・飛と持ち駒の飛を使って詰めよう。',
    hint:'持ち駒の「飛」を(0,3)に打つと王手になる',
    board:[
      [N, N, S('金'), N, G('王')],
      [N, N, N, N, N],
      [N, N, N, N, N],
      [S('飛'), N, N, N, N],
      [N, N, N, N, N]
    ],
    sHand:[{name:'飛',side:'sente',promoted:false}], gHand:[],
    solution:[
      {drop:'飛',tr:0,tc:3},
      {fr:0,fc:4,tr:1,tc:4,promote:false},
      {fr:3,fc:0,tr:3,tc:4,promote:false},
    ],
    goteResponses:[[0,4,1,4]],
  },
  {
    id:7, title:'問題7：金の前進王手',
    desc:'盤上の金・飛と持ち駒の金を使って詰めよう。',
    hint:'(3,4)の駒を(2,3)へ動かすと王手',
    board:[
      [N, N, N, N, G('王')],
      [N, N, N, N, N],
      [N, N, N, N, N],
      [N, N, N, N, S('金')],
      [N, N, N, N, S('飛')]
    ],
    sHand:[{name:'金',side:'sente',promoted:false}], gHand:[],
    solution:[
      {fr:3,fc:4,tr:2,tc:3,promote:false},
      {fr:0,fc:4,tr:0,tc:3,promote:false},
      {drop:'金',tr:1,tc:2},
    ],
    goteResponses:[[0,4,0,3]],
  },
  {
    id:8, title:'問題8：角を馬に',
    desc:'盤上の角・金と持ち駒の飛を使って詰めよう。',
    hint:'(0,0)の駒を(2,2)へ動かすと王手',
    board:[
      [S('角'), S('金'), N, N, G('王')],
      [N, N, N, N, N],
      [N, N, N, N, N],
      [N, N, N, N, N],
      [N, N, N, N, N]
    ],
    sHand:[{name:'飛',side:'sente',promoted:false}], gHand:[],
    solution:[
      {fr:0,fc:0,tr:2,tc:2,promote:true},
      {fr:0,fc:4,tr:1,tc:4,promote:false},
      {drop:'飛',tr:0,tc:4},
    ],
    goteResponses:[[0,4,1,4], [0,4,0,3]],
    goteResponseMoves3:{
    '0,4,1,4':{drop:'飛',tr:0,tc:4},
    '0,4,0,3':{drop:'飛',tr:0,tc:4}
    },
  },
  {
    id:9, title:'問題9：角の斜め王手',
    desc:'盤上の角・金を使って詰めよう。',
    hint:'(2,0)の駒を(3,1)へ動かすと王手',
    board:[
      [N, N, N, N, G('王')],
      [N, N, S('金'), N, N],
      [S('角'), N, N, N, N],
      [N, N, N, N, N],
      [N, N, N, N, N]
    ],
    sHand:[], gHand:[],
    solution:[
      {fr:2,fc:0,tr:3,tc:1,promote:false},
      {fr:0,fc:4,tr:1,tc:4,promote:false},
      {fr:3,fc:1,tr:1,tc:3,promote:true},
    ],
    goteResponses:[[0,4,1,4]],
  },
  {
    id:10, title:'問題10：銀の斜め前進',
    desc:'盤上の銀・飛と持ち駒の金を使って詰めよう。',
    hint:'(0,1)の駒を(1,2)へ動かすと王手',
    board:[
      [S('飛'), S('銀'), N, N, G('王')],
      [N, N, N, N, N],
      [N, N, N, N, N],
      [N, N, N, N, N],
      [N, N, N, N, N]
    ],
    sHand:[{name:'金',side:'sente',promoted:false}], gHand:[],
    solution:[
      {fr:0,fc:1,tr:1,tc:2,promote:false},
      {fr:0,fc:4,tr:1,tc:4,promote:false},
      {drop:'金',tr:2,tc:3},
    ],
    goteResponses:[[0,4,1,4], [0,4,1,3]],
    goteResponseMoves3:{
    '0,4,1,4':{drop:'金',tr:2,tc:3},
    '0,4,1,3':{drop:'金',tr:2,tc:3}
    },
  },
];

// ============================================================
//  ゲーム状態
// ============================================================
let prob, board, sHand, gHand, turn, phase, selected, selectedHandKoma;
let lastFrom, lastTo, moveCount, cleared;
let pendingPromote = null;
const clearedSet = new Set();

function initProblem(idx) {
  prob = PROBLEMS[idx];
  board = prob.board.map(row => row.map(c => c ? {...c} : null));
  sHand = prob.sHand.map(h => ({...h}));
  gHand = prob.gHand.map(h => ({...h}));
  turn = 'sente';
  phase = 'move1';  // move1, gote, move3, clear, fail
  selected = null; selectedHandKoma = null;
  lastFrom = null; lastTo = null;
  moveCount = 0;
  renderGame();
}

// ============================================================
//  描画
// ============================================================
function renderNav() {
  const idx = PROBLEMS.indexOf(prob);
  const el = document.getElementById('probCounter');
  if (el) {
    const cleared = clearedSet.size;
    el.innerHTML = `問 <span style="color:var(--yellow);font-size:16px;">${idx+1}</span> / ${PROBLEMS.length}` +
      (cleared>0 ? `　✓ ${cleared}問クリア済み` : '');
  }
}

function renderGame() {
  const area = document.getElementById('gameArea');
  area.innerHTML = `
    <div class="card">
      <div class="prob-info">
        <h3>${prob.title}</h3>
        <p>${prob.desc}</p>
        <p class="prob-hint">💡 ヒント：${prob.hint}</p>
      </div>
      <div id="statusBar" class="status-bar"></div>
      <div id="goteHandArea" class="hand-area" style="justify-content:flex-end;">
        <span class="hand-label">後手の持ち駒：</span>
        <div id="goteHand"></div>
      </div>
      <div class="board-wrap">
        <span class="side-label">後手（相手）</span>
        <div class="board board-5x5" id="boardEl"></div>
        <span class="side-label">先手（あなた）</span>
      </div>
      <div id="senteHandArea" class="hand-area">
        <span class="hand-label">持ち駒（先手）：</span>
        <div id="senteHand"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-yellow" id="hintBtn" onclick="showHint()">ヒントを見る</button>
        <button class="btn btn-muted" onclick="resetProb()">最初から</button>
        <button id="nextProbBtn" class="btn btn-yellow" onclick="nextProb()" style="display:none;">次の問題へ →</button>
      </div>
      <div id="hintText" style="display:none;margin-top:10px;font-size:12px;color:var(--muted);line-height:1.65;padding:10px;background:var(--bg);border-radius:8px;"></div>
    </div>
  `;
  updateStatus();
  renderBoard();
  renderHands();
  renderNav();
}

function updateStatus() {
  const el = document.getElementById('statusBar');
  if (!el) return;
  renderNav();
  if (phase==='move1') {
    el.className='status-bar'; el.textContent='先手番（1手目）——先手の駒を選んで動かそう';
  } else if (phase==='gote') {
    el.className='status-bar gote'; el.textContent='後手が応手中……';
  } else if (phase==='move3') {
    el.className='status-bar'; el.textContent='先手番（3手目）——詰みに持ち込もう！';
  } else if (phase==='clear') {
    el.className='status-bar ok celebrating'; el.textContent='🎉 詰み！正解！おめでとうございます！';
    const nb = document.getElementById('nextProbBtn');
    if (nb) nb.style.display = 'inline-block';
  } else if (phase==='fail') {
    el.className='status-bar ng'; el.textContent='✕ 詰みませんでした。もう一度！';
  }
}

function renderBoard() {
  const el = document.getElementById('boardEl');
  if (!el) return;
  const opp = turn==='sente'?'gote':'sente';

  // 合法手一覧（ハイライト用）
  let movable = new Set();
  if (selected && !selectedHandKoma && (phase==='move1'||phase==='move3')) {
    const [sr,sc] = selected;
    const moves = getLegalMoves(board, sHand, 'sente');
    for (const m of moves) {
      if (!m.drop && m.fr===sr && m.fc===sc) movable.add(`${m.tr},${m.tc}`);
    }
  }
  if (selectedHandKoma && (phase==='move1'||phase==='move3')) {
    const moves = getLegalMoves(board, sHand, 'sente');
    for (const m of moves) {
      if (m.drop===selectedHandKoma) movable.add(`${m.tr},${m.tc}`);
    }
  }

  // 王手されているマスをハイライト
  let checkSq = null;
  if (isInCheck(board,'sente')) checkSq = findKing(board,'sente');
  if (isInCheck(board,'gote')) checkSq = findKing(board,'gote');

  let html = '';
  for (let r=0;r<5;r++) for (let c=0;c<5;c++) {
    const p = board[r][c];
    const key = `${r},${c}`;
    let cls = 'sq';
    if (selected && selected[0]===r && selected[1]===c) cls += ' selected';
    else if (movable.has(key)) cls += ' movable';
    if (lastFrom && lastFrom[0]===r && lastFrom[1]===c) cls += ' last-from';
    if (lastTo   && lastTo[0]===r   && lastTo[1]===c)   cls += ' last-to';
    if (checkSq && checkSq[0]===r && checkSq[1]===c) cls += ' in-check';

    let inner = '';
    if (p) {
      const pname = p.promoted ? (PROMOTE_MAP[p.name]||p.name) : p.name;
      const prom = p.promoted ? ' promoted' : '';
      inner = `<div class="piece ${p.side}${prom}">${pname}</div>`;
    }
    html += `<div class="${cls}" onclick="clickSq(${r},${c})">${inner}</div>`;
  }
  el.innerHTML = html;
}

function renderHands() {
  // 先手持ち駒
  const sh = document.getElementById('senteHand');
  if (sh) {
    sh.innerHTML = sHand.length===0 ? '<span style="font-size:11px;color:var(--muted);">なし</span>' :
      sHand.map((h,i)=>{
        const active = selectedHandKoma===h.name;
        const disabled = (phase!=='move1'&&phase!=='move3') ? 'disabled' : '';
        return `<div class="hand-koma${active?' selected':''} ${disabled}" onclick="clickHandKoma('${h.name}')">${h.name}</div>`;
      }).join('');
  }
  // 後手持ち駒（無限前提）
  const gh = document.getElementById('goteHand');
  if (gh) {
    gh.innerHTML = '<span style="font-size:11px;color:var(--muted);">∞ 全駒あり</span>';
  }
}

// ============================================================
//  操作ハンドラ
// ============================================================
function clickHandKoma(name) {
  if (phase!=='move1' && phase!=='move3') return;
  if (selectedHandKoma===name) { selectedHandKoma=null; selected=null; renderBoard(); renderHands(); return; }
  selectedHandKoma = name;
  selected = null;
  renderBoard(); renderHands();
}

function clickSq(r, c) {
  if (phase!=='move1' && phase!=='move3') return;

  // 持ち駒打ち
  if (selectedHandKoma) {
    const moves = getLegalMoves(board, sHand, 'sente');
    const m = moves.find(mv=>mv.drop===selectedHandKoma&&mv.tr===r&&mv.tc===c);
    if (m) { executeSenteMove(m); return; }
    selectedHandKoma=null; selected=null; renderBoard(); renderHands(); return;
  }

  const p = board[r][c];

  // 選択済みの駒があれば移動を試みる
  if (selected) {
    const [sr,sc] = selected;
    if (sr===r && sc===c) { selected=null; renderBoard(); return; }

    const moves = getLegalMoves(board, sHand, 'sente');
    const candidates = moves.filter(m=>!m.drop&&m.fr===sr&&m.fc===sc&&m.tr===r&&m.tc===c);
    if (candidates.length>0) {
      // 成り確認
      if (candidates.some(m=>m.promote) && candidates.some(m=>!m.promote)) {
        pendingPromote = candidates;
        const pname = board[sr][sc].name;
        document.getElementById('promoteText').textContent = `${pname}を成駒（${PROMOTE_MAP[pname]}）にしますか？`;
        document.getElementById('promoteModal').classList.add('show');
        return;
      }
      executeSenteMove(candidates[0]);
      return;
    }
    // 別の先手駒に選択変更
    if (p && p.side==='sente') { selected=[r,c]; renderBoard(); return; }
    selected=null; renderBoard(); return;
  }

  // 新規選択
  if (p && p.side==='sente') { selected=[r,c]; renderBoard(); return; }
}

function confirmPromote(yes) {
  document.getElementById('promoteModal').classList.remove('show');
  if (!pendingPromote) return;
  const m = pendingPromote.find(mv=>mv.promote===yes) || pendingPromote[0];
  pendingPromote = null;
  executeSenteMove(m);
}

function executeSenteMove(move) {
  selected=null; selectedHandKoma=null;

  // バリデーションなし：自由にプレイ
  const {board:nb, hand:nh} = applyMove(board, sHand, move, 'sente');
  board=nb; sHand=nh;
  lastFrom = move.drop ? null : [move.fr,move.fc];
  lastTo = [move.tr,move.tc];
  moveCount++;

  if (phase==='move1') {
    if (isCheckmate(board, [], 'gote')) {
      phase='clear'; clearedSet.add(PROBLEMS.indexOf(prob));
      renderBoard(); renderHands(); updateStatus(); return;
    }
    phase='gote'; renderBoard(); renderHands(); updateStatus();
    setTimeout(executeGote, 700);
  } else {
    // 3手目：詰みなら正解
    if (isCheckmate(board, [], 'gote')) {
      phase='clear'; clearedSet.add(PROBLEMS.indexOf(prob));
    } else {
      phase='fail';
      setTimeout(()=>{ phase='move3'; updateStatus(); renderBoard(); }, 1800);
    }
    renderBoard(); renderHands(); updateStatus();
  }
}


// 後手の持ち駒（詰将棋の慣例：全駒無限）
const GOTE_INF_HAND = ['金','銀','飛','角','桂','香'].map(n=>({name:n,side:'gote',promoted:false}));

function executeGote() {
  const gh = GOTE_INF_HAND.map(h=>({...h}));
  const allMoves = getLegalMoves(board, gh, 'gote');

  if (allMoves.length === 0) {
    // 後手が動けない = 詰み
    phase='clear'; clearedSet.add(PROBLEMS.indexOf(prob));
    renderBoard(); renderHands(); updateStatus(); return;
  }

  // 先手に即詰みされない手を優先（なければ全手からランダム）
  const hardMoves = allMoves.filter(m => {
    const {board:nb} = applyMove(board, gh, m, 'gote');
    return !getLegalMoves(nb, sHand, 'sente').some(sm => {
      const {board:nb2} = applyMove(nb, sHand, sm, 'sente');
      return isCheckmate(nb2, [], 'gote');
    });
  });

  const pool = hardMoves.length > 0 ? hardMoves : allMoves;
  const best = pool[Math.floor(Math.random() * pool.length)];

  const {board:nb} = applyMove(board, gh, best, 'gote');
  board = nb;
  lastFrom = best.drop ? null : [best.fr, best.fc];
  lastTo = [best.tr, best.tc];
  phase='move3'; renderBoard(); renderHands(); updateStatus();
}

function showHint() {
  const el = document.getElementById('hintText');
  if (!el) return;
  const shown = el.style.display!=='none';
  if (shown) { el.style.display='none'; return; }
  const s = prob.solution[0];
  let hint = phase==='move1'
    ? `💡 1手目のヒント：${s.drop ? `持ち駒「${s.drop}」を(${s.tr},${s.tc})に打つ` : `(${s.fr},${s.fc})の駒を(${s.tr},${s.tc})に動かそう`}`
    : `💡 3手目のヒント：詰みの手を探そう。王将の逃げ場をすべて封じる手は？`;
  el.textContent = hint;
  el.style.display='block';
}

function resetProb() {
  initProblem(PROBLEMS.indexOf(prob));
}

function nextProb() {
  const idx = PROBLEMS.indexOf(prob);
  if (idx < PROBLEMS.length - 1) {
    initProblem(idx + 1);
  } else {
    // 全問クリア
    document.getElementById('gameArea').innerHTML = `
      <div class="card" style="text-align:center;padding:40px 20px;">
        <div style="font-size:48px;margin-bottom:16px;">🏆</div>
        <h2 style="font-size:22px;font-weight:900;color:var(--yellow);margin-bottom:12px;">全問クリア！</h2>
        <p style="color:var(--muted);font-size:14px;margin-bottom:24px;">10問すべての3手詰めを解きました！<br>将棋の読み、着実に上がってます。</p>
        <button class="btn btn-yellow" onclick="initProblem(0)">最初からやり直す</button>
      </div>
    `;
    renderNav();
  }
}

function loadProb(idx) {
  initProblem(idx);
}

// 初期化
initProblem(0);
</script>
